        const {totalUnits} = jobTotals(job);
        const input = document.getElementById('ps-job-edit-input');
        job.manualDone = Math.max(0, Math.min(totalUnits, parseInt(input.value)||0));
        editingJobId = null;
        saveJobs(); renderJobs();
      });
    }
    const editCancelBtn = card.querySelector('[data-action="job-edit-cancel"]');
    if(editCancelBtn){
      editCancelBtn.addEventListener('click', () => {
        editingJobId = null;
        renderJobs();
      });
    }
    const toggleDoneBtn = card.querySelector('[data-action="toggle-done-job"]');
    if(toggleDoneBtn){
      toggleDoneBtn.addEventListener('click', () => {
        if(expandedDoneJobs.has(jobId)) expandedDoneJobs.delete(jobId);
        else expandedDoneJobs.add(jobId);
        renderJobs();
      });
    }
    const deleteBtn = card.querySelector('[data-action="job-delete"]');
    if(deleteBtn){
      deleteBtn.addEventListener('click', () => {
        jobs = jobs.filter(j=>j.id!==jobId);
        saveJobs(); regenerateIfActive();
      });
    }
    const addSelect = card.querySelector('[data-action="job-add-select"]');
    const addBtn = card.querySelector('[data-action="job-add-item"]');
    if(addBtn){
      addBtn.addEventListener('click', () => {
        const id = addSelect.value;
        if(!id) return;
        job.items.push({id, qty: 1});
        saveJobs(); renderJobs();
      });
    }
    card.querySelectorAll('[data-action="job-item-qty"]').forEach(input => {
      input.addEventListener('change', e => {
        const itemId = e.target.closest('tr').getAttribute('data-itemid');
        const item = job.items.find(it=>it.id===itemId);
        if(item) item.qty = Math.max(0, parseInt(e.target.value)||0);
        saveJobs();
      });
    });
    card.querySelectorAll('[data-action="job-item-target-qty"]').forEach(input => {
      input.addEventListener('change', () => {
        const itemId = input.getAttribute('data-itemid');
        const item = job.items.find(it=>it.id===itemId);
        if(item) item.qty = Math.max(0, parseInt(input.value)||0);
        saveJobs();
        renderJobs();
      });
    });
    card.querySelectorAll('[data-action="job-item-remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        job.items = job.items.filter(it=>it.id!==itemId);
        saveJobs(); renderJobs();
      });
    });
    card.querySelectorAll('[data-action="job-item-up"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        const idx = job.items.findIndex(it=>it.id===itemId);
        if(idx>0){ [job.items[idx],job.items[idx-1]] = [job.items[idx-1],job.items[idx]]; saveJobs(); renderJobs(); }
      });
    });
    card.querySelectorAll('[data-action="job-item-down"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        const idx = job.items.findIndex(it=>it.id===itemId);
        if(idx<job.items.length-1){ [job.items[idx],job.items[idx+1]] = [job.items[idx+1],job.items[idx]]; saveJobs(); renderJobs(); }
      });
    });
  });

  const newJobBtn = document.getElementById('ps-job-new');
  if(newJobBtn){
    newJobBtn.addEventListener('click', () => {
      jobs.push({id: uid('job'), name: 'New job', items: [], status:'queued', createdAt: new Date().toISOString(), manualDone: 0});
      saveJobs(); renderJobs();
    });
  }
}

let changeSpoolOpenFor = new Set(); // session-only: which printer cards have the Change Spool picker open

// ---------- rendering: Status tab ----------
function renderStatus(){
  const root = document.getElementById('ps-tab-status');
  if(!root) return;
  const activePrinters = printers.filter(p => p.status === 'active');
  const now = new Date();

  if(activePrinters.length === 0){
    root.innerHTML = `<div class="ps-panel"><div class="ps-empty">No active printers — check the Printers tab.</div></div>`;
    return;
  }

  const liveMachines = liveSchedule ? liveSchedule.machines : [];

  const cards = activePrinters.map(p => {
    const inProgress = productionLog
      .filter(e => e.printerId === p.id && !e.actualEnd && !e.failed)
      .sort((a,b) => new Date(b.actualStart) - new Date(a.actualStart))[0];

    const spool = p.spoolId ? spools.find(s => s.id === p.spoolId && !s.retired) : null;
    const spoolLow = spool && spool.remainingG <= LOW_STOCK_G;
    const spoolPct = spool && spool.totalG>0 ? Math.max(0, Math.min(100, ((spool.totalG-spool.remainingG)/spool.totalG)*100)) : 0;

    let leftSide, overdueBanner = '', timeCell, subLine, relevantProductId = null;
    let sortKey = Number.MAX_SAFE_INTEGER; // idle by default — always sorts last

    if(inProgress){
      const product = catalog.find(x=>x.id===inProgress.productId);
      relevantProductId = inProgress.productId;
      const name = inProgress.isTest
        ? 'Test: ' + (product && inProgress.testLabel ? `${product.name} — ${inProgress.testLabel}` : product ? product.name : (inProgress.testLabel||'untitled'))
        : (product ? (inProgress.unitsCompleted>1?inProgress.unitsCompleted+'× ':'')+product.name : '(deleted product)');
      const estFinish = new Date(new Date(inProgress.actualStart).getTime() + (inProgress.plannedMin||0)*60000);
      const elapsedMin = Math.max(0, (now - new Date(inProgress.actualStart))/60000);
      const overdue = now > estFinish;
      const progressPct = inProgress.plannedMin>0 ? Math.min(100, (elapsedMin/inProgress.plannedMin)*100) : 0;
      // Soonest-finishing first. A printer that's actively printing but has
      // no time estimate to go on sorts after every printer with a known
      // finish time, but still ahead of fully idle printers — it's doing
      // something, we just can't say exactly when it'll be done.
      sortKey = inProgress.plannedMin>0 ? estFinish.getTime() : Number.MAX_SAFE_INTEGER - 1;

      if(inProgress.plannedMin>0 && overdue){
        timeCell = `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">TIME REMAINING</div><div class="ps-summary-num" style="color:var(--danger);">OVERDUE</div><div class="ps-summary-label">was due ${fmtClock(estFinish)}</div></div>`;
        overdueBanner = `<div class="ps-status-overdue-banner">⚠ Should be done by now — go check it</div>`;
      } else if(inProgress.plannedMin>0){
        const remainingMin = Math.max(0, inProgress.plannedMin - elapsedMin);
        timeCell = `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">TIME REMAINING</div><div class="ps-summary-num">${fmtDuration(remainingMin)}</div><div class="ps-summary-label">done ${fmtClock(estFinish)}</div></div>`;
      } else {
        timeCell = `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">TIME ELAPSED</div><div class="ps-summary-num">${fmtDuration(elapsedMin)}</div><div class="ps-summary-label">no estimate available</div></div>`;
      }

      leftSide = `
        <div class="ps-status-label">CURRENTLY PRINTING</div>
        <div style="font-size:19px;font-weight:700;line-height:1.25;">${escapeHtml(name)}</div>
        <div class="ps-hprogress-track" title="${Math.round(progressPct)}% of estimated time elapsed">
          <div class="ps-hprogress-fill ${overdue?'overdue':''}" style="width:${progressPct}%;"></div>
        </div>
        <div class="ps-hint mono">started ${fmtClock(new Date(inProgress.actualStart))}${inProgress.plannedMin>0 ? ` · ${fmtDuration(elapsedMin)} elapsed · ${Math.round(progressPct)}% of estimated time` : ''}</div>
      `;
    } else {
      timeCell = `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">TIME REMAINING</div><div class="ps-summary-num" style="color:var(--muted);">—</div><div class="ps-summary-label">not printing</div></div>`;
      leftSide = `
        <div class="ps-status-label">CURRENTLY PRINTING</div>
        <div style="font-size:19px;font-weight:700;color:var(--muted);">Idle</div>
        <div class="ps-hprogress-track" style="opacity:0.35;"><div class="ps-hprogress-fill" style="width:0%;"></div></div>
        <div class="ps-hint">Nothing running on this printer right now.</div>
      `;
    }

    const filamentCell = spool
      ? `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">FILAMENT LEFT</div><div class="ps-summary-num" style="${spoolLow?'color:var(--danger);':''}">${Math.max(0,spool.remainingG)}g</div><div class="ps-spool-bar-track" style="margin:6px 0 4px;"><div class="ps-spool-bar-fill ${spoolLow?'low':''}" style="width:${spoolPct}%"></div></div><div class="ps-summary-label" style="text-transform:none;letter-spacing:0;">${spoolLow?'low — ':''}${escapeHtml(spool.label)}</div></div>`
      : `<div class="ps-summary-cell"><div class="ps-summary-label" style="margin:0 0 4px;">FILAMENT LEFT</div><div class="ps-summary-num" style="color:var(--muted);">—</div><div class="ps-summary-label">no spool set</div></div>`;

    const machine = liveMachines.find(m => m.id === p.id);
    let upcoming = null;
    if(machine){
      upcoming = machine.days
        .flatMap(d => d.jobs)
        .filter(j => j.start > now)
        .sort((a,b) => a.start - b.start)[0];
      subLine = upcoming
        ? `Next: <b style="color:var(--text);">${escapeHtml(upcoming.name)}</b> — ${fmtDateHead(upcoming.start)} ${fmtClock(upcoming.start)}`
        : `Nothing queued after this.`;
    } else {
      subLine = `No schedule generated yet — check the Build Schedule tab.`;
    }

    // Job status: which active Job (from the Jobs tab) this printer's
    // current-or-next product belongs to, if any, and how far along that
    // job is overall (not just on this printer).
    if(!relevantProductId && upcoming) relevantProductId = upcoming.productId;
    const job = findActiveJobForProduct(relevantProductId);
    let jobSection = '';
    if(job){
      const {done, totalUnits} = jobProgress(job);
      const pct = totalUnits>0 ? Math.min(100, (done/totalUnits)*100) : 0;
      jobSection = `
        <div class="ps-status-job">
          <div class="ps-status-label">JOB</div>
          <div style="font-weight:700;">${escapeHtml(job.name)}</div>
          <div class="ps-hprogress-track"><div class="ps-hprogress-fill" style="width:${pct}%;background:var(--ok);"></div></div>
          <div class="ps-hint">${done} of ${totalUnits} units done</div>
        </div>
      `;
    }

    return {sortKey, html: `
      <div class="ps-panel">
        <div class="ps-printer-block-head" style="margin-bottom:12px;"><span class="dot"></span>${escapeHtml(p.name)}</div>
        <div class="ps-status-grid">
          <div class="ps-status-left">
            ${leftSide}
          </div>
          <div class="ps-status-right">
            ${timeCell}
            ${filamentCell}
          </div>
        </div>
        ${overdueBanner}
        ${jobSection}
        <div style="margin-top:12px;font-size:13.5px;">${subLine}</div>
      </div>
    `};
  }).sort((a,b) => a.sortKey - b.sortKey).map(c => c.html).join('');

  root.innerHTML = cards;
}

function renderPrinters(){
  const root = document.getElementById('ps-tab-printers');
  const cards = printers.map(p => {
    const activeSpoolOptions = `<option value="">— none assigned —</option>` + spools.filter(s=>!s.retired).map(s =>
      `<option value="${s.id}" ${p.spoolId===s.id?'selected':''}>${escapeHtml(s.label)} (${Math.max(0,s.remainingG)}g left)</option>`
    ).join('');
    const currentSpool = spools.find(s=>s.id===p.spoolId);
    const availableStock = stock.filter(st=>st.qty>0);
    const changeOpen = changeSpoolOpenFor.has(p.id);

    const changePicker = changeOpen ? `
      <div class="ps-field" style="margin-top:10px;margin-bottom:0;background:var(--panel-2);border-radius:4px;padding:10px;">
        <span class="ps-field-label">Load fresh spool from Stock</span>
        ${availableStock.length===0 ? `<div class="ps-hint" style="color:var(--danger)">Nothing in Stock — add some on the Filament tab first.</div>` : `
        <select class="ps-select" data-action="change-spool-select" style="max-width:260px;">
          ${availableStock.map(st => `<option value="${st.id}">${escapeHtml(st.label)} (${st.weightPerSpoolG}g, ${st.qty} in stock)</option>`).join('')}
        </select>
        <div class="ps-row" style="margin-top:8px;gap:8px;">
          <button class="ps-btn primary small" data-action="confirm-change-spool">Confirm Swap</button>
          <button class="ps-btn ghost small" data-action="cancel-change-spool">Cancel</button>
        </div>
        <div class="ps-hint" style="margin-top:6px;">${currentSpool ? `Retires "${escapeHtml(currentSpool.label)}" (keeps its history) and loads the fresh one.` : `Loads the fresh one — nothing's currently assigned here.`}</div>
        `}
      </div>
    ` : '';

    return `
      <div class="ps-printer-card" data-id="${p.id}">
        <div class="ps-printer-top">
          <input class="ps-input ps-name" data-field="name" value="${escapeHtml(p.name)}" />
          <span class="ps-status-pill ${p.status}" data-action="toggle-status">${p.status === 'active' ? 'Active' : 'Down'}</span>
          <button class="ps-btn ghost small" data-action="remove" title="Remove printer">✕</button>
        </div>
        <div class="ps-field" style="margin-bottom:0;">
          <span class="ps-field-label">Loaded spool</span>
          <div class="ps-row" style="gap:8px;">
            <select class="ps-select" data-field="spoolId" style="flex:1;">${activeSpoolOptions}</select>
            <button class="ps-btn small" data-action="toggle-change-spool">${changeOpen?'Close':'Change Spool'}</button>
          </div>
          <div class="ps-hint">Used to flag when the schedule will run this machine out of filament.</div>
          ${changePicker}
        </div>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);">
          <div class="ps-row" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <div class="ps-hint">Lifetime: <b style="color:var(--text);">${fmtHours(printerHours(p.id))}</b>${p.hoursResetAt ? ` · since reset: <b style="color:var(--text);">${fmtHours(printerHours(p.id, new Date(p.hoursResetAt)))}</b> (${fmtDateHead(new Date(p.hoursResetAt))})` : ''}</div>
            <button class="ps-btn ghost small" data-action="reset-hours">Reset hours counter</button>
          </div>
        </div>
        ${partDefs.length>0 ? `
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);">
          <div class="ps-status-label" style="margin-bottom:8px;">MAINTENANCE PARTS</div>
          ${partDefs.map(pd => {
            const install = p.partInstalls[pd.id];
            const hoursOn = install ? printerHours(p.id, new Date(install.installedAt)) : 0;
            const pct = pd.lifespanHours>0 ? Math.min(100, (hoursOn/pd.lifespanHours)*100) : 0;
            const due = pd.lifespanHours>0 && hoursOn >= pd.lifespanHours;
            return `
              <div style="margin-bottom:10px;">
                <div class="ps-row" style="justify-content:space-between;">
                  <span class="ps-hint">${escapeHtml(pd.name)} — <b style="color:${due?'var(--danger)':'var(--text)'};">${fmtHours(hoursOn)}</b> / ${fmtHours(pd.lifespanHours)}${due ? ' <span style="color:var(--danger);font-weight:700;">— inspect/replace</span>' : ''}</span>
                  <button class="ps-btn ghost small" data-action="log-part-replacement" data-partid="${pd.id}">Log Replacement</button>
                </div>
                <div class="ps-hprogress-track" style="height:6px;margin:4px 0 0;"><div class="ps-hprogress-fill ${due?'overdue':''}" style="width:${pct}%;"></div></div>
              </div>
            `;
          }).join('')}
        </div>
        ` : ''}
      </div>
    `;
  }).join('');

  const partDefRows = partDefs.map(pd => `
    <tr data-id="${pd.id}">
      <td><input class="ps-input ps-name" data-field="name" value="${escapeHtml(pd.name)}" /></td>
      <td><input class="ps-input ps-narrow" type="number" min="1" data-field="lifespanHours" value="${Math.round(pd.lifespanHours)}" style="width:90px;" /></td>
      <td class="ps-hint">${pd.replacementLog.length} logged</td>
      <td><button class="ps-btn ghost small" data-action="remove-part">✕</button></td>
    </tr>
  `).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Maintenance Parts</div>
      <div class="ps-hint" style="margin-bottom:12px;">Define a part type once — every printer tracks its own hours-since-install independently. Lifespan starts as your estimate and adjusts on its own as you log real replacements.</div>
      ${partDefs.length===0 ? '<div class="ps-empty">No parts tracked yet — add one below, e.g. "Hotend" at 1000 hours.</div>' : `
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th>Part</th><th style="width:110px">Lifespan (h)</th><th style="width:100px">History</th><th></th></tr></thead>
        <tbody id="ps-parts-body">${partDefRows}</tbody>
      </table>
      </div>
      `}
      <div style="margin-top:14px;">
        <button class="ps-btn" id="ps-add-part">+ Add part</button>
      </div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Printers</div>
      <div id="ps-printers-list">${cards}</div>
      <div style="margin-top:14px;">
        <button class="ps-btn" id="ps-add-printer">+ Add printer</button>
      </div>
      <div class="ps-hint" style="margin-top:12px;">Mark a printer "Down" to pull it out of the rotation entirely — its share of the queue gets redistributed to the active printers. To tell the Live Schedule what a printer's actually doing right now, log its prints on the Log tab. Use "Change Spool" when you actually swap the physical spool — it retires the old one and pulls a fresh one from Stock.</div>
    </div>
  `;

  root.querySelectorAll('#ps-parts-body tr').forEach(tr => {
    const pid = tr.getAttribute('data-id');
    tr.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', () => {
        const pd = partDefs.find(x=>x.id===pid);
        const field = input.getAttribute('data-field');
        if(field==='lifespanHours'){
          pd.lifespanHours = Math.max(1, parseFloat(input.value)||1);
        } else {
          pd[field] = input.value;
        }
        savePartDefs(); renderPrinters(); regenerateIfActive();
      });
    });
    tr.querySelector('[data-action="remove-part"]').addEventListener('click', () => {
      partDefs = partDefs.filter(x=>x.id!==pid);
      printers.forEach(p => { delete p.partInstalls[pid]; });
      savePartDefs(); savePrinters(); renderPrinters();
    });
  });
  document.getElementById('ps-add-part').addEventListener('click', () => {
    const newId = uid('part');
    partDefs.push({id:newId, name:'New part', lifespanHours:1000, replacementLog:[]});
    printers.forEach(p => { p.partInstalls[newId] = {installedAt: new Date().toISOString(), notified:false}; });
    savePartDefs(); savePrinters(); renderPrinters();
  });

  root.querySelectorAll('.ps-printer-card').forEach(card => {
    const id = card.getAttribute('data-id');
    card.querySelector('[data-field="name"]').addEventListener('change', e => {
      const p = printers.find(x=>x.id===id); p.name = e.target.value;
      savePrinters(); regenerateIfActive();
    });
    card.querySelector('[data-action="toggle-status"]').addEventListener('click', () => {
      const p = printers.find(x=>x.id===id);
      p.status = p.status === 'active' ? 'down' : 'active';
      savePrinters(); renderPrinters(); regenerateIfActive();
    });
    card.querySelector('[data-field="spoolId"]').addEventListener('change', e => {
      const p = printers.find(x=>x.id===id);
      p.spoolId = e.target.value || null;
      if(p.spoolId){ stampSpoolLoad(p.spoolId, p.id); saveSpools(); }
      savePrinters(); regenerateIfActive();
    });
    card.querySelector('[data-action="remove"]').addEventListener('click', () => {
      printers = printers.filter(x=>x.id!==id);
      savePrinters(); renderPrinters(); regenerateIfActive();
    });
    card.querySelector('[data-action="toggle-change-spool"]').addEventListener('click', () => {
      if(changeSpoolOpenFor.has(id)) changeSpoolOpenFor.delete(id);
      else changeSpoolOpenFor.add(id);
      renderPrinters();
    });
    card.querySelector('[data-action="reset-hours"]').addEventListener('click', () => {
      const p = printers.find(x=>x.id===id);
      p.hoursResetAt = new Date().toISOString();
      savePrinters(); renderPrinters();
    });
    card.querySelectorAll('[data-action="log-part-replacement"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const partId = btn.getAttribute('data-partid');
        logPartReplacement(id, partId);
        renderPrinters();
      });
    });
    const cancelBtn = card.querySelector('[data-action="cancel-change-spool"]');
    if(cancelBtn){
      cancelBtn.addEventListener('click', () => { changeSpoolOpenFor.delete(id); renderPrinters(); });
    }
    const confirmBtn = card.querySelector('[data-action="confirm-change-spool"]');
    if(confirmBtn){
      confirmBtn.addEventListener('click', () => {
        const select = card.querySelector('[data-action="change-spool-select"]');
        const stockId = select ? select.value : '';
        const st = stock.find(x=>x.id===stockId);
        if(!st || st.qty<=0) return;

        const p = printers.find(x=>x.id===id);
        // Retire whatever's currently loaded — keeps its history, just takes
        // it out of rotation — rather than deleting it outright.
        if(p.spoolId){
          const oldSpool = spools.find(x=>x.id===p.spoolId);
          if(oldSpool) oldSpool.retired = true;
        }
        // Pull a fresh one from Stock.
        st.qty -= 1;
        const newSpool = {
          id: uid('spool'), label: st.label, material: st.material, colorHex: st.colorHex,
          totalG: st.weightPerSpoolG, remainingG: st.weightPerSpoolG, retired: false,
          loadedAt: new Date().toISOString(), loadedOnPrinterId: id
        };
        spools.push(newSpool);
        p.spoolId = newSpool.id;

        changeSpoolOpenFor.delete(id);
        saveSpools(); saveStock(); savePrinters();
        renderPrinters(); renderFilament(); regenerateIfActive();
      });
    }
  });

  document.getElementById('ps-add-printer').addEventListener('click', () => {
    const newPartInstalls = {};
    partDefs.forEach(pd => { newPartInstalls[pd.id] = {installedAt: new Date().toISOString(), notified:false}; });
    printers.push({id: uid('printer'), name: 'New printer', status:'active', spoolId:null, partInstalls: newPartInstalls});
    savePrinters(); renderPrinters(); regenerateIfActive();
  });
}

// ---------- rendering: Log tab ----------
let editingLogId = null;
let editingJobId = null; // which active job's "units done" is showing the edit form
let failingLogId = null; // which entry is showing the "confirm failed — how much filament?" prompt
let splittingLogId = null; // which batch entry is showing the "how many of these failed?" prompt
// Which past days/weeks a person has manually expanded, keyed by
// "machineId|dateKey" or "machineId|weekStartDateKey". Session-only — not
// persisted, and not relevant for Theoretical view (no "past" there since
// nothing's actually happened yet).
let expandedPastDays = new Set();
let expandedPastWeeks = new Set();

function renderLog(){
  const root = document.getElementById('ps-tab-log');
  const printerOptions = printers.map(p => `<option value="${p.id}">${escapeHtml(p.name)}${p.status==='down'?' (down)':''}</option>`).join('');
  const productOptions = catalog.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');

  const resolved = productionLog.filter(e => !e.isTest && (e.failed || e.actualEnd));
  const totalFailures = resolved.filter(e=>e.failed).length;
  const failureRate = resolved.length>0 ? (totalFailures/resolved.length*100) : 0;
  const perPrinterStats = printers.map(p => {
    const pResolved = resolved.filter(e=>e.printerId===p.id);
    const pFailed = pResolved.filter(e=>e.failed).length;
    return {name: p.name, failed: pFailed, total: pResolved.length, rate: pResolved.length>0 ? (pFailed/pResolved.length*100) : null};
  }).filter(s => s.total>0);

  const entries = productionLog.slice().sort((a,b) => new Date(b.actualStart) - new Date(a.actualStart));
  const rows = entries.map(e => {
    const printer = printers.find(p=>p.id===e.printerId);
    const product = catalog.find(p=>p.id===e.productId);

    if(e.id === failingLogId){
      const elapsedMin = Math.max(0, ((e.actualEnd ? new Date(e.actualEnd) : new Date()) - new Date(e.actualStart))/60000);
      const fullWeight = e.weightGAtLogTime || 0;
      const estimate = (e.plannedMin>0 && fullWeight>0)
        ? Math.round(Math.min(1, elapsedMin/e.plannedMin) * fullWeight)
        : fullWeight;
      return `
        <div class="ps-log-entry" data-id="${e.id}">
          <div style="width:100%;">
            <div class="ps-hint" style="margin-bottom:8px;">Marking <b style="color:var(--text);">${escapeHtml(product?product.name:'(deleted product)')}</b> failed — how much filament actually got used before it died? Full model weight is ${fullWeight}g; a rough time-based guess is prefilled below.</div>
            <div class="ps-row" style="align-items:flex-end;">
              <div class="ps-field" style="margin-bottom:0;">
                <span class="ps-field-label">Filament actually used (g)</span>
                <input class="ps-input ps-narrow" style="width:90px;" type="number" min="0" id="ps-fail-weight-${e.id}" value="${estimate}" />
              </div>
              <div class="ps-field" style="margin-bottom:0;flex:1;min-width:180px;">
                <span class="ps-field-label">Note (optional)</span>
                <input class="ps-input" type="text" id="ps-fail-note-${e.id}" placeholder="e.g. bed adhesion, my fault — wrong nozzle temp" value="${escapeHtml(e.failureNote||'')}" />
              </div>
              <button class="ps-btn primary small" data-action="confirm-fail">Confirm Failed</button>
              <button class="ps-btn ghost small" data-action="cancel-fail">Cancel</button>
            </div>
          </div>
        </div>
      `;
    }

    if(e.id === splittingLogId){
      const fullWeight = e.weightGAtLogTime || 0;
      const maxFail = (e.unitsCompleted||1) - 1;
      const defaultFailCount = 1;
      const proportionalWeight = fullWeight>0 ? Math.round(fullWeight * (defaultFailCount/(e.unitsCompleted||1))) : 0;
      return `
        <div class="ps-log-entry" data-id="${e.id}">
          <div style="width:100%;">
            <div class="ps-hint" style="margin-bottom:8px;">Splitting <b style="color:var(--text);">${escapeHtml(product?product.name:'(deleted product)')}</b> (${e.unitsCompleted}× batch) — how many of these actually failed? The rest stay credited as successful; the failed ones get their own entry with no quantity or job credit.</div>
            <div class="ps-row" style="align-items:flex-end;flex-wrap:wrap;">
              <div class="ps-field" style="margin-bottom:0;">
                <span class="ps-field-label">How many failed (of ${e.unitsCompleted})</span>
                <input class="ps-input ps-narrow" style="width:70px;" type="number" min="1" max="${maxFail}" id="ps-split-count-${e.id}" value="${defaultFailCount}" />
              </div>
              <div class="ps-field" style="margin-bottom:0;">
                <span class="ps-field-label">Filament wasted on those (g)</span>
                <input class="ps-input ps-narrow" style="width:90px;" type="number" min="0" id="ps-split-weight-${e.id}" value="${proportionalWeight}" />
              </div>
              <div class="ps-field" style="margin-bottom:0;flex:1;min-width:180px;">
                <span class="ps-field-label">Note (optional)</span>
                <input class="ps-input" type="text" id="ps-split-note-${e.id}" placeholder="e.g. bed adhesion, my fault — wrong nozzle temp" />
              </div>
              <button class="ps-btn primary small" data-action="confirm-split">Confirm Split</button>
              <button class="ps-btn ghost small" data-action="cancel-split">Cancel</button>
            </div>
            <div class="ps-hint" style="margin-top:6px;">Full plate was logged at ${fullWeight}g — the successful units keep whatever's left after the failed portion above.</div>
          </div>
        </div>
      `;
    }

    if(e.id === editingLogId){
      const pOpts = printers.map(p => `<option value="${p.id}" ${p.id===e.printerId?'selected':''}>${escapeHtml(p.name)}${p.status==='down'?' (down)':''}</option>`).join('');
      const dOpts = catalog.map(p => `<option value="${p.id}" ${p.id===e.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
      const testDOpts = `<option value="">— not a specific product —</option>` + catalog.map(p => `<option value="${p.id}" ${e.productId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
      const isTestEdit = !!e.isTest;
      return `
        <div class="ps-log-entry" data-id="${e.id}" data-editing="1" style="flex-direction:column;align-items:stretch;">
          <label class="ps-row" style="gap:6px;margin-bottom:10px;cursor:pointer;">
            <input type="checkbox" data-edit-field="isTest" ${isTestEdit?'checked':''} />
            <span class="ps-hint">Test / R&D print — not for an order, doesn't touch quantities or failure stats</span>
          </label>
          <div class="ps-row" style="flex-wrap:wrap; width:100%; align-items:flex-end;">
            <div class="ps-field" style="flex:1;min-width:150px;margin-bottom:0;">
              <span class="ps-field-label">Printer</span>
              <select class="ps-select" data-edit-field="printerId">${pOpts}</select>
            </div>
            <div class="ps-field" id="ps-edit-product-field" style="flex:1;min-width:150px;margin-bottom:0;${isTestEdit?'display:none;':''}">
              <span class="ps-field-label">Product</span>
              <select class="ps-select" data-edit-field="productId">${dOpts}</select>
            </div>
            <div class="ps-field" id="ps-edit-batch-field" style="flex:1;min-width:150px;margin-bottom:0;${isTestEdit?'display:none;':''}">
              <span class="ps-field-label">Batch</span>
              <select class="ps-select" data-edit-field="batchConfigId"></select>
            </div>
            <div class="ps-field" id="ps-edit-job-field" style="flex:1;min-width:150px;margin-bottom:0;${isTestEdit?'display:none;':''}">
              <span class="ps-field-label">Job</span>
              <select class="ps-select" data-edit-field="jobId"></select>
            </div>
            <div class="ps-field" id="ps-edit-testproduct-field" style="flex:1;min-width:150px;margin-bottom:0;${isTestEdit?'':'display:none;'}">
              <span class="ps-field-label">Product (optional)</span>
              <select class="ps-select" data-edit-field="testProductId">${testDOpts}</select>
            </div>
            <div class="ps-field" id="ps-edit-testlabel-field" style="flex:1;min-width:150px;margin-bottom:0;${isTestEdit?'':'display:none;'}">
              <span class="ps-field-label">Note</span>
              <input class="ps-input" data-edit-field="testLabel" value="${escapeHtml(e.testLabel||'')}" />
            </div>
            <div class="ps-field" id="ps-edit-testweight-field" style="flex:1;min-width:100px;margin-bottom:0;${isTestEdit?'':'display:none;'}">
              <span class="ps-field-label">Filament (g)</span>
              <input class="ps-input" type="number" min="0" data-edit-field="testWeight" value="${e.isTest ? (e.weightGAtLogTime||0) : 0}" />
            </div>
            <div class="ps-field" style="flex:1;min-width:170px;margin-bottom:0;">
              <span class="ps-field-label">Actual start</span>
              <input class="ps-input" type="datetime-local" data-edit-field="actualStart" value="${toLocalInputValue(new Date(e.actualStart))}" />
            </div>
            <div class="ps-field" style="flex:1;min-width:170px;margin-bottom:0;">
              <span class="ps-field-label">Actual finish</span>
              <div class="ps-row" style="gap:6px;align-items:center;">
                <input class="ps-input" type="datetime-local" data-edit-field="actualEnd" value="${e.actualEnd ? toLocalInputValue(new Date(e.actualEnd)) : ''}" style="flex:1;" />
                ${e.actualEnd ? `<button class="ps-btn ghost small" data-action="clear-finish" title="Still printing — not actually finished yet">Clear</button>` : ''}
              </div>
            </div>
            ${e.failed ? `
            <div class="ps-field" style="flex:1;min-width:220px;margin-bottom:0;">
              <span class="ps-field-label">Failure note (optional)</span>
              <input class="ps-input" type="text" data-edit-field="failureNote" placeholder="e.g. bed adhesion, my fault — wrong nozzle temp" value="${escapeHtml(e.failureNote||'')}" />
            </div>` : ''}
            <div class="ps-row" style="gap:6px;">
              <button class="ps-btn primary small" data-action="save">Save</button>
              <button class="ps-btn ghost small" data-action="cancel">Cancel</button>
            </div>
          </div>
          <div class="ps-hint" style="margin-top:6px;">Converting between normal and test here correctly gives back (or claims) quantity, filament, and job credit — nothing gets double-counted or lost.</div>
        </div>
      `;
    }

    const durationText = e.actualEnd
      ? fmtDuration((new Date(e.actualEnd)-new Date(e.actualStart))/60000)
      : null;
    const statusLine = e.failed
      ? `<span style="color:var(--danger)">✕ failed</span> — ${durationText} before it was stopped`
      : (e.actualEnd ? '→ '+fmtLogTime(e.actualEnd)+' ('+durationText+')' : '— still printing');
    const testDesc = e.isTest
      ? (product && e.testLabel ? `${escapeHtml(product.name)} — ${escapeHtml(e.testLabel)}`
        : product ? escapeHtml(product.name)
        : e.testLabel ? escapeHtml(e.testLabel)
        : '(untitled test)')
      : null;
    const titleText = e.isTest ? `<span class="ps-hint" style="text-transform:uppercase;font-weight:700;letter-spacing:0.4px;">Test</span> ${testDesc}` : `${e.unitsCompleted>1?e.unitsCompleted+'× ':''}${escapeHtml(product?product.name:'(deleted product)')}`;
    const jobForEntry = (!e.isTest && e.jobId) ? jobs.find(j=>j.id===e.jobId) : null;
    const jobLine = (!e.isTest && e.jobId) ? `<div class="ps-hint mono">Job: ${jobForEntry ? escapeHtml(jobForEntry.name) : '(deleted job)'}</div>` : '';
    const failureNoteLine = (e.failed && e.failureNote) ? `<div class="ps-hint" style="color:var(--danger);">Note: ${escapeHtml(e.failureNote)}</div>` : '';
    return `
      <div class="ps-log-entry ${e.failed?'ps-log-failed':''}" data-id="${e.id}">
        <div>
          <b>${titleText}</b> on ${escapeHtml(printer?printer.name:'(deleted printer)')}${e.isTest && e.weightGAtLogTime>0 ? ' — '+e.weightGAtLogTime+'g' : ''}
          <div class="mono">${fmtLogTime(e.actualStart)} ${statusLine}</div>
          ${jobLine}
          ${failureNoteLine}
        </div>
        <div class="ps-row" style="gap:6px;">
          ${!e.actualEnd && !e.failed ? '<button class="ps-btn small" data-action="finish">Mark finished now</button>' : ''}
          ${!e.isTest && !e.failed && (e.unitsCompleted||1)>1 ? '<button class="ps-btn ghost small" data-action="split">Some failed…</button>' : ''}
          ${!e.failed
            ? `<button class="ps-btn ghost small" style="color:var(--danger)" data-action="${e.isTest?'fail-test':'fail'}">Mark failed</button>`
            : '<button class="ps-btn ghost small" data-action="unfail">Undo failure</button>'}
          <button class="ps-btn ghost small" data-action="edit">Edit</button>
          <button class="ps-btn ghost small" data-action="delete">✕</button>
        </div>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    ${resolved.length>0 ? `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Failure Stats</div>
      <div class="ps-summary-grid" style="grid-template-columns:repeat(2,1fr);">
        <div class="ps-summary-cell"><div class="ps-summary-num">${totalFailures}</div><div class="ps-summary-label">Total failures</div></div>
        <div class="ps-summary-cell"><div class="ps-summary-num">${failureRate.toFixed(1)}%</div><div class="ps-summary-label">Failure rate (${totalFailures} of ${resolved.length})</div></div>
      </div>
      ${perPrinterStats.length>0 ? `
      <div style="margin-top:12px;">
        ${perPrinterStats.map(s => `
          <div class="ps-row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12.5px;">
            <span>${escapeHtml(s.name)}</span>
            <span class="mono ps-hint">${s.failed} / ${s.total} — ${s.rate.toFixed(1)}%</span>
          </div>
        `).join('')}
      </div>
      ` : ''}
    </div>
    ` : ''}
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Log a Print</div>
      <label class="ps-row" style="gap:6px;margin-bottom:12px;cursor:pointer;">
        <input type="checkbox" id="ps-log-istest" />
        <span class="ps-hint">Test / R&D print — not for an order, doesn't touch quantities or failure stats</span>
      </label>
      <div class="ps-row" style="align-items:flex-end; flex-wrap:wrap;">
        <div class="ps-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Printer</span>
          <select class="ps-select" id="ps-log-printer">${printerOptions}</select>
        </div>
        <div class="ps-field" id="ps-log-product-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Product</span>
          <select class="ps-select" id="ps-log-product">${productOptions}</select>
        </div>
        <div class="ps-field" id="ps-log-batch-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Batch</span>
          <select class="ps-select" id="ps-log-batch"></select>
        </div>
        <div class="ps-field" id="ps-log-job-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Job</span>
          <select class="ps-select" id="ps-log-job"></select>
        </div>
        <div class="ps-field" id="ps-log-testproduct-field" style="flex:1;min-width:160px;margin-bottom:0;display:none;">
          <span class="ps-field-label">Product (optional)</span>
          <select class="ps-select" id="ps-log-testproduct">
            <option value="">— not a specific product —</option>
            ${productOptions}
          </select>
        </div>
        <div class="ps-field" id="ps-log-testlabel-field" style="flex:1;min-width:160px;margin-bottom:0;display:none;">
          <span class="ps-field-label">Note (optional if product picked)</span>
          <input class="ps-input" id="ps-log-testlabel" placeholder="e.g. new retraction settings" />
        </div>
        <div class="ps-field" id="ps-log-testweight-field" style="flex:1;min-width:120px;margin-bottom:0;display:none;">
          <span class="ps-field-label">Filament used (g)</span>
          <input class="ps-input" type="number" min="0" id="ps-log-testweight" value="0" />
        </div>
        <div class="ps-field" style="flex:1;min-width:180px;margin-bottom:0;">
          <span class="ps-field-label">Actual start</span>
          <input class="ps-input" type="datetime-local" id="ps-log-start" autocomplete="off" value="${toLocalInputValue(new Date())}" />
        </div>
        <div class="ps-field" style="flex:1;min-width:180px;margin-bottom:0;">
          <span class="ps-field-label">Actual finish (optional)</span>
          <input class="ps-input" type="datetime-local" id="ps-log-end" />
        </div>
      </div>
      <div class="ps-row" style="margin-top:14px;">
        <button class="ps-btn primary" id="ps-log-submit">Log print</button>
      </div>
      <div id="ps-log-busy-warning"></div>
      <div class="ps-hint" style="margin-top:12px;">Logging a start time ripples the Live Schedule forward from that printer's real progress. Adding a finish time (now or later, via "Mark finished now") also feeds the average print-time hints you'll see on the Catalog tab.</div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>History</div>
      ${entries.length===0 ? '<div class="ps-empty">Nothing logged yet.</div>' : rows}
    </div>
  `;

  const testCheckbox = document.getElementById('ps-log-istest');
  testCheckbox.addEventListener('change', () => {
    const isTest = testCheckbox.checked;
    document.getElementById('ps-log-product-field').style.display = isTest ? 'none' : '';
    document.getElementById('ps-log-batch-field').style.display = isTest ? 'none' : '';
    document.getElementById('ps-log-job-field').style.display = isTest ? 'none' : '';
    document.getElementById('ps-log-testproduct-field').style.display = isTest ? '' : 'none';
    document.getElementById('ps-log-testlabel-field').style.display = isTest ? '' : 'none';
    document.getElementById('ps-log-testweight-field').style.display = isTest ? '' : 'none';
  });

  function refreshBatchOptions(){
    const product = catalog.find(x=>x.id===document.getElementById('ps-log-product').value);
    const batchSelect = document.getElementById('ps-log-batch');
    if(!product){ batchSelect.innerHTML = ''; return; }
    const printerId = document.getElementById('ps-log-printer').value;
    const resolved = getProductTimeWeight(product, printerId);
    const hasOverride = !!(printerId && product.printerOverrides && product.printerOverrides[printerId]);
    const options = [`<option value="">Single unit — ${fmtDuration(resolved.timeH*60+resolved.timeM)}${resolved.weightG>0?', '+resolved.weightG+'g':''}${hasOverride?' (this printer)':''}</option>`];
    product.batchConfigs.forEach(cfg => {
      options.push(`<option value="${cfg.id}">${cfg.unitsPerBatch}× batch — ${fmtDuration(cfg.timeH*60+cfg.timeM)}${cfg.weightG>0?', '+cfg.weightG+'g':''}</option>`);
    });
    batchSelect.innerHTML = options.join('');
  }
  refreshBatchOptions();
  document.getElementById('ps-log-product').addEventListener('change', refreshBatchOptions);
  document.getElementById('ps-log-printer').addEventListener('change', refreshBatchOptions);

  function refreshJobOptions(){
    const productId = document.getElementById('ps-log-product').value;
    const jobSelect = document.getElementById('ps-log-job');
    const candidates = jobs.filter(j => j.status==='active' && j.items.some(it=>it.id===productId));
    const options = [`<option value="">— no job —</option>`];
    candidates.forEach(j => { options.push(`<option value="${j.id}">${escapeHtml(j.name)}</option>`); });
    jobSelect.innerHTML = options.join('');
    // Zero extra clicks in the common case — if exactly one active job wants
    // this product, pre-select it. Still fully visible and changeable, never
    // hidden or silently applied.
    if(candidates.length===1) jobSelect.value = candidates[0].id;
  }
  refreshJobOptions();
  document.getElementById('ps-log-product').addEventListener('change', refreshJobOptions);

  const testProductSelect = document.getElementById('ps-log-testproduct');
  testProductSelect.addEventListener('change', () => {
    const p = catalog.find(x=>x.id===testProductSelect.value);
    if(p && p.weightG>0){
      document.getElementById('ps-log-testweight').value = p.weightG;
    }
  });

  let busyWarningConfirmed = false;
  document.getElementById('ps-log-printer').addEventListener('change', () => {
    busyWarningConfirmed = false;
    document.getElementById('ps-log-busy-warning').innerHTML = '';
  });
  document.getElementById('ps-log-submit').addEventListener('click', () => {
    const printerIdCheck = document.getElementById('ps-log-printer').value;
    if(printerIdCheck && !busyWarningConfirmed){
      const alreadyActive = productionLog.find(e => e.printerId===printerIdCheck && !e.actualEnd);
      if(alreadyActive){
        const activeProduct = catalog.find(p=>p.id===alreadyActive.productId);
        const activeName = alreadyActive.isTest ? (alreadyActive.testLabel || 'a test print') : (activeProduct ? activeProduct.name : '(deleted product)');
        const printerName = (printers.find(p=>p.id===printerIdCheck)||{}).name || 'This printer';
        document.getElementById('ps-log-busy-warning').innerHTML = `
          <div class="ps-warnbox" style="margin-top:10px;">
            ${escapeHtml(printerName)} still shows <b>${escapeHtml(activeName)}</b> as in progress, started ${fmtLogTime(alreadyActive.actualStart)} — logging this too means the printer will show two active prints at once. Sure that's right?
            <div class="ps-row" style="margin-top:8px;gap:6px;">
              <button class="ps-btn small" id="ps-log-busy-confirm">Log anyway</button>
              <button class="ps-btn ghost small" id="ps-log-busy-cancel">Cancel</button>
            </div>
          </div>
        `;
        document.getElementById('ps-log-busy-confirm').addEventListener('click', () => {
          busyWarningConfirmed = true;
          document.getElementById('ps-log-busy-warning').innerHTML = '';
          document.getElementById('ps-log-submit').click();
        });
        document.getElementById('ps-log-busy-cancel').addEventListener('click', () => {
          document.getElementById('ps-log-busy-warning').innerHTML = '';
        });
        return;
      }
    }
    busyWarningConfirmed = false;
    const isTest = document.getElementById('ps-log-istest').checked;
    const printerId = document.getElementById('ps-log-printer').value;
    const startVal = document.getElementById('ps-log-start').value;
    const endVal = document.getElementById('ps-log-end').value;
    const printer = printers.find(p=>p.id===printerId);

    if(isTest){
      const testProductId = document.getElementById('ps-log-testproduct').value || null;
      const testLabel = document.getElementById('ps-log-testlabel').value.trim();
      const testWeight = Math.max(0, parseFloat(document.getElementById('ps-log-testweight').value)||0);
      if(!printerId || (!testProductId && !testLabel) || !startVal) return;
      const testProduct = testProductId ? catalog.find(p=>p.id===testProductId) : null;
      const testPlannedMin = testProduct ? (testProduct.timeH*60+testProduct.timeM) : 0;
      productionLog.push({
        id: uid('log'),
        printerId, productId: testProductId, isTest: true, testLabel,
        actualStart: new Date(startVal).toISOString(),
        actualEnd: endVal ? new Date(endVal).toISOString() : null,
        plannedMin: testPlannedMin,
        weightGAtLogTime: testWeight,
        spoolIdAtLogTime: printer ? (printer.spoolId||null) : null,
        consumed: true // no order impact regardless of whether a product is tied to it
      });
    } else {
      const productId = document.getElementById('ps-log-product').value;
      if(!printerId || !productId || !startVal) return;
      const product = catalog.find(p=>p.id===productId);
      const batchConfigId = document.getElementById('ps-log-batch').value || null;
      const batchConfig = batchConfigId && product ? product.batchConfigs.find(c=>c.id===batchConfigId) : null;
      const resolved = product ? getProductTimeWeight(product, printerId) : {timeH:0, timeM:0, weightG:0};
      const plannedMin = batchConfig ? (batchConfig.timeH*60+batchConfig.timeM) : (resolved.timeH*60+resolved.timeM);
      const weightAtLog = batchConfig ? (batchConfig.weightG||0) : (resolved.weightG||0);
      const unitsCompleted = batchConfig ? batchConfig.unitsPerBatch : 1;
      const selectedJobId = document.getElementById('ps-log-job').value || null;
      const newEntry = {
        id: uid('log'),
        printerId, productId,
        actualStart: new Date(startVal).toISOString(),
        actualEnd: endVal ? new Date(endVal).toISOString() : null,
        plannedMin,
        weightGAtLogTime: weightAtLog,
        spoolIdAtLogTime: printer ? (printer.spoolId||null) : null,
        unitsCompleted,
        jobId: selectedJobId,
        jobCounted: false
      };
      creditJobIfDue(newEntry);
      productionLog.push(newEntry);
    }
    // Logging a print permanently claims one unit from the queue — it doesn't
    // come back on its own the next day. Deleting or re-pointing this entry
    // (see below) reverses it. Test prints skip that entirely (consumed:true
    // above), but still draw down the spool like any real print would.
    syncConsumption();
    renderLog(); regenerateIfActive();
  });

  root.querySelectorAll('.ps-log-entry').forEach(row => {
    const id = row.getAttribute('data-id');

    if(row.getAttribute('data-editing')){
      const editTestCheckbox = row.querySelector('[data-edit-field="isTest"]');
      editTestCheckbox.addEventListener('change', () => {
        const checked = editTestCheckbox.checked;
        row.querySelector('#ps-edit-product-field').style.display = checked ? 'none' : '';
        row.querySelector('#ps-edit-batch-field').style.display = checked ? 'none' : '';
        row.querySelector('#ps-edit-job-field').style.display = checked ? 'none' : '';
        row.querySelector('#ps-edit-testproduct-field').style.display = checked ? '' : 'none';
        row.querySelector('#ps-edit-testlabel-field').style.display = checked ? '' : 'none';
        row.querySelector('#ps-edit-testweight-field').style.display = checked ? '' : 'none';
      });
      function refreshEditBatchOptions(){
        const e = productionLog.find(x=>x.id===id);
        const productId = row.querySelector('[data-edit-field="productId"]').value;
        const product = catalog.find(p=>p.id===productId);
        const batchSelect = row.querySelector('[data-edit-field="batchConfigId"]');
        if(!product){ batchSelect.innerHTML = ''; return; }
        const editPrinterId = row.querySelector('[data-edit-field="printerId"]').value;
        const resolved = getProductTimeWeight(product, editPrinterId);
        const options = [`<option value="">Single unit — ${fmtDuration(resolved.timeH*60+resolved.timeM)}${resolved.weightG>0?', '+resolved.weightG+'g':''}</option>`];
        (product.batchConfigs||[]).forEach(cfg => {
          options.push(`<option value="${cfg.id}">${cfg.unitsPerBatch}× batch — ${fmtDuration(cfg.timeH*60+cfg.timeM)}${cfg.weightG>0?', '+cfg.weightG+'g':''}</option>`);
        });
        batchSelect.innerHTML = options.join('');
        // There's no stored reference to which specific batch an existing
        // entry used (only the resulting time/weight/units), so this can't
        // reliably pre-select the original batch — it starts on Single
        // unit and the person picks the right one if they're fixing a
        // mis-logged entry.
      }
      refreshEditBatchOptions();
      row.querySelector('[data-edit-field="productId"]').addEventListener('change', refreshEditBatchOptions);
      row.querySelector('[data-edit-field="printerId"]').addEventListener('change', refreshEditBatchOptions);

      function refreshEditJobOptions(preserveCurrent){
        const e = productionLog.find(x=>x.id===id);
        const productId = row.querySelector('[data-edit-field="productId"]').value;
        const jobSelect = row.querySelector('[data-edit-field="jobId"]');
        const candidates = jobs.filter(j => j.status==='active' && j.items.some(it=>it.id===productId));
        const currentJob = e.jobId ? jobs.find(j=>j.id===e.jobId) : null;
        const options = [`<option value="">— no job —</option>`];
        const seen = new Set();
        candidates.forEach(j => { options.push(`<option value="${j.id}">${escapeHtml(j.name)}</option>`); seen.add(j.id); });
        if(preserveCurrent && currentJob && !seen.has(currentJob.id)){
          options.push(`<option value="${currentJob.id}">${escapeHtml(currentJob.name)} (current)</option>`);
        }
        jobSelect.innerHTML = options.join('');
        // Only pre-fill with what's already there on the very first render —
        // changing product or printer afterward resets to "no job" instead
        // of silently carrying over a selection that may no longer be
        // right, forcing a deliberate re-pick.
        jobSelect.value = preserveCurrent ? (e.jobId || '') : '';
      }
      refreshEditJobOptions(true);
      row.querySelector('[data-edit-field="productId"]').addEventListener('change', () => refreshEditJobOptions(false));
      row.querySelector('[data-edit-field="printerId"]').addEventListener('change', () => refreshEditJobOptions(false));
      const clearFinishBtn = row.querySelector('[data-action="clear-finish"]');
      if(clearFinishBtn){
        clearFinishBtn.addEventListener('click', () => {
          row.querySelector('[data-edit-field="actualEnd"]').value = '';
          clearFinishBtn.style.display = 'none';
        });
      }
      row.querySelector('[data-action="save"]').addEventListener('click', () => {
        const e = productionLog.find(x=>x.id===id);
        const printerId = row.querySelector('[data-edit-field="printerId"]').value;
        const startVal = row.querySelector('[data-edit-field="actualStart"]').value;
        const endVal = row.querySelector('[data-edit-field="actualEnd"]').value;
        const newIsTest = editTestCheckbox.checked;
        if(!printerId || !startVal) return;

        const printer = printers.find(p=>p.id===printerId);

        // Unwind everything this entry currently claims — qty, spool
        // weight, job credit — using its state as it was *before* this
        // edit. Then re-derive all of it fresh from the new field values.
        // Converting between normal and test (or changing product/printer)
        // is much safer as "undo everything, recompute everything" than as
        // a set of special-cased branches — that's exactly the kind of
        // thing that kept breaking when patched piecemeal.
        if(e.consumed && !e.failed && !e.isTest && e.productId){
          getOrderEntry(e.productId).qty += (e.unitsCompleted||1);
        }
        if(e.spoolConsumed && e.spoolIdAtLogTime){
          const oldSpool = spools.find(s=>s.id===e.spoolIdAtLogTime);
          if(oldSpool){ oldSpool.remainingG += (e.weightGAtLogTime||0); }
        }
        if(e.jobCounted){
          applyJobCredit(e, -(e.unitsCompleted||1));
        }

        let newProductId, newPlannedMin, newWeight, newTestLabel, newUnitsCompleted;
        if(newIsTest){
          newProductId = row.querySelector('[data-edit-field="testProductId"]').value || null;
          newTestLabel = row.querySelector('[data-edit-field="testLabel"]').value.trim();
          if(!newProductId && !newTestLabel) return;
          const testProduct = newProductId ? catalog.find(p=>p.id===newProductId) : null;
          newPlannedMin = testProduct ? (testProduct.timeH*60+testProduct.timeM) : 0;
          newWeight = Math.max(0, parseFloat(row.querySelector('[data-edit-field="testWeight"]').value)||0);
          newUnitsCompleted = 1;
        } else {
          newProductId = row.querySelector('[data-edit-field="productId"]').value;
          if(!newProductId) return;
          const product = catalog.find(p=>p.id===newProductId);
          const batchConfigId = row.querySelector('[data-edit-field="batchConfigId"]').value || null;
          const batchConfig = batchConfigId && product ? (product.batchConfigs||[]).find(c=>c.id===batchConfigId) : null;
          const resolved = product ? getProductTimeWeight(product, printerId) : {timeH:0, timeM:0, weightG:0};
          newPlannedMin = batchConfig ? (batchConfig.timeH*60+batchConfig.timeM) : (resolved.timeH*60+resolved.timeM);
          newWeight = batchConfig ? (batchConfig.weightG||0) : (resolved.weightG||0);
          newUnitsCompleted = batchConfig ? batchConfig.unitsPerBatch : 1;
          newTestLabel = '';
        }

        e.isTest = newIsTest;
        e.testLabel = newTestLabel;
        e.printerId = printerId;
        e.productId = newProductId;
        e.plannedMin = newPlannedMin;
        e.weightGAtLogTime = newWeight;
        e.unitsCompleted = newUnitsCompleted;
        e.spoolIdAtLogTime = printer ? (printer.spoolId||null) : null;
        e.actualStart = new Date(startVal).toISOString();
        e.notifiedFinishSoon = false;
        e.actualEnd = endVal ? new Date(endVal).toISOString() : null;
        e.jobId = newIsTest ? null : (row.querySelector('[data-edit-field="jobId"]').value || null);
        e.jobCounted = false;
        e.spoolConsumed = false; // let syncConsumption redo the weight deduction fresh
        e.consumed = (newIsTest || e.failed) ? true : false; // tests and failed entries stay locked; normal ones get (re)claimed by syncConsumption below
        const noteField = row.querySelector('[data-edit-field="failureNote"]');
        if(noteField) e.failureNote = noteField.value.trim();

        creditJobIfDue(e);
        editingLogId = null;
        syncConsumption();
        renderLog(); regenerateIfActive();
      });
      row.querySelector('[data-action="cancel"]').addEventListener('click', () => {
        editingLogId = null;
        renderLog();
      });
      return;
    }

    const finishBtn = row.querySelector('[data-action="finish"]');
    if(finishBtn){
      finishBtn.addEventListener('click', () => {
        const e = productionLog.find(x=>x.id===id);
        e.actualEnd = new Date().toISOString();
        creditJobIfDue(e);
        saveLog(); renderLog(); regenerateIfActive();
      });
    }
    const failBtn = row.querySelector('[data-action="fail"]');
    if(failBtn){
      failBtn.addEventListener('click', () => {
        failingLogId = id;
        renderLog();
      });
    }
    const splitBtn = row.querySelector('[data-action="split"]');
    if(splitBtn){
      splitBtn.addEventListener('click', () => {
        splittingLogId = id;
        renderLog();
      });
    }
    const confirmSplitBtn = row.querySelector('[data-action="confirm-split"]');
    if(confirmSplitBtn){
      confirmSplitBtn.addEventListener('click', () => {
        const countInput = document.getElementById('ps-split-count-'+id);
        const weightInput = document.getElementById('ps-split-weight-'+id);
        const failCount = Math.max(1, parseInt(countInput.value)||1);
        const failWeightG = Math.max(0, parseFloat(weightInput.value)||0);
        const noteInput = document.getElementById('ps-split-note-'+id);
        const note = noteInput ? noteInput.value.trim() : '';
        splitBatchOutcome(id, failCount, failWeightG, note);
        splittingLogId = null;
        renderLog(); regenerateIfActive();
      });
    }
    const cancelSplitBtn = row.querySelector('[data-action="cancel-split"]');
    if(cancelSplitBtn){
      cancelSplitBtn.addEventListener('click', () => {
        splittingLogId = null;
        renderLog();
      });
    }
    const failTestBtn = row.querySelector('[data-action="fail-test"]');
    if(failTestBtn){
      failTestBtn.addEventListener('click', () => {
        markTestFailed(id);
        renderLog();
      });
    }
    const confirmFailBtn = row.querySelector('[data-action="confirm-fail"]');
    if(confirmFailBtn){
      confirmFailBtn.addEventListener('click', () => {
        const weightInput = document.getElementById('ps-fail-weight-'+id);
        const actualWeightG = Math.max(0, parseFloat(weightInput.value)||0);
        const noteInput = document.getElementById('ps-fail-note-'+id);
        const note = noteInput ? noteInput.value.trim() : '';
        markFailed(id, actualWeightG, note);
        failingLogId = null;
        renderLog(); regenerateIfActive();
      });
    }
    const cancelFailBtn = row.querySelector('[data-action="cancel-fail"]');
    if(cancelFailBtn){
      cancelFailBtn.addEventListener('click', () => {
        failingLogId = null;
        renderLog();
      });
    }
    const unfailBtn = row.querySelector('[data-action="unfail"]');
    if(unfailBtn){
      unfailBtn.addEventListener('click', () => {
        unmarkFailed(id);
        renderLog(); regenerateIfActive();
      });
    }
    const editBtn = row.querySelector('[data-action="edit"]');
    if(editBtn){
      editBtn.addEventListener('click', () => {
        editingLogId = id;
        renderLog();
      });
    }
    const deleteBtn = row.querySelector('[data-action="delete"]');
    if(deleteBtn){
      deleteBtn.addEventListener('click', () => {
        const removed = productionLog.find(x=>x.id===id);
        productionLog = productionLog.filter(x=>x.id!==id);
        if(removed && removed.consumed && !removed.failed && !removed.isTest && removed.productId){
          const orderEntry = getOrderEntry(removed.productId);
          orderEntry.qty += (removed.unitsCompleted||1);
          saveOrder();
        }
        if(removed && removed.spoolConsumed && removed.spoolIdAtLogTime){
          const spool = spools.find(s=>s.id===removed.spoolIdAtLogTime);
          if(spool){ spool.remainingG += (removed.weightGAtLogTime||0); saveSpools(); }
        }
        if(removed && removed.jobCounted){
          applyJobCredit(removed, -(removed.unitsCompleted||1));
        }
        saveLog(); renderLog(); regenerateIfActive();
      });
    }
  });
}


// ---------- rendering: Estimate tab ----------
function renderEstimate(){
  const root = document.getElementById('ps-tab-estimate');

  const availableProducts = catalog.filter(p => !estimateItems.some(it=>it.id===p.id));
  const addOptions = availableProducts.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');

  const rows = estimateItems.map((item, idx) => {
    const p = catalog.find(x=>x.id===item.id);
    if(!p) return '';
    const printMin = p.timeH*60 + p.timeM;
    const incomplete = printMin<=0;
    return `
      <tr data-id="${item.id}">
        <td>
          <div class="ps-row" style="gap:6px;">
            <button class="ps-btn ghost small" data-action="up" ${idx===0?'disabled':''}>↑</button>
            <button class="ps-btn ghost small" data-action="down" ${idx===estimateItems.length-1?'disabled':''}>↓</button>
          </div>
        </td>
        <td>
          ${renderTag(p.type)}
          &nbsp;${escapeHtml(p.name)}
          ${incomplete?'<span class="ps-hint" style="color:var(--danger)"> — no print time set</span>':''}
        </td>
        <td class="mono ps-hint">${incomplete? '—' : fmtDuration(printMin)}</td>
        <td class="mono ps-hint">${p.weightG>0 ? p.weightG+'g' : '—'}</td>
        <td><input class="ps-input ps-narrow" type="number" min="0" data-field="qty" value="${item.qty}" /></td>
        <td><button class="ps-btn ghost small" data-action="remove">✕</button></td>
      </tr>`;
  }).join('');

  const scenarioChips = Array.from({length: Math.max(printers.length,1)}, (_,i) => i+1).map(n => {
    const on = estimateScenarios.includes(n);
    return `<span class="ps-daycheck ${on?'on':''}" data-n="${n}">${on?'✓':'+'} ${n} printer${n!==1?'s':''}</span>`;
  }).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Scenario</div>
      <div class="ps-hint" style="margin-bottom:12px;">A scratch what-if — completely separate from your real order on the Schedule tab. Nothing here touches your queue, your quantities, or your filament stock.</div>
      ${estimateItems.length===0 ? '<div class="ps-empty">No products in this scenario yet — add some below.</div>' : `
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th style="width:60px">Order</th><th>Product</th><th style="width:80px">Print time</th><th style="width:70px">Weight</th><th style="width:70px">Qty</th><th style="width:36px"></th></tr></thead>
        <tbody id="ps-estimate-body">${rows}</tbody>
      </table>
      </div>
      `}
      <div class="ps-row" style="margin-top:14px;flex-wrap:wrap;">
        <select class="ps-select" id="ps-estimate-add-select" style="max-width:220px;">
          <option value="">Choose a product…</option>
          ${addOptions}
        </select>
        <button class="ps-btn" id="ps-estimate-add-btn" ${availableProducts.length===0?'disabled':''}>+ Add to scenario</button>
      </div>
    </div>

    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Printer Counts to Compare</div>
      <div class="ps-hint" style="margin-bottom:12px;">Based on your ${printers.length} configured printer${printers.length!==1?'s':''} — check which counts you want compared.</div>
      <div class="ps-row" style="gap:8px;flex-wrap:wrap;" id="ps-scenario-chips">${scenarioChips}</div>
    </div>

    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Filament Assumption</div>
      <div class="ps-field" style="max-width:220px;margin-bottom:0;">
        <span class="ps-field-label">Typical spool weight (g)</span>
        <input class="ps-input" type="number" min="1" id="ps-estimate-spool-g" value="${settings.estimateSpoolG}" />
      </div>
      <div class="ps-hint" style="margin-top:8px;">Only used to turn this scenario's total filament weight into a rough spool count below — not tied to your actual spool inventory on the Filament tab.</div>
    </div>

    <div class="ps-panel">
      <div class="ps-row">
        <button class="ps-btn primary" id="ps-estimate-run">Calculate</button>
        <button class="ps-btn" id="ps-estimate-clear">Clear scenario</button>
      </div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Save as Job</div>
      <div class="ps-hint" style="margin-bottom:10px;">Snapshots this product list as a named job on the Jobs tab, ready to move into the real production queue whenever you're ready — this scenario stays here untouched either way.</div>
      <div class="ps-row" style="flex-wrap:wrap;">
        <input class="ps-input" id="ps-estimate-jobname" placeholder="Job name" style="max-width:240px;" />
        <button class="ps-btn" id="ps-estimate-save-job" ${estimateItems.length===0?'disabled':''}>Save as Job</button>
      </div>
      <div id="ps-estimate-job-msg" class="ps-hint" style="margin-top:8px;"></div>
    </div>
    <div id="ps-estimate-output"></div>
  `;

  root.querySelectorAll('#ps-estimate-body tr').forEach(tr => {
    const id = tr.getAttribute('data-id');
    tr.querySelector('[data-field="qty"]').addEventListener('change', e => {
      const item = estimateItems.find(it=>it.id===id);
      if(item) item.qty = Math.max(0, parseInt(e.target.value)||0);
      saveEstimateItems();
    });
    tr.querySelector('[data-action="remove"]').addEventListener('click', () => {
      estimateItems = estimateItems.filter(it=>it.id!==id);
      saveEstimateItems(); renderEstimate();
    });
    const upBtn = tr.querySelector('[data-action="up"]');
    const downBtn = tr.querySelector('[data-action="down"]');
    if(upBtn) upBtn.addEventListener('click', () => moveEstimateItem(id, -1));
    if(downBtn) downBtn.addEventListener('click', () => moveEstimateItem(id, 1));
  });

  document.getElementById('ps-estimate-add-btn').addEventListener('click', () => {
    const sel = document.getElementById('ps-estimate-add-select');
    const id = sel.value;
    if(!id) return;
    estimateItems.push({id, qty: 1});
    saveEstimateItems(); renderEstimate();
  });

  root.querySelectorAll('#ps-scenario-chips .ps-daycheck').forEach(chip => {
    chip.addEventListener('click', () => {
      const n = parseInt(chip.getAttribute('data-n'));
      if(estimateScenarios.includes(n)) estimateScenarios = estimateScenarios.filter(x=>x!==n);
      else estimateScenarios.push(n);
      estimateScenarios.sort((a,b)=>a-b);
      saveEstimateScenarios(); renderEstimate();
    });
  });

  document.getElementById('ps-estimate-spool-g').addEventListener('change', (e) => {
    settings.estimateSpoolG = Math.max(1, parseFloat(e.target.value)||1000);
    saveSettings(); regenerateIfActive();
  });

  document.getElementById('ps-estimate-run').addEventListener('click', runEstimate);
  document.getElementById('ps-estimate-clear').addEventListener('click', () => {
    estimateItems = [];
    saveEstimateItems();
    document.getElementById('ps-estimate-output').innerHTML = '';
    renderEstimate();
  });
  const saveJobBtn = document.getElementById('ps-estimate-save-job');
  if(saveJobBtn){
    saveJobBtn.addEventListener('click', () => {
      const nameInput = document.getElementById('ps-estimate-jobname');
      const msgEl = document.getElementById('ps-estimate-job-msg');
      const name = nameInput.value.trim();
      if(estimateItems.length===0){ msgEl.textContent = 'Add at least one product first.'; return; }
      if(!name){ msgEl.textContent = 'Give the job a name first.'; return; }
      jobs.push({
        id: uid('job'),
        name,
        items: estimateItems.filter(it=>it.qty>0).map(it => ({id: it.id, qty: it.qty})),
        status: 'queued',
        createdAt: new Date().toISOString(),
        manualDone: 0
      });
      saveJobs();
      nameInput.value = '';
      msgEl.textContent = `Saved "${name}" to the Jobs tab.`;
      if(document.getElementById('ps-tab-jobs')) renderJobs();
    });
  }
}

function moveEstimateItem(id, dir){
  const idx = estimateItems.findIndex(it=>it.id===id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=estimateItems.length) return;
  [estimateItems[idx], estimateItems[newIdx]] = [estimateItems[newIdx], estimateItems[idx]];
  saveEstimateItems(); renderEstimate();
}

function runEstimate(){
  const outEl = document.getElementById('ps-estimate-output');
  if(!outEl) return;

  const missing = [];
  const queue = [];
  estimateItems.forEach(item => {
    if(item.qty<=0) return;
    const p = catalog.find(x=>x.id===item.id);
    if(!p) return;
    const printTimeMin = p.timeH*60 + p.timeM;
    if(printTimeMin<=0){ missing.push(p.name); return; }
    for(let i=0;i<item.qty;i++){
      queue.push({productId:item.id, name:p.name, type:p.type, weightG:p.weightG, printTimeMin, pin:null});
    }
  });

  if(missing.length>0){
    outEl.innerHTML = `<div class="ps-warnbox">Set a print time for: ${missing.map(escapeHtml).join(', ')} before calculating.</div>`;
    return;
  }
  if(queue.length===0){
    outEl.innerHTML = `<div class="ps-empty">Add at least one product with a quantity above 0 to calculate.</div>`;
    return;
  }
  if(estimateScenarios.filter(n => n <= Math.max(printers.length,1)).length===0){
    outEl.innerHTML = `<div class="ps-warnbox">Check at least one printer count to compare.</div>`;
    return;
  }
  if(settings.workDays.length===0){
    outEl.innerHTML = `<div class="ps-warnbox">No work days are checked on the Settings tab, so there's never a valid window to print in.</div>`;
    return;
  }
  const [wsH,wsM] = settings.startTime.split(':').map(Number);
  const [weH,weM] = settings.endTime.split(':').map(Number);
  if(wsH*60+wsM >= weH*60+weM){
    outEl.innerHTML = `<div class="ps-warnbox">On the Settings tab, the window closes at or before it opens — nothing can be scheduled.</div>`;
    return;
  }

  const totalWeight = queue.reduce((s,j)=>s+(j.weightG||0), 0);
  const spoolsNeeded = totalWeight>0 ? Math.ceil(totalWeight / settings.estimateSpoolG) : 0;
  const stockOnHand = spools.reduce((s,sp)=>s+sp.remainingG, 0);
  const stockDelta = stockOnHand - totalWeight;

  const scenarios = estimateScenarios.filter(n => n <= Math.max(printers.length,1)).map(n => {
    const simPrinters = Array.from({length:n}, (_,i) => ({id:'sim'+i, name:'Printer '+(i+1), status:'active'}));
    const result = buildMultiSchedule(queue, simPrinters, settings, 'theoretical');
    let lastEnd = null;
    result.machines.forEach(m => m.days.forEach(d => {
      if(d.jobs.length===0) return;
      const lastJob = d.jobs[d.jobs.length-1];
      if(!lastEnd || lastJob.end > lastEnd) lastEnd = lastJob.end;
    }));
    return {n, lastEnd, unassigned: result.unassigned.length};
  });

  const estimateNow = new Date();
  const scenarioCells = scenarios.map(s => `
    <div class="ps-summary-cell" style="flex:1;min-width:150px;">
      <div class="ps-summary-num">${s.lastEnd ? fmtSpan(estimateNow, s.lastEnd) : '—'}</div>
      <div class="ps-summary-label">${s.n} printer${s.n!==1?'s':''}</div>
      ${s.lastEnd ? `<div class="ps-hint mono" style="margin-top:4px;">done ${fmtDateHead(s.lastEnd)} ${fmtClock(s.lastEnd)}</div>` : ''}
      ${s.unassigned>0 ? `<div class="ps-hint" style="color:var(--danger)">${s.unassigned} unplaced</div>` : ''}
    </div>
  `).join('');

  const stockNote = totalWeight<=0 ? '' : (stockDelta>=0
    ? `<div class="ps-hint" style="margin-top:8px;">You have ${stockOnHand}g on hand across your tracked spools — enough, with ${stockDelta}g to spare.</div>`
    : `<div class="ps-hint" style="margin-top:8px;color:var(--danger)">You have ${stockOnHand}g on hand — short by ${Math.abs(stockDelta)}g (about ${Math.ceil(Math.abs(stockDelta)/settings.estimateSpoolG)} more spool${Math.ceil(Math.abs(stockDelta)/settings.estimateSpoolG)!==1?'s':''} at ${settings.estimateSpoolG}g each).</div>`);

  outEl.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Filament Needed</div>
      <div class="ps-summary-grid" style="grid-template-columns:repeat(2,1fr);">
        <div class="ps-summary-cell"><div class="ps-summary-num">${totalWeight>0?totalWeight+'g':'—'}</div><div class="ps-summary-label">Total filament</div></div>
        <div class="ps-summary-cell"><div class="ps-summary-num">${spoolsNeeded>0?'≈'+spoolsNeeded:'—'}</div><div class="ps-summary-label">Spools at ${settings.estimateSpoolG}g each</div></div>
      </div>

    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>How Long This Scenario Takes</div>

}

function renderFilament(){
  const root = document.getElementById('ps-tab-filament');

  // ---- Stock (unopened inventory) ----
  const stockRows = stock.map(st => `
    <tr data-id="${st.id}">
      <td><span class="ps-spool-swatch" style="background:${escapeHtml(st.colorHex||'#999')}"></span></td>
      <td><input class="ps-input ps-name" data-field="label" value="${escapeHtml(st.label)}" placeholder="e.g. PCTG Pro — Natural" /></td>
      <td><input class="ps-input" data-field="material" value="${escapeHtml(st.material)}" placeholder="Material" /></td>
      <td><input class="ps-input" type="color" style="max-width:44px;padding:2px;" data-field="colorHex" value="${st.colorHex||'#cccccc'}" /></td>
      <td><input class="ps-input ps-narrow" type="number" min="1" data-field="weightPerSpoolG" value="${st.weightPerSpoolG}" style="width:80px;" /></td>
      <td><input class="ps-input ps-narrow" type="number" min="0" data-field="qty" value="${st.qty}" /></td>
      <td><input class="ps-input ps-narrow" type="number" min="0" data-field="qtyOnOrder" value="${st.qtyOnOrder}" /></td>
      <td>${st.qtyOnOrder>0 ? `<button class="ps-btn small" data-action="receive-stock">Receive</button>` : ''}</td>
      <td><button class="ps-btn ghost small" data-action="remove-stock">✕</button></td>
    </tr>
  `).join('');

  // ---- Active spools (opened, in use or spare) ----
  const activeSpools = spools.filter(s => !s.retired);
  const retiredSpools = spools.filter(s => s.retired);

  function spoolCard(s, retired){
    const pct = s.totalG>0 ? Math.max(0,Math.min(100, ((s.totalG-s.remainingG)/s.totalG)*100)) : 0;
    const low = !retired && s.remainingG <= LOW_STOCK_G;
    const overConsumed = s.remainingG < 0;
    const logEntries = productionLog.filter(e => e.spoolIdAtLogTime === s.id);
    const loggedWeight = logEntries.reduce((sum,e) => sum + (e.weightGAtLogTime||0), 0);
    const printerOptions = `<option value="">— none —</option>` + printers.map(p =>
      `<option value="${p.id}" ${p.spoolId===s.id?'selected':''}>${escapeHtml(p.name)}${p.status==='down'?' (down)':''}</option>`
    ).join('');
    const usageLine = logEntries.length===0
      ? 'No logged prints have drawn from this spool yet.'
      : `Used in ${logEntries.length} logged print${logEntries.length!==1?'s':''} — ${loggedWeight}g accounted for so far.`;
    return `
      <div class="ps-spool-card" data-id="${s.id}">
        <div class="ps-spool-top">
          <span class="ps-spool-swatch" style="background:${escapeHtml(s.colorHex||'#999')}"></span>
          <input class="ps-input ps-name" data-field="label" value="${escapeHtml(s.label)}" placeholder="e.g. PCTG Pro — Natural" ${retired?'disabled':''} />
          <input class="ps-input" style="max-width:110px" data-field="material" value="${escapeHtml(s.material)}" placeholder="Material" ${retired?'disabled':''} />
          <input class="ps-input" type="color" style="max-width:44px;padding:2px;" data-field="colorHex" value="${s.colorHex||'#cccccc'}" ${retired?'disabled':''} />
          ${low ? '<span class="ps-badge-low">Low</span>' : ''}
          ${retired ? '<span class="ps-hint">Retired</span>' : ''}
          <button class="ps-btn ghost small" data-action="remove" title="Delete this spool record">✕</button>
        </div>
        ${overConsumed ? `<div class="ps-hint" style="color:var(--danger);margin-top:8px;">This spool has been logged for ${Math.abs(s.remainingG)}g more than it had — the number below is showing 0 rather than negative. Worth a manual correction once you know the real amount left.</div>` : ''}
        <div class="ps-row">
          <div class="ps-field" style="flex:1;margin-bottom:0;">
            <span class="ps-field-label">Remaining (g)</span>
            <input class="ps-input" type="number" min="0" data-field="remainingG" value="${Math.max(0,s.remainingG)}" ${retired?'disabled':''} />
          </div>
          <div class="ps-field" style="flex:1;margin-bottom:0;">
            <span class="ps-field-label">Full spool weight (g)</span>
            <input class="ps-input" type="number" min="0" data-field="totalG" value="${s.totalG}" ${retired?'disabled':''} />
          </div>
        </div>
        <div class="ps-spool-bar-track"><div class="ps-spool-bar-fill ${low?'low':''}" style="width:${pct}%"></div></div>
        ${retired ? '' : `
        <div class="ps-field" style="margin-top:10px;margin-bottom:0;">
          <span class="ps-field-label">Loaded on printer</span>
          <select class="ps-select" data-field="assign-printer" style="max-width:240px;">${printerOptions}</select>
        </div>
        `}
        <div class="ps-hint" style="margin-top:8px;">${usageLine}</div>
      </div>
    `;
  }

  const healthySpools = activeSpools.filter(s => s.remainingG > LOW_STOCK_G);
  const lowSpools = activeSpools.filter(s => s.remainingG <= LOW_STOCK_G);
  const activeCards = healthySpools.map(s => spoolCard(s, false)).join('');
  const lowCards = lowSpools.map(s => spoolCard(s, false)).join('');
  const retiredCards = retiredSpools.map(s => spoolCard(s, true)).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Stock — Unopened Inventory</div>
      <div class="ps-hint" style="margin-bottom:12px;">What you've got sitting in reserve, not loaded on anything yet — plus what's on its way. "In Stock" is available right now; "On Order" is tracked separately and doesn't count as available until you hit Receive.</div>
      ${stock.length===0 ? '<div class="ps-empty">Nothing in stock yet.</div>' : `
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th></th><th>Label</th><th>Material</th><th>Color</th><th style="width:90px">g/spool</th><th style="width:70px">In Stock</th><th style="width:70px">On Order</th><th style="width:80px"></th><th></th></tr></thead>
        <tbody id="ps-stock-body">${stockRows}</tbody>
      </table>
      </div>
      `}
      <div style="margin-top:14px;">
        <button class="ps-btn" id="ps-add-stock">+ Add stock</button>
      </div>
    </div>

    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Active Spools — Opened / In Use</div>
      <div class="ps-hint" style="margin-bottom:12px;">Spools that have actually been opened — loaded on a printer or sitting spare, tracked precisely. To swap what's loaded on a printer, use "Change Spool" on the Printers tab — it retires the old one (keeping its history) and pulls a fresh one from Stock automatically.</div>
      ${activeSpools.length===0 ? '<div class="ps-empty">No active spools — use "Change Spool" on the Printers tab to load one from Stock, or add one manually below.</div>' : (healthySpools.length>0 ? `<div id="ps-spools-list">${activeCards}</div>` : '')}
      ${lowSpools.length>0 ? `
      <div style="margin-top:${healthySpools.length>0?'16px':'0'};">
        <button class="ps-btn ghost small" id="ps-toggle-low-spools">${showLowSpools?'▾':'▸'} Low / nearly empty (${lowSpools.length})</button>
        ${showLowSpools ? `<div style="margin-top:10px;">${lowCards}</div>` : ''}
      </div>
      ` : ''}
      <div style="margin-top:14px;">
        <button class="ps-btn" id="ps-add-spool">+ Add spool manually</button>
      </div>
      <div class="ps-hint" style="margin-top:12px;">Spools flagged "Low" are under ${LOW_STOCK_G}g.</div>
    </div>

    ${retiredSpools.length>0 ? `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Retired Spools</div>
      <div class="ps-hint" style="margin-bottom:12px;">Taken out of rotation via "Change Spool" — kept here just for usage history. Safe to delete once you don't need the record.</div>
      <div id="ps-retired-list">${retiredCards}</div>
    </div>
    ` : ''}
  `;

  // ---- Stock handlers ----
  root.querySelectorAll('#ps-stock-body tr').forEach(tr => {
    const id = tr.getAttribute('data-id');
    tr.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', () => {
        const st = stock.find(x=>x.id===id);
        const field = input.getAttribute('data-field');
        if(field==='weightPerSpoolG' || field==='qty' || field==='qtyOnOrder'){
          st[field] = Math.max(field==='weightPerSpoolG'?1:0, parseInt(input.value)||0);
        } else {
          st[field] = input.value;
        }
        saveStock(); renderFilament(); if(document.getElementById('ps-tab-printers')) renderPrinters();
      });
    });
    const receiveBtn = tr.querySelector('[data-action="receive-stock"]');
    if(receiveBtn){
      receiveBtn.addEventListener('click', () => {
        const st = stock.find(x=>x.id===id);
        st.qty += st.qtyOnOrder;
        st.qtyOnOrder = 0;
        saveStock(); renderFilament(); if(document.getElementById('ps-tab-printers')) renderPrinters();
      });
    }
    tr.querySelector('[data-action="remove-stock"]').addEventListener('click', () => {
      stock = stock.filter(x=>x.id!==id);
      saveStock(); renderFilament(); if(document.getElementById('ps-tab-printers')) renderPrinters();
    });
  });
  document.getElementById('ps-add-stock').addEventListener('click', () => {
    stock.push({id: uid('stock'), label:'New material', material:'PCTG', colorHex:'#cccccc', weightPerSpoolG:1000, qty:0, qtyOnOrder:0});
    saveStock(); renderFilament(); if(document.getElementById('ps-tab-printers')) renderPrinters();
  });

  // ---- Active/retired spool handlers ----
  root.querySelectorAll('.ps-spool-card').forEach(card => {
    const id = card.getAttribute('data-id');
    card.querySelectorAll('[data-field]:not([data-field="assign-printer"])').forEach(input => {
      input.addEventListener('change', () => {
        const s = spools.find(x=>x.id===id);
        const field = input.getAttribute('data-field');
        if(field==='remainingG' || field==='totalG'){
          s[field] = Math.max(0, parseFloat(input.value)||0);
        } else {
          s[field] = input.value;
        }
        saveSpools(); renderPrinters(); regenerateIfActive();
        renderFilament();
      });
    });
    const assignSelect = card.querySelector('[data-field="assign-printer"]');
    if(assignSelect){
      assignSelect.addEventListener('change', (e) => {
        const printerId = e.target.value;
        printers.forEach(p => { if(p.spoolId === id) p.spoolId = null; });
        if(printerId){
          const p = printers.find(x=>x.id===printerId);
          if(p) p.spoolId = id;
          stampSpoolLoad(id, printerId);
        }
        savePrinters(); saveSpools();
        renderFilament(); renderPrinters(); regenerateIfActive();
      });
    }
    card.querySelector('[data-action="remove"]').addEventListener('click', () => {
      spools = spools.filter(x=>x.id!==id);
      printers.forEach(p => { if(p.spoolId===id) p.spoolId = null; });
      saveSpools(); savePrinters();
      renderFilament(); renderPrinters(); regenerateIfActive();
    });
  });

  const toggleLowSpoolsBtn = document.getElementById('ps-toggle-low-spools');
  if(toggleLowSpoolsBtn){
    toggleLowSpoolsBtn.addEventListener('click', () => {
      showLowSpools = !showLowSpools;
      renderFilament();
    });
  }
  document.getElementById('ps-add-spool').addEventListener('click', () => {
    spools.push({id: uid('spool'), label:'New spool', material:'PCTG', colorHex:'#cccccc', totalG:1000, remainingG:1000, retired:false});
    saveSpools(); renderFilament();
  });
}

let editingOverrideId = null; // within a product's editor: null = not editing an override; '_new' = add form; a printerId = editing that printer's override

// Session-only — nothing here is saved. Resets on reload, on purpose.
let shippingItems = [{id: uid('ship'), productId: '', qty: 1}];

// ---------- rendering: Analytics tab ----------
// Meant to grow over time — analyticsRange is a shared control every widget
// below reads from, so new metrics just plug in without re-building a date
// picker each time. Session-only, like Shipping — nothing here is saved.
let analyticsRange = 'all'; // 'all' | '7' | '30' | '90'
let analyticsJobFilter = ''; // '' = all jobs, otherwise a specific jobId

function analyticsSinceDate(){
  if(analyticsRange === 'all') return null;
  const days = parseInt(analyticsRange);
  return new Date(Date.now() - days*24*3600000);
}

// Real, completed production only — same filter Failure Stats uses (no
// tests, no failed attempts), summed by actual units (batches count fully).
// jobId, when given, restricts to prints credited to that specific job —
// prints with no job link at all are excluded once a job filter is active.
function computeProductQuantities(sinceDate, jobId){
  const counts = {};
  productionLog.forEach(e => {
    if(e.isTest || e.failed || !e.actualEnd || !e.productId) return;
    if(sinceDate && new Date(e.actualStart) < sinceDate) return;
    if(jobId && e.jobId !== jobId) return;
    counts[e.productId] = (counts[e.productId]||0) + (e.unitsCompleted||1);
  });
  return catalog
    .map(p => ({product: p, qty: counts[p.id]||0}))
    .filter(x => x.qty>0)
    .sort((a,b) => b.qty - a.qty);
}

function renderAnalytics(){
  const root = document.getElementById('ps-tab-analytics');
  const sinceDate = analyticsSinceDate();

  const rangeButtons = [
    {key:'7', label:'Last 7 days'},
    {key:'30', label:'Last 30 days'},
    {key:'90', label:'Last 90 days'},
    {key:'all', label:'All time'}
  ].map(r => `<button class="ps-btn ${analyticsRange===r.key?'primary':'ghost'} small" data-action="analytics-range" data-range="${r.key}">${r.label}</button>`).join('');

  root.innerHTML = `
    <div class="ps-panel">

      <div class="ps-row" style="gap:6px;flex-wrap:wrap;">${rangeButtons}</div>
    </div>
    ${renderQuantityByProductWidget(sinceDate)}
    ${renderFinishedJobsWidget(sinceDate)}
  `;

  root.querySelectorAll('[data-action="analytics-range"]').forEach(btn => {
    btn.addEventListener('click', () => {
      analyticsRange = btn.getAttribute('data-range');
      renderAnalytics();
    });
  });
  const jobFilterSelect = document.getElementById('ps-analytics-job-filter');
  if(jobFilterSelect){
    jobFilterSelect.addEventListener('change', () => {
      analyticsJobFilter = jobFilterSelect.value;
      renderAnalytics();
    });
  }
}

function renderQuantityByProductWidget(sinceDate){
  // If the previously-selected job filter no longer exists (deleted), fall
  // back to "all jobs" rather than silently showing an empty, confusing result.
  if(analyticsJobFilter && !jobs.some(j=>j.id===analyticsJobFilter)) analyticsJobFilter = '';
  const data = computeProductQuantities(sinceDate, analyticsJobFilter || null);
  const jobFilterOptions = jobs.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(j => `<option value="${j.id}" ${analyticsJobFilter===j.id?'selected':''}>${escapeHtml(j.name)}</option>`).join('');
  const jobFilterControl = `
    <div class="ps-field" style="max-width:260px;margin-bottom:14px;">
      <span class="ps-field-label">Filter to a job</span>
      <select class="ps-select" id="ps-analytics-job-filter">
        <option value="">All jobs</option>
        ${jobFilterOptions}
      </select>
    </div>
  `;
  if(data.length===0){
    return `
      <div class="ps-panel">
        <div class="ps-panel-title"><span class="dot"></span>Quantity Printed by Product</div>
        ${jobFilterControl}
        <div class="ps-empty">Nothing completed in this range yet.</div>
      </div>
    `;
  }
  const maxQty = Math.max(...data.map(d=>d.qty));
  const rows = data.map(d => `
    <div style="margin-bottom:12px;">
      <div class="ps-row" style="justify-content:space-between;margin-bottom:4px;">
        <span>${escapeHtml(d.product.name)}</span>
        <span class="mono ps-hint">${d.qty}</span>
      </div>
      <div class="ps-hprogress-track"><div class="ps-hprogress-fill" style="width:${(d.qty/maxQty*100)}%;"></div></div>
    </div>
  `).join('');
  const total = data.reduce((s,d)=>s+d.qty,0);
  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Quantity Printed by Product</div>
      ${jobFilterControl}
      <div class="ps-hint" style="margin-bottom:14px;">${total} unit${total!==1?'s':''} across ${data.length} product${data.length!==1?'s':''} — completed, non-test prints only.</div>
      ${rows}
    </div>
  `;
}

// Jobs marked done before this feature existed have no completion
// timestamp — included under "All time" since we know they finished, but
// excluded from narrower ranges since we genuinely don't know when.
function computeFinishedJobs(sinceDate){
  return jobs
    .filter(j => j.status === 'done')
    .filter(j => {
      if(!sinceDate) return true;
      if(!j.doneAt) return false;
      return new Date(j.doneAt) >= sinceDate;
    })
    .map(j => ({job: j, totals: jobTotals(j)}))
    .sort((a,b) => {
      const at = a.job.doneAt ? new Date(a.job.doneAt).getTime() : 0;
      const bt = b.job.doneAt ? new Date(b.job.doneAt).getTime() : 0;
      return bt - at;
    });
}

function renderFinishedJobsWidget(sinceDate){
  const data = computeFinishedJobs(sinceDate);
  if(data.length===0){
    return `
      <div class="ps-panel">
        <div class="ps-panel-title"><span class="dot"></span>Finished Jobs</div>
        <div class="ps-empty">No jobs completed in this range yet.</div>
      </div>
    `;
  }
  const rows = data.map(({job, totals}) => `
    <div class="ps-row" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
      <div>
        <div>${escapeHtml(job.name)}</div>
        <div class="ps-hint mono">${job.doneAt ? fmtDateHead(new Date(job.doneAt)) : 'completion date unknown'}</div>
      </div>
      <span class="mono ps-hint">${totals.totalUnits} unit${totals.totalUnits!==1?'s':''}</span>
    </div>
  `).join('');
  const totalUnitsAll = data.reduce((s,{totals})=>s+totals.totalUnits, 0);
  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Finished Jobs</div>
      <div class="ps-hint" style="margin-bottom:14px;">${data.length} job${data.length!==1?'s':''} completed · ${totalUnitsAll} unit${totalUnitsAll!==1?'s':''} total</div>
      ${rows}
    </div>
  `;
}

function renderShipping(){
  const root = document.getElementById('ps-tab-shipping');
  const productOptions = catalog.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');

  const rows = shippingItems.map(item => {
    const p = catalog.find(x=>x.id===item.productId);
    const noWeight = p && !(p.weightG>0);
    return `
      <div class="ps-row" style="gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">
        <select class="ps-select" style="flex:2;min-width:180px;" data-action="shipping-product" data-id="${item.id}">
          <option value="">— pick a product —</option>
          ${productOptions.replace(`value="${item.productId}"`, `value="${item.productId}" selected`)}
        </select>
        <input class="ps-input ps-narrow" type="number" min="1" style="width:70px;" value="${item.qty}" data-action="shipping-qty" data-id="${item.id}" />
        ${noWeight ? `<span class="ps-hint" style="color:var(--danger);">no weight set for this product</span>` : ''}
        <button class="ps-btn ghost small" data-action="shipping-remove" data-id="${item.id}">✕</button>
      </div>
    `;
  }).join('');

  let totalG = 0;
  let hasIncomplete = false;
  shippingItems.forEach(item => {
    const p = catalog.find(x=>x.id===item.productId);
    if(p){
      totalG += (p.weightG||0) * item.qty;
      if(!(p.weightG>0)) hasIncomplete = true;
    }
  });
  const totalLbsExact = totalG / 453.592;
  const wholeLbs = Math.floor(totalLbsExact);
  const remainderOz = (totalLbsExact - wholeLbs) * 16;

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Shipping Weight Calculator</div>
      <div class="ps-hint" style="margin-bottom:16px;">Pick products and quantities to get a total shipping weight. Nothing here is saved — it resets whenever you leave this tab or reload.</div>
      <div id="ps-shipping-rows">${rows}</div>
      <button class="ps-btn" style="margin-top:6px;" id="ps-shipping-add">+ Add product</button>

      <div class="ps-summary-grid" style="margin-top:22px;grid-template-columns:1fr;">
        <div class="ps-summary-cell">
          <div class="ps-summary-num">${wholeLbs} lb ${remainderOz.toFixed(1)} oz</div>
          <div class="ps-summary-label">Total shipping weight</div>
          <div class="ps-hint mono" style="margin-top:4px;">${totalG.toFixed(0)}g of product only — doesn't include box or packaging${hasIncomplete?' — incomplete, one or more products above have no weight set':''}</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('ps-shipping-add').addEventListener('click', () => {
    shippingItems.push({id: uid('ship'), productId: '', qty: 1});
    renderShipping();
  });
  root.querySelectorAll('[data-action="shipping-product"]').forEach(sel => {
    sel.addEventListener('change', e => {
      const item = shippingItems.find(x=>x.id===sel.getAttribute('data-id'));
      if(item) item.productId = e.target.value;
      renderShipping();
    });
  });
  root.querySelectorAll('[data-action="shipping-qty"]').forEach(inp => {
    inp.addEventListener('change', e => {
      const item = shippingItems.find(x=>x.id===inp.getAttribute('data-id'));
      if(item) item.qty = Math.max(1, parseInt(e.target.value)||1);
      renderShipping();
    });
  });
  root.querySelectorAll('[data-action="shipping-remove"]').forEach(btn => {
    btn.addEventListener('click', () => {
      shippingItems = shippingItems.filter(x=>x.id!==btn.getAttribute('data-id'));
      if(shippingItems.length===0) shippingItems.push({id: uid('ship'), productId: '', qty: 1});
      renderShipping();
    });
  });
}

function renderCatalog(){
  const root = document.getElementById('ps-tab-catalog');
  if(editingProductId !== null){
    renderProductEditor(root);
  } else {
    renderCatalogList(root);
  }
}

// ---- Browsing view: a plain list, nothing inline-editable ----
function renderCatalogList(root){
  const typeRows = types.map(t => `
    <div class="ps-row" style="gap:8px;margin-bottom:8px;">
      <input class="ps-input" style="max-width:160px" data-field="name" value="${escapeHtml(t.name)}" />
      <input class="ps-input" type="color" style="max-width:44px;padding:2px;" data-field="color" value="${t.color}" />
      <button class="ps-btn ghost small" data-action="remove" title="Remove type">✕</button>
    </div>
  `).join('');

  const productRows = catalog.map(p => {
    const printMin = p.timeH*60 + p.timeM;
    const incomplete = printMin<=0;
    const fileCount = Object.keys(p.projectFiles||{}).length;
    const batchCount = (p.batchConfigs||[]).length;
    const isExpanded = expandedBatchPreview.has(p.id);
    const badge = batchCount>0
      ? ` <button class="ps-tag" data-action="toggle-batch-preview" style="background:color-mix(in srgb, var(--cool) 22%, transparent); color:var(--cool); border:none; cursor:pointer;" title="${isExpanded?'Hide':'Show'} batch details">${isExpanded?'▾':'▸'} ${batchCount}× batch${batchCount!==1?'es':''}</button>`
      : '';
    const subRows = (isExpanded && batchCount>0) ? p.batchConfigs.map(cfg => `
      <tr class="ps-batch-preview-row" style="opacity:0.75;">
        <td style="padding-left:28px;" class="ps-hint">↳ ${cfg.unitsPerBatch}× batch</td>
        <td class="mono ps-hint">${fmtDuration(cfg.timeH*60+cfg.timeM)}</td>
        <td class="mono ps-hint">${cfg.weightG>0?cfg.weightG+'g':'—'}</td>
        <td class="ps-hint">${Object.keys(cfg.projectFiles||{}).length>0?Object.keys(cfg.projectFiles||{}).length+' file'+(Object.keys(cfg.projectFiles||{}).length!==1?'s':''):'—'}</td>
        <td></td>
        <td></td>
      </tr>
    `).join('') : '';
    return `
      <tr data-id="${p.id}">
        <td>${renderTag(p.type)} &nbsp;${escapeHtml(p.name)}${badge}${incomplete?' <span class="ps-hint" style="color:var(--danger)">— no print time</span>':''}</td>
        <td class="mono ps-hint">${incomplete?'—':fmtDuration(printMin)}</td>
        <td class="mono ps-hint">${p.weightG>0?p.weightG+'g':'—'}</td>
        <td class="ps-hint">${fileCount>0?fileCount+' file'+(fileCount!==1?'s':''):'—'}</td>
        <td class="ps-hint">${batchCount>0?batchCount+' batch'+(batchCount!==1?'es':''):'—'}</td>
        <td><button class="ps-btn small" data-action="edit-product">Edit</button></td>
      </tr>
      ${subRows}
    `;
  }).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Import from G-code</div>
      <div class="ps-hint" style="margin-bottom:10px;">Reads the estimated print time and filament weight straight out of a sliced .gcode file — no re-typing. Works with OrcaSlicer, PrusaSlicer, Bambu Studio, and Cura's comment formats.</div>
      <input type="file" id="ps-gcode-file" accept=".gcode,.gco,.g" style="display:none;" />
      <button class="ps-btn" id="ps-gcode-trigger">Choose G-code file…</button>
      <div id="ps-gcode-result" style="margin-top:12px;"></div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Product Types</div>
      <div id="ps-types-list">${typeRows}</div>
      <div style="margin-top:10px;">
        <button class="ps-btn" id="ps-add-type">+ Add type</button>
      </div>
      ${typeErrorMsg ? `<div class="ps-warnbox" style="margin-top:10px;">${escapeHtml(typeErrorMsg)}</div>` : ''}
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Product Catalog</div>
      <div style="margin-bottom:14px;">
        <button class="ps-btn primary" id="ps-add-product-btn">+ Add Product</button>
      </div>
      ${catalog.length===0 ? '<div class="ps-empty">No products yet.</div>' : `
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th>Product</th><th style="width:90px">Print time</th><th style="width:80px">Weight</th><th style="width:80px">Files</th><th style="width:80px">Batches</th><th style="width:70px"></th></tr></thead>
        <tbody>${productRows}</tbody>
      </table>
      </div>
      `}
    </div>
  `;

  document.getElementById('ps-add-product-btn').addEventListener('click', () => {
    editingProductId = '_new';
    renderCatalog();
  });
  root.querySelectorAll('[data-action="toggle-batch-preview"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const productId = btn.closest('tr').getAttribute('data-id');
      if(expandedBatchPreview.has(productId)) expandedBatchPreview.delete(productId);
      else expandedBatchPreview.add(productId);
      renderCatalog();
    });
  });
  root.querySelectorAll('[data-action="edit-product"]').forEach(btn => {
    btn.addEventListener('click', () => {
      editingProductId = btn.closest('tr').getAttribute('data-id');
      renderCatalog();
    });
  });

  document.getElementById('ps-add-type').addEventListener('click', () => {
    types.push({id: uid('type'), name:'New type', color:'#9a9184'});
    typeErrorMsg='';
    saveTypes(); renderCatalog();
  });
  root.querySelectorAll('#ps-types-list .ps-row').forEach((row, i) => {
    const t = types[i];
    row.querySelector('[data-field="name"]').addEventListener('change', e => {
      t.name = e.target.value.trim() || t.name;
      saveTypes(); renderCatalog(); regenerateIfActive();
    });
    row.querySelector('[data-field="color"]').addEventListener('change', e => {
      t.color = e.target.value;
      saveTypes(); renderCatalog(); regenerateIfActive();
    });
    row.querySelector('[data-action="remove"]').addEventListener('click', () => {
      if(types.length<=1){ typeErrorMsg = 'Need at least one product type.'; renderCatalog(); return; }
      if(catalog.some(p=>p.type===t.id)){ typeErrorMsg = `"${t.name}" is still used by a product — change those first.`; renderCatalog(); return; }
      types = types.filter(x=>x.id!==t.id);
      typeErrorMsg='';
      saveTypes(); renderCatalog();
    });
  });

  // Top-of-tab g-code importer — same as before, but only for CREATING a
  // new product (editing/attaching-as-batch now happens inside the
  // product's own editor instead, where there's no ambiguity about which
  // product it applies to).
  document.getElementById('ps-gcode-trigger').addEventListener('click', () => {
    document.getElementById('ps-gcode-file').click();
  });
  document.getElementById('ps-gcode-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const resultEl = document.getElementById('ps-gcode-result');
    if(!file) return;
    resultEl.innerHTML = '<div class="ps-hint">Reading file…</div>';
    let text;
    try { text = await file.text(); }
    catch(err){ resultEl.innerHTML = `<div class="ps-warnbox">Couldn't read that file.</div>`; e.target.value=''; return; }

    const {timeMin, weightG} = parseGcodeMetadata(text);
    if(timeMin==null && weightG==null){
      resultEl.innerHTML = `<div class="ps-warnbox">Couldn't find a time or weight estimate in this file — it may not be sliced, or your slicer's comment format isn't one I recognize yet.</div>`;
      e.target.value = '';
      return;
    }
    const guessedName = file.name.replace(/\.(gcode|gco|g)$/i, '').replace(/[_-]+/g, ' ').trim();
    pendingNewProduct = {
      name: guessedName,
      timeH: timeMin!=null ? Math.floor(timeMin/60) : 0,
      timeM: timeMin!=null ? timeMin%60 : 0,
      weightG: weightG!=null ? Math.round(weightG) : 0,
      pendingFile: file
    };
    resultEl.innerHTML = `<div class="ps-hint">Found: ${timeMin!=null?fmtDuration(timeMin):'no time'}${weightG!=null?', '+Math.round(weightG)+'g':', no weight'} — opening the new product form…</div>`;
    e.target.value = '';
    editingProductId = '_new';
    renderCatalog();
  });
}

let pendingNewProduct = null; // carries g-code-derived defaults from the list view into a freshly-opened Add Product form, once

// ---- Shared Add/Edit form ----
function renderLoggedAvgHint(p){
  const byPrinter = productAvgActualByPrinter(p.id);
  if(byPrinter.length === 0) return '';
  const lines = byPrinter.map(stat => {
    const runningLong = stat.count >= 2 && stat.targetMin>0 && stat.avgMin > stat.targetMin * 1.10;
    const pctOver = stat.targetMin>0 ? Math.round((stat.avgMin/stat.targetMin - 1)*100) : 0;
    const targetNote = stat.hasOverride ? '' : ' (default estimate)';
    return `<div style="${runningLong?'color:var(--heat);':''}">${escapeHtml(stat.printerName)}: ${fmtDuration(stat.avgMin)} over ${stat.count} print${stat.count!==1?'s':''}${runningLong ? ` — running ~${pctOver}% longer than${targetNote||' its'} target, worth a printer-specific time?` : ''}</div>`;
  }).join('');
  return `<div class="ps-hint" style="margin-top:8px;">Logged avg by printer:${lines}</div>`;
}

function renderProductEditor(root){
  const isNew = editingProductId === '_new';
  let p;
  if(isNew){
    p = {id:null, name:'', type: types[0]?.id||'', timeH:0, timeM:0, weightG:0, projectFiles:{}, batchConfigs:[]};
    if(pendingNewProduct){ Object.assign(p, pendingNewProduct); pendingNewProduct = null; }
  } else {
    p = catalog.find(x=>x.id===editingProductId);
    if(!p){ editingProductId = null; renderCatalog(); return; }
  }

  const typeOpts = types.map(t=>`<option value="${t.id}" ${p.type===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <button class="ps-btn ghost small" id="ps-editor-back">← Back to Catalog</button>
      <div class="ps-panel-title" style="margin-top:12px;"><span class="dot"></span>${isNew?'Add Product':'Edit Product'}</div>

      <div class="ps-row" style="flex-wrap:wrap;gap:12px;margin-top:6px;">
        <div class="ps-field" style="flex:2;min-width:220px;margin-bottom:0;">
          <span class="ps-field-label">Product name</span>
          <input class="ps-input" id="ps-editor-name" value="${escapeHtml(p.name)}" placeholder='e.g. Vase 1 - 4"' />
        </div>
        <div class="ps-field" style="flex:1;min-width:140px;margin-bottom:0;">
          <span class="ps-field-label">Type</span>
          <select class="ps-select" id="ps-editor-type">${typeOpts}</select>
        </div>
      </div>

      <div class="ps-hint" style="margin:12px 0 8px;">Have a sliced .gcode for this? Import it and these fields fill in automatically — or just type the numbers in.</div>
      <input type="file" id="ps-editor-gcode-file" accept=".gcode,.gco,.g" style="display:none;" />
      <button class="ps-btn" id="ps-editor-gcode-trigger">Import from G-code…</button>
      <div id="ps-editor-pending-file" style="margin-top:10px; ${p.pendingFile ? '' : 'display:none;'}">
        <div class="ps-hint" style="margin-bottom:6px;">G-code is sliced for one specific printer — file ready to attach: <b id="ps-editor-pending-filename">${p.pendingFile ? escapeHtml(p.pendingFile.name) : ''}</b></div>
        ${window.uploadProjectFile ? (printers.length>0 ? `
        <div class="ps-field" style="max-width:260px;margin-bottom:0;">
          <span class="ps-field-label">Which printer is this for?</span>
          <select class="ps-select" id="ps-editor-pending-target">
            ${printers.map(pr=>`<option value="${pr.id}">${escapeHtml(pr.name)}</option>`).join('')}
          </select>
        </div>
        ` : `<div class="ps-hint">Add a printer on the Printers tab first, then come back to attach this file to it.</div>`) : `<div class="ps-hint">File attachment needs the deployed site — the numbers above are filled in now, but you'll need to attach the file itself once this is live.</div>`}
      </div>

      <div class="ps-row" style="flex-wrap:wrap;gap:12px;margin-top:12px;">
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Hours</span>
          <input class="ps-input" type="number" min="0" id="ps-editor-timeh" value="${p.timeH}" />
        </div>
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Minutes</span>
          <input class="ps-input" type="number" min="0" max="59" id="ps-editor-timem" value="${p.timeM}" />
        </div>
        <div class="ps-field" style="min-width:100px;margin-bottom:0;">
          <span class="ps-field-label">Weight (g)</span>
          <input class="ps-input" type="number" min="0" id="ps-editor-weight" value="${p.weightG}" />
        </div>
      </div>
      ${!isNew ? renderLoggedAvgHint(p) : ''}

      <div class="ps-row" style="margin-top:18px;gap:8px;">
        ${isNew
          ? `<button class="ps-btn primary" id="ps-editor-create">Create Product</button>
             <button class="ps-btn ghost" id="ps-editor-cancel">Cancel</button>`
          : `<button class="ps-btn primary" id="ps-editor-done">Done</button>
             <button class="ps-btn ghost" id="ps-editor-delete" style="color:var(--danger);margin-left:auto;">Delete Product</button>`
        }
      </div>
      ${!isNew ? '<div class="ps-hint" style="margin-top:8px;">Changes to name, type, time, and weight save automatically as you make them.</div>' : ''}
    </div>

    ${!isNew ? renderProductFilesSection(p) : ''}
    ${!isNew ? renderProductBatchesSection(p) : ''}
    ${!isNew ? renderPrinterOverridesSection(p) : ''}
  `;

  wireProductEditor(root, p, isNew);
}

function renderProductFilesSection(p){
  const targets = [{id:'_any', name:'Default (any printer)'}, ...printers.map(pr => ({id: pr.id, name: pr.name}))];
  const rows = targets.map(target => {
    const entry = p.projectFiles && p.projectFiles[target.id];
    let action;
    if(entry){
      const isGcode = /\.gcode$/i.test(entry.path||'');
      const emptyTargets = targets.filter(t => t.id !== target.id && !(p.projectFiles && p.projectFiles[t.id]) && !(isGcode && t.id === '_any'));
      const moveControl = emptyTargets.length>0 ? `
        <select class="ps-select" style="width:auto;padding:4px 8px;font-size:12px;" data-action="move-product-file" data-target="${target.id}">
          <option value="">Move to…</option>
          ${emptyTargets.map(t=>`<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}
        </select>` : '';
      action = `<a class="ps-btn ghost small" href="orcaslicer://open?file=${encodeURIComponent(entry.url)}" title="Opens OrcaSlicer with this file">Open in Orca</a> ${moveControl} <button class="ps-btn ghost small" data-action="remove-product-file" data-target="${target.id}">✕</button>`;
    } else if(window.uploadProjectFile){
      action = `<input type="file" data-action="upload-product-file" data-target="${target.id}" style="display:none;" accept=".3mf,.stl,.step,.stp,.gcode" /><button class="ps-btn ghost small" data-action="trigger-product-file-upload" data-target="${target.id}">Upload…</button>`;
    } else {
      action = `<span class="ps-hint" title="File uploads need Supabase Storage, which only exists on the deployed site.">—</span>`;
    }
    return `<div class="ps-row" style="justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);"><span class="ps-hint">${escapeHtml(target.name)}</span><div class="ps-row" style="gap:4px;">${action}</div></div>`;
  }).join('');
  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Project Files</div>
      <div class="ps-hint" style="margin-bottom:10px;">One file per printer — "Default" covers any printer without its own. Uploading a .gcode here also fills in the numbers above automatically. Picked the wrong printer? Use "Move to…" to reassign it without re-uploading.</div>
      ${rows}
    </div>
  `;
}

function renderProductBatchesSection(p){
  if(editingBatchId !== null) return renderBatchEditor(p);
  const rows = (p.batchConfigs||[]).map(cfg => `
    <div class="ps-row" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
      <span class="ps-hint">${cfg.unitsPerBatch}× — ${fmtDuration(cfg.timeH*60+cfg.timeM)}${cfg.weightG>0?', '+cfg.weightG+'g':''}</span>
      <div class="ps-row" style="gap:4px;">
        <button class="ps-btn ghost small" data-action="edit-batch" data-configid="${cfg.id}">Edit</button>
        <button class="ps-btn ghost small" data-action="remove-batch" data-configid="${cfg.id}">✕</button>
      </div>
    </div>
  `).join('');
  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Batches</div>
      <div class="ps-hint" style="margin-bottom:10px;">Other ways to print multiple units of this same product in one physical print — e.g. an 8-up plate. The numbers above (the single-unit version) stay untouched no matter what's added here.</div>
      ${p.batchConfigs && p.batchConfigs.length>0 ? rows : '<div class="ps-empty">No batches yet.</div>'}
      <button class="ps-btn" style="margin-top:10px;" id="ps-add-batch-btn">+ Add Batch</button>
    </div>
  `;
}

function renderPrinterOverridesSection(p){
  if(editingOverrideId !== null) return renderPrinterOverrideEditor(p);
  const overrideIds = Object.keys(p.printerOverrides||{});
  const rows = overrideIds.map(printerId => {
    const ov = p.printerOverrides[printerId];
    const printer = printers.find(pr=>pr.id===printerId);
    return `
      <div class="ps-row" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
        <span class="ps-hint">${escapeHtml(printer?printer.name:'(deleted printer)')} — ${fmtDuration(ov.timeH*60+ov.timeM)}${ov.weightG>0?', '+ov.weightG+'g':''}</span>
        <div class="ps-row" style="gap:4px;">
          <button class="ps-btn ghost small" data-action="edit-override" data-printerid="${printerId}">Edit</button>
          <button class="ps-btn ghost small" data-action="remove-override" data-printerid="${printerId}">✕</button>
        </div>
      </div>
    `;
  }).join('');
  const availablePrinters = printers.filter(pr => !overrideIds.includes(pr.id));
  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Printer-Specific Times</div>
      <div class="ps-hint" style="margin-bottom:10px;">Some printers genuinely run faster or slower than others — give a specific printer its own time/weight here instead of using the default above. Logging a print on that printer automatically uses this.</div>
      ${overrideIds.length>0 ? rows : '<div class="ps-empty">No printer-specific times yet — every printer uses the default above.</div>'}
      ${availablePrinters.length>0
        ? `<button class="ps-btn" style="margin-top:10px;" id="ps-add-override-btn">+ Add printer-specific time</button>`
        : (printers.length>0 ? `<div class="ps-hint" style="margin-top:10px;">Every printer already has its own time set.</div>` : '')}
    </div>
  `;
}

function renderPrinterOverrideEditor(p){
  const isNewOverride = editingOverrideId === '_new';
  const overrideIds = Object.keys(p.printerOverrides||{});
  const printerId = isNewOverride ? null : editingOverrideId;
  const ov = isNewOverride ? {timeH:p.timeH, timeM:p.timeM, weightG:p.weightG} : p.printerOverrides[printerId];
  const availablePrinters = printers.filter(pr => !overrideIds.includes(pr.id));
  const printerOptions = isNewOverride
    ? availablePrinters.map(pr=>`<option value="${pr.id}">${escapeHtml(pr.name)}</option>`).join('')
    : `<option value="${printerId}">${escapeHtml((printers.find(pr=>pr.id===printerId)||{}).name || '(deleted printer)')}</option>`;

  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>${isNewOverride?'Add Printer-Specific Time':'Edit Printer-Specific Time'}</div>
      <div class="ps-field" style="max-width:260px;margin:8px 0;">
        <span class="ps-field-label">Printer</span>
        <select class="ps-select" id="ps-override-printer" ${isNewOverride?'':'disabled'}>${printerOptions}</select>
      </div>
      <div class="ps-row" style="flex-wrap:wrap;gap:12px;margin-top:6px;">
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Hours</span>
          <input class="ps-input" type="number" min="0" id="ps-override-timeh" value="${ov.timeH}" />
        </div>
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Minutes</span>
          <input class="ps-input" type="number" min="0" max="59" id="ps-override-timem" value="${ov.timeM}" />
        </div>
        <div class="ps-field" style="min-width:100px;margin-bottom:0;">
          <span class="ps-field-label">Weight (g)</span>
          <input class="ps-input" type="number" min="0" id="ps-override-weight" value="${ov.weightG}" />
        </div>
      </div>
      <div class="ps-row" style="margin-top:16px;gap:8px;">
        <button class="ps-btn primary" id="ps-override-save">${isNewOverride?'Add':'Save'}</button>
        <button class="ps-btn ghost" id="ps-override-cancel">Cancel</button>
      </div>
    </div>
  `;
}

function renderBatchEditor(p){
  const isNewBatch = editingBatchId === '_new';
  const cfg = isNewBatch ? {id:null, unitsPerBatch:2, timeH:0, timeM:0, weightG:0, projectFiles:{}} : p.batchConfigs.find(c=>c.id===editingBatchId);
  if(!cfg){ editingBatchId = null; return renderProductBatchesSection(p); }

  const targets = [{id:'_any', name:'Default (any printer)'}, ...printers.map(pr => ({id: pr.id, name: pr.name}))];
  const fileRows = targets.map(target => {
    const entry = cfg.projectFiles && cfg.projectFiles[target.id];
    let action;
    if(entry){
      const isGcode = /\.gcode$/i.test(entry.path||'');
      const emptyTargets = targets.filter(t => t.id !== target.id && !(cfg.projectFiles && cfg.projectFiles[t.id]) && !(isGcode && t.id === '_any'));
      const moveControl = emptyTargets.length>0 ? `
        <select class="ps-select" style="width:auto;padding:4px 8px;font-size:12px;" data-action="move-batchedit-file" data-target="${target.id}">
          <option value="">Move to…</option>
          ${emptyTargets.map(t=>`<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}
        </select>` : '';
      action = `<a class="ps-btn ghost small" href="orcaslicer://open?file=${encodeURIComponent(entry.url)}">Open in Orca</a> ${moveControl} <button class="ps-btn ghost small" data-action="remove-batchedit-file" data-target="${target.id}">✕</button>`;
    } else if(window.uploadProjectFile){
      action = `<input type="file" data-action="upload-batchedit-file" data-target="${target.id}" style="display:none;" accept=".3mf,.stl,.step,.stp,.gcode" /><button class="ps-btn ghost small" data-action="trigger-batchedit-file-upload" data-target="${target.id}">Upload…</button>`;
    } else {
      action = `<span class="ps-hint">—</span>`;
    }
    return `<div class="ps-row" style="justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);"><span class="ps-hint">${escapeHtml(target.name)}</span><div class="ps-row" style="gap:4px;">${action}</div></div>`;
  }).join('');

  return `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>${isNewBatch?'Add Batch':'Edit Batch'}</div>
      <div class="ps-hint" style="margin:8px 0;">Have g-code for this specific plate? Import it and these fields fill in — or type them yourself.</div>
      <input type="file" id="ps-batchedit-gcode-file" accept=".gcode,.gco,.g" style="display:none;" />
      <button class="ps-btn" id="ps-batchedit-gcode-trigger">Import from G-code…</button>
      <div class="ps-row" style="flex-wrap:wrap;gap:12px;margin-top:12px;">
        <div class="ps-field" style="min-width:110px;margin-bottom:0;">
          <span class="ps-field-label">Units per batch</span>
          <input class="ps-input" type="number" min="2" id="ps-batchedit-units" value="${cfg.unitsPerBatch}" />
        </div>
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Hours</span>
          <input class="ps-input" type="number" min="0" id="ps-batchedit-timeh" value="${cfg.timeH}" />
        </div>
        <div class="ps-field" style="min-width:90px;margin-bottom:0;">
          <span class="ps-field-label">Minutes</span>
          <input class="ps-input" type="number" min="0" max="59" id="ps-batchedit-timem" value="${cfg.timeM}" />
        </div>
        <div class="ps-field" style="min-width:100px;margin-bottom:0;">
          <span class="ps-field-label">Weight (g)</span>
          <input class="ps-input" type="number" min="0" id="ps-batchedit-weight" value="${cfg.weightG}" />
        </div>
      </div>
      <div class="ps-row" style="margin-top:16px;gap:8px;">
        <button class="ps-btn primary" id="ps-batchedit-save">${isNewBatch?'Add Batch':'Save Batch'}</button>
        <button class="ps-btn ghost" id="ps-batchedit-cancel">Cancel</button>

        ? `<div class="ps-panel-title" style="margin-top:18px;"><span class="dot"></span>Project Files</div>${fileRows}`
        : '<div class="ps-hint" style="margin-top:12px;">Save this batch first, then you can attach project files to it.</div>'}
    </div>
  `;
}

function wireProductEditor(root, p, isNew){
  let pendingFileToAttach = isNew ? (p.pendingFile || null) : null;
  document.getElementById('ps-editor-back').addEventListener('click', () => {
    editingProductId = null; editingBatchId = null; editingOverrideId = null;
    renderCatalog();
  });

  // ---- Top-of-form g-code import: fills fields only, no upload/hosting ----
  document.getElementById('ps-editor-gcode-trigger').addEventListener('click', () => {
    document.getElementById('ps-editor-gcode-file').click();
  });
  document.getElementById('ps-editor-gcode-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const text = await file.text();
      const {timeMin, weightG} = parseGcodeMetadata(text);
      if(timeMin==null && weightG==null){ alert("Couldn't find a time or weight estimate in this file."); e.target.value=''; return; }
      if(timeMin!=null){
        document.getElementById('ps-editor-timeh').value = Math.floor(timeMin/60);
        document.getElementById('ps-editor-timem').value = timeMin%60;
      }
      if(weightG!=null) document.getElementById('ps-editor-weight').value = Math.round(weightG);
      if(isNew && !document.getElementById('ps-editor-name').value.trim()){
        document.getElementById('ps-editor-name').value = file.name.replace(/\.(gcode|gco|g)$/i,'').replace(/[_-]+/g,' ').trim();
      }
      if(isNew){
        pendingFileToAttach = file;
        document.getElementById('ps-editor-pending-filename').textContent = file.name;
        document.getElementById('ps-editor-pending-file').style.display = '';
      }
      if(!isNew){
        // Editing an existing product — these fields auto-save, so commit immediately.
        saveProductFieldsFromForm(p);
      }
    } catch(err){ alert('Failed to read that file: ' + (err.message||err)); }
    e.target.value = '';
  });

  function readFormFields(){
    return {
      name: document.getElementById('ps-editor-name').value.trim(),
      type: document.getElementById('ps-editor-type').value,
      timeH: Math.max(0, parseInt(document.getElementById('ps-editor-timeh').value)||0),
      timeM: Math.min(59, Math.max(0, parseInt(document.getElementById('ps-editor-timem').value)||0)),
      weightG: Math.max(0, parseInt(document.getElementById('ps-editor-weight').value)||0)
    };
  }

  if(isNew){
    document.getElementById('ps-editor-create').addEventListener('click', async () => {
      const f = readFormFields();
      if(!f.name){ alert('Give the product a name first.'); return; }
      const newId = uid('prod');
      const newProduct = {id:newId, name:f.name, type:f.type, timeH:f.timeH, timeM:f.timeM, weightG:f.weightG, projectFiles:{}, batchConfigs:[]};
      catalog.push(newProduct);
      priorityOrder.push(newId);
      const targetSelectEl = document.getElementById('ps-editor-pending-target');
      if(pendingFileToAttach && window.uploadProjectFile && targetSelectEl){
        const target = targetSelectEl.value;
        try {
          const path = `${newId}-${target}-${Date.now()}-${pendingFileToAttach.name}`;
          const url = await window.uploadProjectFile(pendingFileToAttach, path);
          newProduct.projectFiles[target] = {url, path};
        } catch(err){
          alert('Product created, but the file failed to attach: ' + (err.message||err));
        }
      }
      saveCatalog(); saveOrder();
      editingProductId = null;
      renderCatalog(); renderSchedule(); regenerateIfActive();
    });
    document.getElementById('ps-editor-cancel').addEventListener('click', () => {
      editingProductId = null;
      renderCatalog();
    });
    return; // nothing else to wire for a brand-new, not-yet-created product
  }

  // ---- Editing an existing product: fields auto-save ----
  function saveProductFieldsFromForm(product){
    const f = readFormFields();
    if(!f.name) return; // don't let it save down to a blank name
    product.name = f.name;
    product.type = f.type;
    product.timeH = f.timeH;
    product.timeM = f.timeM;
    product.weightG = f.weightG;
    saveCatalog(); regenerateIfActive();
  }
  ['ps-editor-name','ps-editor-type','ps-editor-timeh','ps-editor-timem','ps-editor-weight'].forEach(fieldId => {
    document.getElementById(fieldId).addEventListener('change', () => saveProductFieldsFromForm(p));
  });

  document.getElementById('ps-editor-done').addEventListener('click', () => {
    editingProductId = null; editingBatchId = null; editingOverrideId = null;
    renderCatalog();
  });
  document.getElementById('ps-editor-delete').addEventListener('click', () => {
    catalog = catalog.filter(x=>x.id!==p.id);
    priorityOrder = priorityOrder.filter(x=>x!==p.id);
    delete orderQty[p.id];
    saveCatalog(); saveOrder();
    editingProductId = null; editingBatchId = null; editingOverrideId = null;
    renderCatalog(); renderSchedule(); regenerateIfActive();
  });

  // ---- Project Files (product-level) ----
  const targets = [{id:'_any'}, ...printers.map(pr=>({id:pr.id}))];
  targets.forEach(target => {
    const uploadInput = root.querySelector(`[data-action="upload-product-file"][data-target="${target.id}"]`);
    const triggerBtn = root.querySelector(`[data-action="trigger-product-file-upload"][data-target="${target.id}"]`);
    if(triggerBtn) triggerBtn.addEventListener('click', () => uploadInput.click());
    if(uploadInput){
      uploadInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        if(target.id==='_any' && /\.gcode$/i.test(file.name)){
          alert("G-code is sliced for one specific printer — pick that printer's row instead of Default.");
          e.target.value = '';
          return;
        }
        triggerBtn.disabled = true; triggerBtn.textContent = 'Uploading…';
        try {
          const path = `${p.id}-${target.id}-${Date.now()}-${file.name}`;
          const url = await window.uploadProjectFile(file, path);
          if(!p.projectFiles) p.projectFiles = {};
          p.projectFiles[target.id] = {url, path};
          if(/\.gcode$/i.test(file.name)){
            try {
              const text = await file.text();
              const {timeMin, weightG} = parseGcodeMetadata(text);
              if(timeMin!=null){ p.timeH = Math.floor(timeMin/60); p.timeM = timeMin%60; }
              if(weightG!=null){ p.weightG = Math.round(weightG); }
            } catch(err){ console.error('gcode parse failed', err); }
          }
          saveCatalog();
          renderCatalog();
        } catch(err){
          triggerBtn.disabled = false; triggerBtn.textContent = 'Upload…';
          alert('Upload failed: ' + (err.message||err));
        }
      });
    }
    const removeBtn = root.querySelector(`[data-action="remove-product-file"][data-target="${target.id}"]`);
    if(removeBtn){
      removeBtn.addEventListener('click', async () => {
        const entry = p.projectFiles && p.projectFiles[target.id];
        try { if(window.deleteProjectFile && entry && entry.path) await window.deleteProjectFile(entry.path); }
        catch(err){ console.error(err); }
        if(p.projectFiles) delete p.projectFiles[target.id];
        saveCatalog(); renderCatalog();
      });
    }
    const moveSelect = root.querySelector(`[data-action="move-product-file"][data-target="${target.id}"]`);
    if(moveSelect){
      moveSelect.addEventListener('change', () => {
        const toTarget = moveSelect.value;
        if(!toTarget || !p.projectFiles || !p.projectFiles[target.id]) return;
        // Same file, same storage path — just reassign which printer's
        // slot it lives under. No re-upload, no Supabase Storage call.
        p.projectFiles[toTarget] = p.projectFiles[target.id];
        delete p.projectFiles[target.id];
        saveCatalog(); renderCatalog();
      });
    }
  });

  // ---- Batches list actions ----
  const addBatchBtn = document.getElementById('ps-add-batch-btn');
  if(addBatchBtn){
    addBatchBtn.addEventListener('click', () => { editingBatchId = '_new'; renderCatalog(); });
  }
  root.querySelectorAll('[data-action="edit-batch"]').forEach(btn => {
    btn.addEventListener('click', () => { editingBatchId = btn.getAttribute('data-configid'); renderCatalog(); });
  });
  root.querySelectorAll('[data-action="remove-batch"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const configId = btn.getAttribute('data-configid');
      p.batchConfigs = p.batchConfigs.filter(c=>c.id!==configId);
      saveCatalog(); renderCatalog();
    });
  });

  // ---- Batch editor (add/edit) ----
  const batchGcodeTrigger = document.getElementById('ps-batchedit-gcode-trigger');
  if(batchGcodeTrigger){
    batchGcodeTrigger.addEventListener('click', () => document.getElementById('ps-batchedit-gcode-file').click());
    document.getElementById('ps-batchedit-gcode-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      try {
        const text = await file.text();
        const {timeMin, weightG} = parseGcodeMetadata(text);
        if(timeMin==null && weightG==null){ alert("Couldn't find a time or weight estimate in this file."); e.target.value=''; return; }
        if(timeMin!=null){
          document.getElementById('ps-batchedit-timeh').value = Math.floor(timeMin/60);
          document.getElementById('ps-batchedit-timem').value = timeMin%60;
        }
        if(weightG!=null) document.getElementById('ps-batchedit-weight').value = Math.round(weightG);
      } catch(err){ alert('Failed to read that file: ' + (err.message||err)); }
      e.target.value = '';
    });
  }
  const batchSaveBtn = document.getElementById('ps-batchedit-save');
  if(batchSaveBtn){
    batchSaveBtn.addEventListener('click', () => {
      const units = Math.max(2, parseInt(document.getElementById('ps-batchedit-units').value)||2);
      const timeH = Math.max(0, parseInt(document.getElementById('ps-batchedit-timeh').value)||0);
      const timeM = Math.min(59, Math.max(0, parseInt(document.getElementById('ps-batchedit-timem').value)||0));
      const weightG = Math.max(0, parseInt(document.getElementById('ps-batchedit-weight').value)||0);
      if(editingBatchId === '_new'){
        p.batchConfigs.push({id: uid('batch'), unitsPerBatch:units, timeH, timeM, weightG, projectFiles:{}});
      } else {
        const cfg = p.batchConfigs.find(c=>c.id===editingBatchId);
        if(cfg){ cfg.unitsPerBatch=units; cfg.timeH=timeH; cfg.timeM=timeM; cfg.weightG=weightG; }
      }
      saveCatalog();
      editingBatchId = null;
      renderCatalog();
    });
  }
  const batchCancelBtn = document.getElementById('ps-batchedit-cancel');
  if(batchCancelBtn){
    batchCancelBtn.addEventListener('click', () => { editingBatchId = null; renderCatalog(); });
  }

  // ---- Printer-specific time overrides ----
  const addOverrideBtn = document.getElementById('ps-add-override-btn');
  if(addOverrideBtn){
    addOverrideBtn.addEventListener('click', () => { editingOverrideId = '_new'; renderCatalog(); });
  }
  root.querySelectorAll('[data-action="edit-override"]').forEach(btn => {
    btn.addEventListener('click', () => { editingOverrideId = btn.getAttribute('data-printerid'); renderCatalog(); });
  });
  root.querySelectorAll('[data-action="remove-override"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const printerId = btn.getAttribute('data-printerid');
      delete p.printerOverrides[printerId];
      saveCatalog(); renderCatalog();
    });
  });
  const overrideSaveBtn = document.getElementById('ps-override-save');
  if(overrideSaveBtn){
    overrideSaveBtn.addEventListener('click', () => {
      const printerSelect = document.getElementById('ps-override-printer');
      const printerId = printerSelect.value;
      if(!printerId) return;
      const timeH = Math.max(0, parseInt(document.getElementById('ps-override-timeh').value)||0);
      const timeM = Math.min(59, Math.max(0, parseInt(document.getElementById('ps-override-timem').value)||0));
      const weightG = Math.max(0, parseInt(document.getElementById('ps-override-weight').value)||0);
      if(!p.printerOverrides) p.printerOverrides = {};
      p.printerOverrides[printerId] = {timeH, timeM, weightG};
      saveCatalog();
      editingOverrideId = null;
      renderCatalog();
    });
  }
  const overrideCancelBtn = document.getElementById('ps-override-cancel');
  if(overrideCancelBtn){
    overrideCancelBtn.addEventListener('click', () => { editingOverrideId = null; renderCatalog(); });
  }

  // ---- Batch's own project files (edit mode only, not while adding) ----
  if(editingBatchId && editingBatchId !== '_new'){
    const cfg = p.batchConfigs.find(c=>c.id===editingBatchId);
    if(cfg){
      targets.forEach(target => {
        const uploadInput = root.querySelector(`[data-action="upload-batchedit-file"][data-target="${target.id}"]`);
        const triggerBtn = root.querySelector(`[data-action="trigger-batchedit-file-upload"][data-target="${target.id}"]`);
        if(triggerBtn) triggerBtn.addEventListener('click', () => uploadInput.click());
        if(uploadInput){
          uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            if(target.id==='_any' && /\.gcode$/i.test(file.name)){
              alert("G-code is sliced for one specific printer — pick that printer's row instead of Default.");
              e.target.value = '';
              return;
            }
            triggerBtn.disabled = true; triggerBtn.textContent = 'Uploading…';
            try {
              const path = `${p.id}-batch-${cfg.id}-${target.id}-${Date.now()}-${file.name}`;
              const url = await window.uploadProjectFile(file, path);
              if(!cfg.projectFiles) cfg.projectFiles = {};
              cfg.projectFiles[target.id] = {url, path};
              if(/\.gcode$/i.test(file.name)){
                try {
                  const text = await file.text();
                  const {timeMin, weightG} = parseGcodeMetadata(text);
                  if(timeMin!=null){ cfg.timeH = Math.floor(timeMin/60); cfg.timeM = timeMin%60; }
                  if(weightG!=null){ cfg.weightG = Math.round(weightG); }
                } catch(err){ console.error('gcode parse failed', err); }
              }
              saveCatalog();
              renderCatalog();
            } catch(err){
              triggerBtn.disabled = false; triggerBtn.textContent = 'Upload…';
              alert('Upload failed: ' + (err.message||err));
            }
          });
        }
        const removeBtn = root.querySelector(`[data-action="remove-batchedit-file"][data-target="${target.id}"]`);
        if(removeBtn){
          removeBtn.addEventListener('click', async () => {
            const entry = cfg.projectFiles && cfg.projectFiles[target.id];
            try { if(window.deleteProjectFile && entry && entry.path) await window.deleteProjectFile(entry.path); }
            catch(err){ console.error(err); }
            if(cfg.projectFiles) delete cfg.projectFiles[target.id];
            saveCatalog(); renderCatalog();
          });
        }
        const moveSelect = root.querySelector(`[data-action="move-batchedit-file"][data-target="${target.id}"]`);
        if(moveSelect){
          moveSelect.addEventListener('change', () => {
            const toTarget = moveSelect.value;
            if(!toTarget || !cfg.projectFiles || !cfg.projectFiles[target.id]) return;
            cfg.projectFiles[toTarget] = cfg.projectFiles[target.id];
            delete cfg.projectFiles[target.id];
            saveCatalog(); renderCatalog();
          });
        }
      });
    }
  }
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- rendering: Settings tab ----------
function exportAllData(){
  const snapshot = {
    exportedAt: new Date().toISOString(),
    version: 1,
    catalog, types, settings, printers, spools, stock, orderQty, priorityOrder, productionLog, estimateItems, estimateScenarios, jobs, partDefs
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'print-scheduler-export-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importAllData(jsonText){
  const data = JSON.parse(jsonText);
  if(!data || typeof data !== 'object') throw new Error('not a valid export file');

  if(Array.isArray(data.catalog)) catalog = data.catalog;
  if(Array.isArray(data.types) && data.types.length>0) types = data.types;
  if(data.settings && typeof data.settings === 'object') settings = data.settings;
  if(Array.isArray(data.printers)) printers = data.printers;
  if(Array.isArray(data.spools)) spools = data.spools;
  if(Array.isArray(data.stock)) stock = data.stock;
  if(data.orderQty && typeof data.orderQty === 'object') orderQty = data.orderQty;
  if(Array.isArray(data.priorityOrder)) priorityOrder = data.priorityOrder;
  if(Array.isArray(data.productionLog)) productionLog = data.productionLog;
  if(Array.isArray(data.estimateItems)) estimateItems = data.estimateItems;
  if(Array.isArray(data.estimateScenarios) && data.estimateScenarios.length>0) estimateScenarios = data.estimateScenarios;
  if(Array.isArray(data.jobs)) jobs = data.jobs;
  if(Array.isArray(data.partDefs)){
    partDefs = data.partDefs;
    partDefs.forEach(pd => { if(!Array.isArray(pd.replacementLog)) pd.replacementLog = []; });
  }

  // Keep priorityOrder consistent with whatever catalog came in.
  priorityOrder = priorityOrder.filter(id => catalog.some(p=>p.id===id));
  catalog.forEach(p => { if(!priorityOrder.includes(p.id)) priorityOrder.push(p.id); });
  // Older exports predate project files / batch configs — same backfill the
  // normal load path already does, so an older export doesn't crash render.
  catalog.forEach(p => {
    if(!p.projectFiles) p.projectFiles = {};
    if(!Array.isArray(p.batchConfigs)) p.batchConfigs = [];
    p.batchConfigs.forEach(cfg => { if(!cfg.projectFiles) cfg.projectFiles = {}; });
    if(!p.printerOverrides || typeof p.printerOverrides !== 'object') p.printerOverrides = {};
  });
  printers.forEach(p => { if(!('spoolId' in p)) p.spoolId = null; });
  printers.forEach(p => { if(!('hoursResetAt' in p)) p.hoursResetAt = null; });
  printers.forEach(p => {
    if(!p.partInstalls) p.partInstalls = {};
    partDefs.forEach(pd => {
      if(!p.partInstalls[pd.id]) p.partInstalls[pd.id] = {installedAt: new Date().toISOString(), notified:false};
    });
  });
  Object.keys(orderQty).forEach(id => {
    if(typeof orderQty[id] === 'number'){ orderQty[id] = {qty: orderQty[id], pin: null}; }
  });

  await Promise.all([
    saveCatalog(), saveTypes(), saveSettings(), savePrinters(), saveSpools(), saveStock(), saveOrder(), saveLog(), saveEstimateItems(), saveEstimateScenarios(), saveJobs(), savePartDefs()
  ]);
  syncConsumption();

  liveSchedule = null;
  renderSchedule(); renderLog(); renderEstimate(); renderJobs(); renderPrinters(); renderFilament(); renderCatalog(); renderSettings();
}

    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Notifications</div>

      <div class="ps-hint" style="margin-top:10px;">When something's actually printing (logged with a start but no finish yet), you'll get a notification about 5 minutes before its estimated finish — names the product and which printer. You'll also get one when a maintenance part (tracked on the Printers tab) reaches its lifespan. Needs this tab to stay open somewhere (doesn't need to be focused, just not closed), and works best on the deployed site — Claude's chat window may block notification permissions entirely.</div>

      </div>

    </div>
  `;

  renderNotifStatus();
  document.getElementById('ps-notif-enable').addEventListener('click', async () => {
    if(typeof Notification === 'undefined'){
      document.getElementById('ps-notif-status').textContent = 'Notifications aren\'t available in this browser/context.';
      return;
    }
    try {
      await Notification.requestPermission();
    } catch(e){ /* some browsers still use the older callback form; permission getter below handles it either way */ }

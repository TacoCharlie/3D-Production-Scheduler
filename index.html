<!DOCTYPE html>
<html lang="en">
<head>

<title>Print Queue — Production Scheduler</title>

  html, body { margin:0; padding:0; background:#1a1815; }

<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  #ps-root {
    --bg: #1a1815;
    --panel: #221f1b;
    --panel-2: #29251f;
    --line: #3a342c;
    --text: #ece6da;
    --muted: #9a9184;
    --heat: #ef6a2c;
    --heat-dim: #7a4126;
    --cool: #3e9d95;
    --cool-dim: #2a4b48;
    --vase: #d99a3f;
    --cutter: #5aa8c9;
    --danger: #d9534f;
    --ok: #6fae63;
    --radius: 6px;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    box-sizing: border-box;
  }
  #ps-root * { box-sizing: border-box; }
  #ps-root .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .ps-shell { max-width: 1040px; margin: 0 auto; padding: 28px 20px 60px; }

  .ps-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 22px; flex-wrap:wrap; gap:8px; }
  .ps-title { font-family:'Archivo Expanded', sans-serif; font-weight:800; font-size: 22px; letter-spacing: 0.3px; text-transform: uppercase; }
  .ps-title span { color: var(--heat); }
  .ps-subtitle { color: var(--muted); font-size: 12.5px; font-family:'JetBrains Mono',monospace; }

  .ps-tabs { display:flex; gap:2px; border-bottom: 1px solid var(--line); margin-bottom: 22px; flex-wrap:wrap; }
  .ps-tab { padding: 10px 16px; font-size:13px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase; color: var(--muted); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; font-family:'Inter',sans-serif; }
  .ps-tab.active { color: var(--text); border-bottom-color: var(--heat); }
  .ps-tab:hover:not(.active) { color: var(--text); }

  .ps-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .ps-panel-title { font-family:'Archivo Expanded',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color: var(--muted); margin: 0 0 14px 0; display:flex; align-items:center; gap:8px;}
  .ps-panel-title .dot { width:6px;height:6px;border-radius:50%; background: var(--heat); display:inline-block; }

  table.ps-table { width:100%; border-collapse: collapse; }
  table.ps-table th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color: var(--muted); font-weight:600; padding: 0 8px 8px; border-bottom: 1px solid var(--line); }
  table.ps-table td { padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.ps-table tr:last-child td { border-bottom: none; }

  .ps-input, .ps-select {
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    border-radius: 4px; padding: 6px 8px; font-size: 13px; font-family:'JetBrains Mono',monospace; width: 100%;
  }
  .ps-input:focus, .ps-select:focus { outline: 1px solid var(--heat); border-color: var(--heat); }
  .ps-input.ps-narrow { width: 58px; text-align:center; }
  .ps-input.ps-name { font-family:'Inter',sans-serif; }
  .ps-input:disabled { opacity: 0.35; }

  .ps-tag { font-size:10px; text-transform:uppercase; letter-spacing:0.4px; padding:2px 7px; border-radius:20px; font-weight:600; white-space:nowrap; }

  .ps-btn { background: var(--panel-2); border:1px solid var(--line); color: var(--text); padding: 7px 13px; border-radius:4px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .ps-btn:hover { border-color: var(--muted); }
  .ps-btn.primary { background: var(--heat); border-color: var(--heat); color:#1a1815; }
  .ps-btn.primary:hover { background:#ff7d43; }
  .ps-btn.ghost { background:none; border:none; color: var(--muted); padding:4px 6px; }
  .ps-btn.ghost:hover { color: var(--text); }
  .ps-btn.small { padding: 4px 8px; font-size: 11px; }
  .ps-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .ps-row { display:flex; gap:10px; align-items:center; }
  .ps-daycheck { display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:20px; cursor:pointer; user-select:none; background: var(--panel-2); color: var(--muted); }
  .ps-daycheck.on { border-color: var(--heat); color: #1a1815; background: var(--heat); font-weight:700; }
  .ps-field-label { font-size:11px; text-transform:uppercase; letter-spacing:0.4px; color: var(--muted); margin-bottom:6px; display:block; }
  .ps-field { margin-bottom: 16px; }
  .ps-hint { color: var(--muted); font-size:11.5px; margin-top:6px; }

  .ps-printer-card { border:1px solid var(--line); border-radius: var(--radius); padding:14px 16px; margin-bottom:12px; background: var(--panel-2); }
  .ps-printer-card:last-child { margin-bottom:0; }
  .ps-printer-top { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .ps-printer-top input.ps-name { flex:1; min-width:160px; font-size:14px; font-weight:600; }
  .ps-status-pill { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; padding:6px 12px; border-radius:20px; cursor:pointer; border:1px solid transparent; white-space:nowrap; }
  .ps-status-pill.active { background: color-mix(in srgb, var(--ok) 20%, transparent); color: var(--ok); border-color: var(--ok); }
  .ps-status-pill.down { background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); border-color: var(--danger); }

  .ps-summary-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; margin-bottom:18px; }
  .ps-summary-cell { background: var(--panel); padding: 14px 16px; }
  .ps-summary-num { font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:600; color: var(--heat); }
  .ps-summary-label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color: var(--muted); margin-top:3px; }

  .ps-printer-block { margin-bottom: 26px; }
  .ps-printer-block-head { font-family:'Archivo Expanded',sans-serif; font-weight:700; font-size:14px; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; }
  .ps-status-current { display:flex; align-items:flex-start; gap:10px; }
  .ps-status-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
  .ps-status-dot.printing { background: var(--heat); animation: ps-pulse 1.6s ease-in-out infinite; }
  .ps-status-dot.idle { background: var(--muted); }
  .ps-hprogress-track { width:100%; height:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:5px; position:relative; overflow:hidden; margin:8px 0 6px; }
  .ps-hprogress-fill { position:absolute; top:0; bottom:0; left:0; background:var(--heat); transition:width 0.3s; }
  .ps-hprogress-fill.overdue { background:var(--danger); }
  .ps-status-overdue-banner { margin-top:10px; padding:10px 12px; background: color-mix(in srgb, var(--danger) 22%, transparent); border:1px solid var(--danger); border-radius:4px; color: var(--danger); font-weight:700; font-size:14.5px; }
  .ps-status-label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color: var(--muted); font-weight:600; margin-bottom:4px; }
  .ps-status-job { margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .ps-files-panel { margin-top:8px; padding:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; min-width:260px; }
  .ps-status-grid { display:grid; grid-template-columns: 1fr 170px; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .ps-status-left { background:var(--panel); padding:14px 16px; display:flex; flex-direction:column; justify-content:center; }
  .ps-status-right { background:var(--line); display:flex; flex-direction:column; gap:1px; }
  .ps-status-right .ps-summary-cell { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .ps-printer-block-head .dot { width:7px; height:7px; border-radius:50%; background: var(--ok); display:inline-block; }

  .ps-day { margin-bottom: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
  .ps-day:first-child { padding-top: 0; border-top: none; }
  .ps-day-head { display:flex; align-items:baseline; gap:10px; margin-bottom:8px; }
  .ps-day-date { font-family:'Archivo Expanded',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.3px; }
  .ps-day-meta { color: var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace; }
  .ps-day-collapsed .ps-day-date { color: var(--muted); }
  .ps-week-collapsed { background: var(--panel-2); border-radius: 4px; padding: 4px 10px; }

  .ps-gantt { position:relative; height:44px; background: repeating-linear-gradient(90deg, var(--panel-2), var(--panel-2) 1px, transparent 1px, transparent calc(100%/12)); border:1px solid var(--line); border-radius:4px; overflow:hidden; }
  .ps-block { position:absolute; top:5px; bottom:5px; border-radius:3px; display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:600; overflow:hidden; white-space:nowrap; color:#1a1815; }

  .ps-joblist div { padding: 2px 0; }
  .ps-joblist b { color: var(--text); }

  .ps-empty { text-align:center; padding: 40px 20px; color: var(--muted); font-size:13px; }
  .ps-warnbox { background: color-mix(in srgb, var(--danger) 14%, var(--panel)); border:1px solid var(--danger); border-radius:4px; padding:10px 14px; font-size:12.5px; margin-bottom:16px; color: #f2b8b5; }
  .ps-save-note { font-size:11px; color: var(--muted); font-family:'JetBrains Mono',monospace; }
  #ps-auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .ps-auth-card { width:100%; max-width:340px; background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding:28px 24px; }

  .ps-spool-card { border:1px solid var(--line); border-radius: var(--radius); padding:14px 16px; margin-bottom:12px; background: var(--panel-2); }
  .ps-spool-card:last-child { margin-bottom:0; }
  .ps-spool-top { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .ps-spool-top input.ps-name { flex:1.4; min-width:150px; font-size:14px; font-weight:600; }
  .ps-spool-swatch { width:16px; height:16px; border-radius:50%; border:1px solid var(--line); flex-shrink:0; }
  .ps-spool-bar-track { height:8px; border-radius:6px; background: var(--panel); border:1px solid var(--line); overflow:hidden; margin-top:8px; }
  .ps-spool-bar-fill { height:100%; background: var(--cool); }
  .ps-spool-bar-fill.low { background: var(--danger); }
  .ps-badge-low { font-size:10px; text-transform:uppercase; letter-spacing:0.4px; font-weight:700; padding:2px 8px; border-radius:12px; background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); }
  .ps-swap-tag { display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.4px; font-weight:700; padding:1px 6px; border-radius:10px; background: color-mix(in srgb, var(--danger) 25%, transparent); color: #f2b8b5; margin-left:6px; vertical-align:middle; }
  .ps-block.spool-short { outline: 2px solid var(--danger); outline-offset: -2px; }
  .ps-type-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .ps-type-row:last-child { margin-bottom:0; }
  .ps-type-row input.ps-name { flex:1; }
  .ps-type-swatch-input { width:36px; height:32px; padding:2px; flex-shrink:0; }
  .ps-type-error { color: var(--danger); font-size:11.5px; margin-top:8px; }
  .ps-log-entry { display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:12.5px; flex-wrap:wrap; }
  .ps-log-failed { background: color-mix(in srgb, var(--danger) 8%, transparent); border-radius:4px; padding-left:8px; padding-right:8px; }
  .ps-log-entry:last-child { border-bottom:none; }
  .ps-log-entry .mono { color: var(--muted); }
  .ps-view-toggle .ps-btn { border-radius:20px; }
  .actual-progress { animation: ps-pulse 1.6s ease-in-out infinite; box-shadow: 0 0 0 2px var(--heat) inset; }
  @keyframes ps-pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.55; } }
  .ps-now-line { position:absolute; top:-14px; bottom:0; width:2px; background: var(--text); z-index:3; }
  .ps-now-label { position:absolute; top:-14px; transform:translateX(-50%); font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text); white-space:nowrap; letter-spacing:0.3px; }
  .ps-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:10.5px; color:var(--muted); margin-top:6px; }
  .ps-legend span { display:inline-flex; align-items:center; gap:5px; }
  .ps-swatch { width:16px; height:16px; border-radius:3px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; color:#1a1815; }
  .ps-swatch.sw-done { background: var(--ok); }
  .ps-swatch.sw-progress { background: var(--heat); animation: ps-pulse 1.4s ease-in-out infinite; }
  .ps-swatch.sw-planned { background: var(--cool); }
  .ps-swatch.sw-failed { background: var(--danger); }
  .ps-block.model-change { border-left: 3px solid var(--text); }
  .ps-changeover { display:flex; align-items:center; gap:8px; margin:4px 0; color: var(--muted); font-size:10.5px; }
  .ps-changeover::before, .ps-changeover::after { content:''; flex:1; height:1px; background: var(--line); }
</style>

<div id="ps-root">
  <div id="ps-auth-screen" style="display:none;">
    <div class="ps-auth-card">

<script>
(function(){

// ---- Supabase config ----
// Fill these in after running SUPABASE_SETUP.sql and creating a project.
// Both values are meant to be public in client-side code — Supabase's anon
// key is safe to expose as long as Row Level Security is on and requires
// authentication, which the setup SQL enables. Leave the placeholders as-is
// to keep using browser-local storage instead (no login, no sync).
const SUPABASE_URL = 'https://uybigzsddjbfaqxgnyfv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fg83nAsSoJgqmxn7LZvS5w_NDRc8j5v';

const supabaseConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
let sb = null;
if(supabaseConfigured && typeof window.supabase !== 'undefined'){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ---- Project file storage (for "Open in OrcaSlicer") ----
// Requires a public Supabase Storage bucket named 'project-files' — see
// SUPABASE_SETUP.sql. Public read is required because OrcaSlicer's
// orcaslicer://open?file= handler downloads the file itself, with no way
// to attach an auth header.
if(sb){
  window.uploadProjectFile = async function(file, path){
    const {error} = await sb.storage.from('project-files').upload(path, file, {upsert:true});
    if(error) throw error;
    const {data} = sb.storage.from('project-files').getPublicUrl(path);
    return data.publicUrl;
  };
  window.deleteProjectFile = async function(path){
    const {error} = await sb.storage.from('project-files').remove([path]);
    if(error) throw error;
  };
}

if(typeof window.storage === 'undefined'){
  if(sb){
    window.storage = {
      async get(key){
        const {data, error} = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
        if(error) throw error;
        if(!data) throw new Error('not found');
        return {key, value: data.value, shared:false};
      },
      async set(key, value){
        const {error} = await sb.from('kv_store').upsert({key, value, updated_at: new Date().toISOString()});
        if(error) throw error;
        return {key, value, shared:false};
      },
      async delete(key){
        const {error} = await sb.from('kv_store').delete().eq('key', key);
        if(error) throw error;
        return {key, deleted:true, shared:false};
      },
      async list(prefix){
        const {data, error} = await sb.from('kv_store').select('key');
        if(error) throw error;
        const keys = (data||[]).map(r=>r.key).filter(k => !prefix || k.startsWith(prefix));
        return {keys, prefix, shared:false};
      }
    };
  } else {
    const LS_PREFIX = 'print-scheduler:';
    window.storage = {
      async get(key){
        const raw = localStorage.getItem(LS_PREFIX+key);
        if(raw === null) throw new Error('not found');
        return {key, value: raw, shared:false};
      },
      async set(key, value){
        localStorage.setItem(LS_PREFIX+key, value);
        return {key, value, shared:false};
      },
      async delete(key){
        localStorage.removeItem(LS_PREFIX+key);
        return {key, deleted:true, shared:false};
      },
      async list(prefix){
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith(LS_PREFIX))
          .map(k => k.slice(LS_PREFIX.length))
          .filter(k => !prefix || k.startsWith(prefix));
        return {keys, prefix, shared:false};
      }
    };
  }
}

// ---- Auth gating ----
// No public sign-up here on purpose: this app has one intended user, created
// directly in the Supabase dashboard (Authentication -> Users -> Add user).
// The sign-in form only ever calls signInWithPassword, never signUp.
if(sb){
  window.__deferAppStart = true;
}

function showAuthScreen(){
  document.getElementById('ps-auth-screen').style.display = 'flex';
  document.querySelector('.ps-shell').style.display = 'none';
}
function showApp(){
  // Remove (not just hide) the auth screen once signed in — a hidden-but-
  // still-present password field keeps getting tracked by the browser's
  // password manager, which is what was causing the repeated "Update
  // password?" prompt on unrelated actions elsewhere in the app.
  const authScreen = document.getElementById('ps-auth-screen');
  if(authScreen) authScreen.remove();
  document.querySelector('.ps-shell').style.display = '';
  const signout = document.getElementById('ps-auth-signout');
  if(signout) signout.style.display = '';
}

async function bootWithAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    showApp();
    startApp();
  } else {
    showAuthScreen();
  }

  sb.auth.onAuthStateChange((event, newSession) => {
    if(event === 'SIGNED_IN' && newSession){
      showApp();
      startApp();
    }
    if(event === 'SIGNED_OUT'){
      location.reload();
    }
  });

  const submitBtn = document.getElementById('ps-auth-submit');
  const errEl = document.getElementById('ps-auth-error');
  async function attemptSignIn(){
    errEl.textContent = '';

// If this file is running outside a Claude artifact (i.e. hosted as a normal
// webpage), window.storage won't exist. Fall back to the browser's own
// localStorage with the same async {get,set,delete,list} shape, so nothing
// else in this file has to know or care which one it's talking to.
if(typeof window.storage === 'undefined'){
  const LS_PREFIX = 'print-scheduler:';
  window.storage = {
    async get(key){
      const raw = localStorage.getItem(LS_PREFIX+key);
      if(raw === null) throw new Error('not found');
      return {key, value: raw, shared:false};
    },
    async set(key, value){
      localStorage.setItem(LS_PREFIX+key, value);
      return {key, value, shared:false};
    },
    async delete(key){
      localStorage.removeItem(LS_PREFIX+key);
      return {key, deleted:true, shared:false};
    },
    async list(prefix){
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith(LS_PREFIX))
        .map(k => k.slice(LS_PREFIX.length))
        .filter(k => !prefix || k.startsWith(prefix));
      return {keys, prefix, shared:false};
    }
  };
}

async function loadState(){
  try { const c = await window.storage.get('catalog'); catalog = c ? JSON.parse(c.value) : JSON.parse(JSON.stringify(DEFAULT_CATALOG)); }
  catch(e){ catalog = JSON.parse(JSON.stringify(DEFAULT_CATALOG)); }
  // Different printers (brands especially) often need their own slicer
  // profile/plate setup for the "same" product — one project file per
  // product isn't enough. Move to one file per (product, printer) pair,
  // keyed by printer id, plus a printer-agnostic '_any' slot for a shared
  // default. Anything already uploaded under the old single-file model
  // becomes that default rather than being lost.
  catalog.forEach(p => {
    if(!p.projectFiles) p.projectFiles = {};
    if(p.projectFileUrl){
      p.projectFiles['_any'] = {url: p.projectFileUrl, path: p.projectFilePath || null};
      delete p.projectFileUrl;
      delete p.projectFilePath;
    }
  });
  // A product's own timeH/timeM/weightG/projectFiles stay exactly what they
  // were — that's the "1 unit" configuration and everything else in the app
  // (scheduling, Estimate, Jobs) keeps assuming that unchanged. batchConfigs
  // is purely additive: other ways of producing multiple units of this same
  // product in a single physical print (a multi-up plate), each with its own
  // time, weight, and project files. Only used at logging time.
  catalog.forEach(p => { if(!Array.isArray(p.batchConfigs)) p.batchConfigs = []; });
  catalog.forEach(p => {
    p.batchConfigs.forEach(cfg => { if(!cfg.projectFiles) cfg.projectFiles = {}; });
  });

  try { const t = await window.storage.get('types'); types = t ? JSON.parse(t.value) : JSON.parse(JSON.stringify(DEFAULT_TYPES)); }
  catch(e){ types = JSON.parse(JSON.stringify(DEFAULT_TYPES)); }
  if(types.length===0) types.push({id: uid('type'), name:'Product', color:'#d99a3f'});
  catalog.forEach(p => { if(!types.some(t=>t.id===p.type)) p.type = types[0].id; });

  try { const s = await window.storage.get('settings'); settings = s ? JSON.parse(s.value) : JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
  catch(e){ settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
  if(typeof settings.estimateSpoolG !== 'number') settings.estimateSpoolG = 1000;

  try { const pr = await window.storage.get('printers'); printers = pr ? JSON.parse(pr.value) : JSON.parse(JSON.stringify(DEFAULT_PRINTERS)); }
  catch(e){ printers = JSON.parse(JSON.stringify(DEFAULT_PRINTERS)); }
  printers.forEach(p => { if(!('spoolId' in p)) p.spoolId = null; });
  printers.forEach(p => { if(!('hoursResetAt' in p)) p.hoursResetAt = null; });

  try { const sp = await window.storage.get('spools'); spools = sp ? JSON.parse(sp.value) : JSON.parse(JSON.stringify(DEFAULT_SPOOLS)); }
  catch(e){ spools = JSON.parse(JSON.stringify(DEFAULT_SPOOLS)); }

  try { const st = await window.storage.get('stock'); stock = st ? JSON.parse(st.value) : JSON.parse(JSON.stringify(DEFAULT_STOCK)); }
  catch(e){ stock = JSON.parse(JSON.stringify(DEFAULT_STOCK)); }
  stock.forEach(st => { if(typeof st.qtyOnOrder !== 'number') st.qtyOnOrder = 0; });

  try { const pd = await window.storage.get('partDefs'); partDefs = pd ? JSON.parse(pd.value) : []; }
  catch(e){ partDefs = []; }
  partDefs.forEach(pd => { if(!Array.isArray(pd.replacementLog)) pd.replacementLog = []; });
  // Every printer gets an install-time entry for every part definition so
  // its hours-since-install clock has somewhere to start counting from.
  printers.forEach(p => {
    if(!p.partInstalls) p.partInstalls = {};
    partDefs.forEach(pd => {
      if(!p.partInstalls[pd.id]) p.partInstalls[pd.id] = {installedAt: new Date().toISOString(), notified: false};
    });
  });

  try {
    const o = await window.storage.get('lastOrder');
    if (o) {
      const parsed = JSON.parse(o.value);
      orderQty = parsed.orderQty || {};
      priorityOrder = parsed.priorityOrder || catalog.map(p=>p.id);
    } else {
      priorityOrder = catalog.map(p=>p.id);
    }
  } catch(e){ priorityOrder = catalog.map(p=>p.id); }

  // Migrate legacy orderQty shape (plain number) to {qty, pin}.
  Object.keys(orderQty).forEach(id => {
    if(typeof orderQty[id] === 'number'){ orderQty[id] = {qty: orderQty[id], pin: null}; }
    if(!orderQty[id] || typeof orderQty[id] !== 'object'){ orderQty[id] = {qty:0, pin:null}; }
    if(typeof orderQty[id].pin === 'undefined') orderQty[id].pin = null;
  });

  priorityOrder = priorityOrder.filter(id => catalog.some(p=>p.id===id));
  catalog.forEach(p => { if(!priorityOrder.includes(p.id)) priorityOrder.push(p.id); });

  try { const lg = await window.storage.get('productionLog'); productionLog = lg ? JSON.parse(lg.value) : []; }
  catch(e){ productionLog = []; }
  // Test prints used to always get plannedMin:0 even when tied to a real
  // product — backfill the estimate for anything logged before that fix.
  let backfilledTestTime = false;
  productionLog.forEach(e => {
    if(e.isTest && e.productId && !e.plannedMin){
      const product = catalog.find(p=>p.id===e.productId);
      if(product){ e.plannedMin = product.timeH*60 + product.timeM; backfilledTestTime = true; }
    }
  });
  if(backfilledTestTime) saveLog();

  try { const ei = await window.storage.get('estimateItems'); estimateItems = ei ? JSON.parse(ei.value) : []; }
  catch(e){ estimateItems = []; }
  // Migrate from the old qty-map format if that's all that exists.
  if(estimateItems.length===0){

  }
  try { const es = await window.storage.get('estimateScenarios'); estimateScenarios = es ? JSON.parse(es.value) : []; }
  catch(e){ estimateScenarios = []; }
  if(!Array.isArray(estimateScenarios) || estimateScenarios.length===0){
    estimateScenarios = Array.from({length: printers.length||1}, (_,i)=>i+1);
  }

  try { const jb = await window.storage.get('jobs'); jobs = jb ? JSON.parse(jb.value) : []; }
  catch(e){ jobs = []; }
  jobs.forEach(j => { if(typeof j.manualDone !== 'number') j.manualDone = 0; });
}

// Every log entry claims exactly one unit of its product's queued quantity,
// exactly once, tracked via entry.consumed. This runs after any log change
// AND once on load, so entries that predate this mechanism (or were created
// while storage was misbehaving) get caught and reconciled automatically
// instead of silently sitting there unaccounted for.
function syncConsumption(){
  let changed = false;
  productionLog.forEach(e => {
    if(!e.consumed){
      const entry = getOrderEntry(e.productId);
      entry.qty = Math.max(0, entry.qty - (e.unitsCompleted||1));
      e.consumed = true;
      changed = true;
    }
    if(!e.spoolConsumed){
      if(e.spoolIdAtLogTime){
        const spool = spools.find(s=>s.id===e.spoolIdAtLogTime);
        if(spool){ spool.remainingG = Math.max(0, spool.remainingG - (e.weightGAtLogTime||0)); }
      }
      e.spoolConsumed = true;
      changed = true;
    }
  });
  if(changed){ saveOrder(); saveLog(); saveSpools(); }
  return changed;
}

// A failed print never produced a usable unit, so it shouldn't count toward
// the queue the way a real completion does — but the filament it used is
// genuinely gone, so that stays consumed. Locks the entry (consumed=true)
// so syncConsumption never tries to touch it again.
function markFailed(entryId, actualWeightG){
  const e = productionLog.find(x=>x.id===entryId);
  if(!e || e.failed) return;
  if(e.consumed){
    getOrderEntry(e.productId).qty += (e.unitsCompleted||1);
  }
  if(e.jobCounted){
    applyJobCredit(e, -(e.unitsCompleted||1));
    e.jobCounted = false;
  }
  // Correct the spool deduction to reflect what actually got used, not the
  // full model weight — a print that failed early shouldn't be charged as
  // if it printed all the way through.
  if(typeof actualWeightG === 'number'){
    if(e.spoolConsumed && e.spoolIdAtLogTime){
      const spool = spools.find(s=>s.id===e.spoolIdAtLogTime);
      if(spool){
        spool.remainingG += (e.weightGAtLogTime||0); // give back what was originally deducted
        spool.remainingG = Math.max(0, spool.remainingG - actualWeightG); // deduct the corrected amount
      }
    }
    e.weightGAtLogTime = actualWeightG;
    saveSpools();
  }
  e.failed = true;
  if(!e.actualEnd) e.actualEnd = new Date().toISOString();
  e.consumed = true; // locked — this was never a real unit, don't let it get re-claimed
  saveLog(); saveOrder();
}

// Reverses markFailed — lets syncConsumption treat it as a normal completed
// print again (claims a unit toward the queue, as it should have all along).
function unmarkFailed(entryId){
  const e = productionLog.find(x=>x.id===entryId);
  if(!e || !e.failed) return;
  e.failed = false;
  e.consumed = false;
  saveLog();
  syncConsumption();
}
function getOrderEntry(id){ if(!orderQty[id]) orderQty[id] = {qty:0, pin:null, batchConfigId:null}; if(!('batchConfigId' in orderQty[id])) orderQty[id].batchConfigId = null; return orderQty[id]; }

// Any time a spool actually starts being used on a printer — whichever of
// the three ways that happened (guided Change Spool, the Printers tab
// dropdown, or the Filament tab's assignment dropdown) — stamp it, so the
// schedule can show exactly when it happened. Doesn't re-stamp if this
// spool is already the one marked as loaded on this printer (avoids
// generating a new event just from re-selecting the same thing).
function stampSpoolLoad(spoolId, printerId){
  if(!spoolId) return;
  const spool = spools.find(s=>s.id===spoolId);
  if(!spool) return;
  if(spool.loadedOnPrinterId === printerId && spool.loadedAt) return;
  spool.loadedAt = new Date().toISOString();
  spool.loadedOnPrinterId = printerId;
}

const NOTIFY_MIN_BEFORE = 5;
function checkFinishNotifications(){
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const now = new Date();
  let changed = false;
  productionLog.forEach(e => {
    if(e.actualEnd || e.failed || e.notifiedFinishSoon) return;
    const estFinish = new Date(new Date(e.actualStart).getTime() + (e.plannedMin||0)*60000);
    const minLeft = (estFinish - now) / 60000;
    if(minLeft <= NOTIFY_MIN_BEFORE){
      const product = catalog.find(p=>p.id===e.productId);
      const printer = printers.find(p=>p.id===e.printerId);
      try {
        new Notification('Print finishing soon', {
          body: `${product?product.name:'A print'} on ${printer?printer.name:'a printer'} — est. ${fmtClock(estFinish)}`
        });
      } catch(err){ console.error('notification failed', err); }
      e.notifiedFinishSoon = true;
      changed = true;
    }
  });
  if(changed) saveLog();
}

function checkMaintenanceNotifications(){
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  let changed = false;
  printers.forEach(p => {
    partDefs.forEach(pd => {
      const install = p.partInstalls[pd.id];
      if(!install || install.notified) return;
      const hoursOn = printerHours(p.id, new Date(install.installedAt));
      if(pd.lifespanHours>0 && hoursOn >= pd.lifespanHours){
        try {
          new Notification('Maintenance due', {
            body: `${pd.name} on ${p.name} has reached ${fmtHours(pd.lifespanHours)} — time to inspect or replace.`
          });
        } catch(err){ console.error('notification failed', err); }
        install.notified = true;
        changed = true;
      }
    });
  });
  if(changed) savePrinters();
}

// ---------- time helpers ----------
function fmtClock(date){
  let h = date.getHours(), m = date.getMinutes();
  const ampm = h>=12 ? 'PM':'AM';
  h = h % 12; if(h===0) h=12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
function fmtDateHead(date){
  return DAY_NAMES[date.getDay()] + ', ' + date.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function fmtDuration(min){
  min = Math.round(min);
  const h = Math.floor(min/60), m = min%60;
  if(h<=0) return m+'m';
  if(m===0) return h+'h';
  return h+'h '+m+'m';
}
function fmtSpan(fromDate, toDate){
  const totalMin = Math.max(0, (toDate - fromDate) / 60000);
  if(totalMin < 60*24) return fmtDuration(totalMin);
  let days = Math.floor(totalMin / (60*24));
  let hours = Math.round((totalMin - days*60*24) / 60);
  if(hours>=24){ days += 1; hours = 0; }
  return hours>0 ? `${days}d ${hours}h` : `${days}d`;
}

// Turns a slicer-style duration string ("2h 15m 30s", "1d 2h", "45m") into
// total whole minutes. Returns null if nothing duration-like is found.
function parseDurationString(s){
  const d = s.match(/(\d+)\s*d\b/i);
  const h = s.match(/(\d+)\s*h\b/i);
  const m = s.match(/(\d+)\s*m(?!s)\b/i); // "m" but not "ms"
  const sec = s.match(/(\d+)\s*s\b/i);
  if(!d && !h && !m && !sec) return null;
  let totalMin = 0;
  if(d) totalMin += parseInt(d[1])*24*60;
  if(h) totalMin += parseInt(h[1])*60;
  if(m) totalMin += parseInt(m[1]);
  if(sec) totalMin += parseInt(sec[1])/60;
  return Math.round(totalMin);
}

// Pulls estimated print time and filament weight out of sliced g-code
// comments. Tries several patterns since OrcaSlicer, PrusaSlicer, Bambu
// Studio, and Cura all phrase this slightly differently, and formats shift
// between versions. Returns nulls for whatever it can't find rather than
// guessing.
function parseGcodeMetadata(text){
  let timeMin = null, weightG = null;

  const timePatterns = [
    /estimated printing time \(normal mode\)\s*=\s*([^\n\r;]+)/i,
    /model printing time:\s*[^\n\r;]*;\s*total estimated time:\s*([^\n\r;]+)/i,
    /total estimated time\s*[:=]\s*([^\n\r;]+)/i,
  ];
  for(const re of timePatterns){
    const m = text.match(re);
    if(m && m[1]){
      const parsed = parseDurationString(m[1]);
      if(parsed != null){ timeMin = parsed; break; }
    }
  }
  if(timeMin == null){
    const m = text.match(/;\s*TIME\s*:\s*(\d+)/i); // Cura-style, seconds
    if(m) timeMin = Math.round(parseInt(m[1])/60);
  }

  const weightPatterns = [
    /total filament used\s*\[g\]\s*=\s*([\d.]+)/i,
    /filament used\s*\[g\]\s*=\s*([\d.]+)/i,
    /filament\s*weight\s*\[g\]\s*[:=]\s*([\d.]+)/i,
    /total filament weight\s*[:=]\s*([\d.]+)\s*g/i,
  ];
  for(const re of weightPatterns){
    const m = text.match(re);
    if(m && m[1]){ weightG = parseFloat(m[1]); break; }
  }

  return {timeMin, weightG};
}

function windowBounds(date, settings){
  const [sh,sm] = settings.startTime.split(':').map(Number);
  const [eh,em] = settings.endTime.split(':').map(Number);
  const start = new Date(date.getFullYear(),date.getMonth(),date.getDate(),sh,sm,0,0);
  const end = new Date(date.getFullYear(),date.getMonth(),date.getDate(),eh,em,0,0);
  return {start,end};
}
function isWorkDay(date, workDays){ return workDays.includes(date.getDay()); }
function nextStart(afterDate, settings){
  let d = new Date(afterDate);
  for(let i=0;i<400;i++){
    if(isWorkDay(d, settings.workDays)){
      const {start,end} = windowBounds(d, settings);
      if(d < start) return new Date(start);
      if(d < end) return new Date(d);
    }
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1, 0,0,0,0);
  }
  return d;
}
function computeLiveCursor(printerId, settings){
  const entries = productionLog.filter(e => e.printerId === printerId);
  if(entries.length === 0) return nextStart(new Date(), settings);
  entries.sort((a,b) => new Date(b.actualStart) - new Date(a.actualStart));
  const last = entries[0];
  const endTime = last.actualEnd
    ? new Date(last.actualEnd)
    : new Date(new Date(last.actualStart).getTime() + last.plannedMin*60000);
  const withDowntime = new Date(endTime.getTime() + settings.downtimeMin*60000);
  const now = new Date();
  // A printer's next slot should never be treated as "available" in the
  // past — if nothing's been logged since that entry, the honest read is
  // "free as of right now," not "still queued starting from days ago."
  const cursor = withDowntime > now ? withDowntime : now;
  return nextStart(cursor, settings);
}

// ---------- multi-printer scheduling engine ----------
// Event-driven: always advance whichever active printer becomes free soonest.
// Each machine has its own pinned queue (jobs the person locked to that printer)
// plus access to the shared pool. At every turn it best-fits — takes the
// longest job (from its pinned queue or the pool) that still fits what's left
// of the window — which is what actually keeps printers busy instead of just
// working a list in order. Priority order only breaks ties between equal-length
// candidates. mode='live' seeds each machine's starting point from the real
// production log instead of assuming everyone starts at the top of the window.
function buildMultiSchedule(queue, activePrinters, settings, mode){
  const machines = activePrinters.map(p => ({
    id: p.id, name: p.name,
    cursor: mode === 'live' ? computeLiveCursor(p.id, settings) : nextStart(new Date(), settings),
    days: [],
    pinned: []
  }));
  if(machines.length === 0) return { machines: [], unassigned: queue.slice() };

  const machineById = {};
  machines.forEach(m => { machineById[m.id] = m; });

  const pool = [];
  const unassignedPinned = [];
  queue.forEach(job => {
    if(job.pin){
      if(machineById[job.pin]) machineById[job.pin].pinned.push(job);
      else unassignedPinned.push(job);
    } else {
      pool.push(job);
    }
  });

  function remainingCount(){ return pool.length + machines.reduce((s,m)=>s+m.pinned.length,0); }

  let guard = 0, stall = 0;
  while(remainingCount() > 0 && guard < 8000 && stall < 500){
    guard++;
    machines.sort((a,b) => a.cursor - b.cursor);
    const m = machines[0];
    m.cursor = nextStart(m.cursor, settings);
    const {start, end} = windowBounds(m.cursor, settings);
    const dayWindowLen = (end - start) / 60000;

    let bestList = null, bestIdx = -1, bestFit = -1;
    [['pinned', m.pinned], ['pool', pool]].forEach(([, list]) => {
      for(let i=0;i<list.length;i++){
        const job = list[i];
        const finish = new Date(m.cursor.getTime() + job.printTimeMin*60000);
        if(finish <= end && job.printTimeMin > bestFit){
          bestFit = job.printTimeMin; bestList = list; bestIdx = i;
        }
      }
    });
    if(bestList === null){
      for(const list of [m.pinned, pool]){
        for(let i=0;i<list.length;i++){
          if(list[i].printTimeMin > dayWindowLen && m.cursor < end){ bestList = list; bestIdx = i; break; }
        }
        if(bestList) break;
      }
    }

    if(bestList === null){
      stall++;
      m.cursor = new Date(m.cursor.getFullYear(), m.cursor.getMonth(), m.cursor.getDate()+1, 0,0,0,0);
      continue;
    }
    stall = 0;

    const job = bestList.splice(bestIdx,1)[0];
    const jobStart = new Date(m.cursor);
    const jobEnd = new Date(m.cursor.getTime() + job.printTimeMin*60000);
    const overnight = jobEnd > end;
    const dateKey = jobStart.toDateString();
    let dayEntry = m.days.find(d => d.dateKey === dateKey);
    if(!dayEntry){ dayEntry = {dateKey, date:new Date(jobStart), jobs:[]}; m.days.push(dayEntry); }
    dayEntry.jobs.push({...job, start:jobStart, end:jobEnd, overnight});

    m.cursor = overnight ? jobEnd : new Date(jobEnd.getTime() + settings.downtimeMin*60000);
  }

  machines.forEach(m => m.days.sort((a,b) => a.date - b.date));
  const unassigned = pool.concat(machines.flatMap(m => m.pinned)).concat(unassignedPinned);
  return { machines, unassigned };
}

function jobTotals(job){
  let totalMin = 0, totalWeight = 0, totalUnits = 0;
  job.items.forEach(item => {
    const p = catalog.find(x=>x.id===item.id);
    if(!p) return;
    totalMin += (p.timeH*60+p.timeM) * item.qty;
    totalWeight += (p.weightG||0) * item.qty;
    totalUnits += item.qty;
  });
  return {totalMin, totalWeight, totalUnits};
}

// There's no direct link stored between a logged print and the Job it came
// from — once a job's items get merged into the real order they're
// indistinguishable from anything else queued for that product. This
// approximates the link instead: given what a printer is currently printing
// (or about to print next), find the active job that contains that product,
// preferring whichever was activated most recently. Progress is estimated by
// counting non-failed logged prints of that job's products, across every
// printer, logged since the job went active.
function findActiveJobForProduct(productId){
  if(!productId) return null;
  const candidates = jobs.filter(j => j.status==='active' && j.items.some(it=>it.id===productId));
  if(candidates.length===0) return null;
  candidates.sort((a,b) => new Date(b.activatedAt||b.createdAt) - new Date(a.activatedAt||a.createdAt));
  return candidates[0];
}
// Job progress is a plain number you set yourself — job.manualDone. No
// inference from log timing. The previous approach tried to guess which
// logged prints belonged to which job based on when they happened, and that
// guess kept being wrong against real, messy production timelines. This
// can't be wrong because nothing is being inferred.
function jobProgress(job){
  const {totalUnits} = jobTotals(job);
  const done = Math.max(0, job.manualDone||0);
  return {done: Math.min(done, totalUnits), totalUnits};
}

// Total time a printer has actually spent running, in hours. Counts failed
// and test prints too — the motors and hotend were on regardless of whether
// the print succeeded or was ever meant to ship, so this is closer to a real
// wear/maintenance odometer than a "successful prints only" figure. Only
// counts entries that have actually finished (or failed and were closed
// out) — an entry still mid-print isn't counted until it wraps up.
function printerHours(printerId, sinceDate){
  const entries = productionLog.filter(e => e.printerId === printerId && e.actualEnd);
  let since = sinceDate;
  if(since){
    // Logged start times only have minute precision — floor the reset point
    // to the minute too, or a print logged in the same minute as the reset
    // gets wrongly excluded.
    since = new Date(since.getFullYear(), since.getMonth(), since.getDate(), since.getHours(), since.getMinutes(), 0, 0);
  }
  const filtered = since ? entries.filter(e => new Date(e.actualStart) >= since) : entries;
  const totalMs = filtered.reduce((sum,e) => sum + (new Date(e.actualEnd) - new Date(e.actualStart)), 0);
  return totalMs / 3600000;
}
function fmtHours(h){
  if(h < 10) return h.toFixed(1)+'h';
  return Math.round(h)+'h';
}

// Logs a maintenance part replacement on a printer: records how many hours
// that instance actually lasted, folds that into the part's running average
// (so the lifespan estimate self-corrects toward reality — an early failure
// pulls the estimate down, a part that outlasted expectations pulls it up),
// and resets that printer's clock for the part to zero.
// Applies (or reverses, with a negative delta) job credit for a log entry
// that has an explicit jobId — never inferred, always whatever the user
// actually picked when logging. entry.jobCounted tracks whether this
// specific entry's credit is currently applied, so it can't be double-
// counted across the several places a print can transition to "done".
function applyJobCredit(entry, delta){
  if(!entry.jobId) return;
  const job = jobs.find(j=>j.id===entry.jobId);
  if(!job) return;
  const {totalUnits} = jobTotals(job);
  job.manualDone = Math.max(0, Math.min(totalUnits, (job.manualDone||0) + delta));
  saveJobs();
}
function creditJobIfDue(entry){
  if(entry.jobId && !entry.jobCounted && entry.actualEnd && !entry.failed){
    applyJobCredit(entry, entry.unitsCompleted||1);
    entry.jobCounted = true;
  }
}

function logPartReplacement(printerId, partDefId){
  const partDef = partDefs.find(pd => pd.id === partDefId);
  const printer = printers.find(p => p.id === printerId);
  if(!partDef || !printer || !printer.partInstalls[partDefId]) return;
  const installedAt = new Date(printer.partInstalls[partDefId].installedAt);
  const hoursElapsed = printerHours(printerId, installedAt);
  partDef.replacementLog.push({printerId, at: new Date().toISOString(), hoursElapsed});
  const intervals = partDef.replacementLog.map(r => r.hoursElapsed).filter(h => h > 0);
  if(intervals.length > 0){
    partDef.lifespanHours = intervals.reduce((s,h) => s+h, 0) / intervals.length;
  }
  printer.partInstalls[partDefId] = {installedAt: new Date().toISOString(), notified: false};
  savePartDefs(); savePrinters();
}

          <thead><tr><th style="width:60px">Order</th><th>Product</th><th style="width:70px">Qty</th><th style="width:36px"></th></tr></thead>

  const activeCards = active.map(job => {

        <div class="ps-printer-top">

          <span class="ps-hint mono">${t.totalUnits} unit${t.totalUnits!==1?'s':''} · ${fmtDuration(t.totalMin)}${t.totalWeight>0?' · '+t.totalWeight+'g':''}</span>
          <button class="ps-btn small" data-action="job-done">Mark Done</button>

        </div>

        ${isEditing ? `
        <div class="ps-row" style="margin-bottom:8px;gap:6px;">
          <input class="ps-input ps-narrow" type="number" min="0" max="${totalUnits}" id="ps-job-edit-input" value="${done}" style="width:70px;" />
          <span class="ps-hint">of ${totalUnits} unit${totalUnits!==1?'s':''} done</span>
          <button class="ps-btn primary small" data-action="job-edit-save">Save</button>
          <button class="ps-btn ghost small" data-action="job-edit-cancel">Cancel</button>
        </div>

        <div class="ps-row" style="margin-bottom:8px;gap:6px;">
          <span class="ps-hint">${done} of ${totalUnits} unit${totalUnits!==1?'s':''} done</span>
          <button class="ps-btn ghost small" data-action="job-edit-start">Edit</button>

        <div class="ps-printer-top">
          <span class="ps-hint" style="flex:1.4;">${escapeHtml(job.name)}</span>
          <span class="ps-hint mono">${t.totalUnits} unit${t.totalUnits!==1?'s':''}</span>
          <button class="ps-btn ghost small" data-action="job-delete">✕</button>

      <div class="ps-row" style="margin-top:14px;">
        <button class="ps-btn" id="ps-job-new">+ New job</button>
      </div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Active</div>
      <div class="ps-hint" style="margin-bottom:12px;">Already added to the real Order to Fulfill queue. Mark a job done once you know it's fully printed.</div>
      ${active.length===0 ? '<div class="ps-empty">Nothing active right now.</div>' : activeCards}
    </div>
    ${done.length>0 ? `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Done</div>

    if(activateBtn){
      activateBtn.addEventListener('click', () => {
        job.items.forEach(item => {
          const entry = getOrderEntry(item.id);
          entry.qty += item.qty;
        });
        job.status = 'active';
        job.activatedAt = new Date().toISOString();
        job.activatedAt = new Date().toISOString();
        saveOrder(); saveJobs();
        renderJobs(); regenerateIfActive();
      });
    }
    const doneBtn = card.querySelector('[data-action="job-done"]');
    if(doneBtn){
      doneBtn.addEventListener('click', () => {
        job.status = 'done';
        saveJobs(); renderJobs();
      });
    }
    const editStartBtn = card.querySelector('[data-action="job-edit-start"]');
    if(editStartBtn){
      editStartBtn.addEventListener('click', () => {
        editingJobId = job.id;
        renderJobs();
      });
    }
    const editSaveBtn = card.querySelector('[data-action="job-edit-save"]');
    if(editSaveBtn){
      editSaveBtn.addEventListener('click', () => {
        const {totalUnits} = jobTotals(job);
        const input = document.getElementById('ps-job-edit-input');
        job.manualDone = Math.max(0, Math.min(totalUnits, parseInt(input.value)||0));
        editingJobId = null;
        saveJobs(); renderJobs();
      });
    }
    const editCancelBtn = card.querySelector('[data-action="job-edit-cancel"]');
    if(editCancelBtn){
      editCancelBtn.addEventListener('click', () => {
        editingJobId = null;
        renderJobs();
      });
    }
    const deleteBtn = card.querySelector('[data-action="job-delete"]');
    if(deleteBtn){
      deleteBtn.addEventListener('click', () => {
        jobs = jobs.filter(j=>j.id!==jobId);
        saveJobs(); renderJobs();
      });
    }
    const addSelect = card.querySelector('[data-action="job-add-select"]');
    const addBtn = card.querySelector('[data-action="job-add-item"]');
    if(addBtn){
      addBtn.addEventListener('click', () => {
        const id = addSelect.value;
        if(!id) return;
        job.items.push({id, qty: 1});
        saveJobs(); renderJobs();
      });
    }
    card.querySelectorAll('[data-action="job-item-qty"]').forEach(input => {
      input.addEventListener('change', e => {
        const itemId = e.target.closest('tr').getAttribute('data-itemid');
        const item = job.items.find(it=>it.id===itemId);
        if(item) item.qty = Math.max(0, parseInt(e.target.value)||0);
        saveJobs();
      });
    });
    card.querySelectorAll('[data-action="job-item-remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        job.items = job.items.filter(it=>it.id!==itemId);
        saveJobs(); renderJobs();
      });
    });
    card.querySelectorAll('[data-action="job-item-up"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        const idx = job.items.findIndex(it=>it.id===itemId);
        if(idx>0){ [job.items[idx],job.items[idx-1]] = [job.items[idx-1],job.items[idx]]; saveJobs(); renderJobs(); }
      });
    });
    card.querySelectorAll('[data-action="job-item-down"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.closest('tr').getAttribute('data-itemid');
        const idx = job.items.findIndex(it=>it.id===itemId);
        if(idx<job.items.length-1){ [job.items[idx],job.items[idx+1]] = [job.items[idx+1],job.items[idx]]; saveJobs(); renderJobs(); }
      });
    });
  });

  const newJobBtn = document.getElementById('ps-job-new');
  if(newJobBtn){
    newJobBtn.addEventListener('click', () => {
      jobs.push({id: uid('job'), name: 'New job', items: [], status:'queued', createdAt: new Date().toISOString(), manualDone: 0});
      saveJobs(); renderJobs();
    });
  }
}

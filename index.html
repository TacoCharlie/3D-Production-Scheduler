  });
  document.getElementById('ps-import-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const text = await file.text();
      await importAllData(text);
      document.getElementById('ps-data-msg').textContent = 'Imported successfully.';
    } catch(err){
      document.getElementById('ps-data-msg').textContent = 'Import failed: ' + err.message;
    }
    e.target.value = '';
  });

  root.querySelectorAll('.ps-daycheck').forEach(el => {
    el.addEventListener('click', () => {
      const d = parseInt(el.getAttribute('data-day'));
      if(settings.workDays.includes(d)) settings.workDays = settings.workDays.filter(x=>x!==d);
      else settings.workDays.push(d);
      saveSettings(); renderSettings(); regenerateIfActive();
    });
  });
  document.getElementById('ps-start-time').addEventListener('change', e => { settings.startTime = e.target.value; saveSettings(); regenerateIfActive(); });
  document.getElementById('ps-end-time').addEventListener('change', e => { settings.endTime = e.target.value; saveSettings(); regenerateIfActive(); });
  document.getElementById('ps-downtime').addEventListener('change', e => { settings.downtimeMin = Math.max(0, parseInt(e.target.value)||0); saveSettings(); regenerateIfActive(); });
}

// ---------- rendering: Schedule tab ----------
function renderSchedule(){
  const root = document.getElementById('ps-tab-schedule');

  const rows = priorityOrder.map((id, idx) => {
    const p = catalog.find(x=>x.id===id);
    if(!p) return '';
    const entry = getOrderEntry(id);
    const printMin = p.timeH*60 + p.timeM;
    const incomplete = printMin<=0;
    const logged = loggedTodayCount(id);
    const pinOptions = `<option value="">Any (auto)</option>` + printers.map(pr =>
      `<option value="${pr.id}" ${entry.pin===pr.id?'selected':''}>${escapeHtml(pr.name)}${pr.status==='down'?' (down)':''}</option>`
    ).join('');
    const hasBatches = p.batchConfigs && p.batchConfigs.length>0;
    const selectedBatch = hasBatches ? p.batchConfigs.find(c=>c.id===entry.batchConfigId) : null;
    const runAsOptions = hasBatches ? `<option value="">Singles only</option>` + p.batchConfigs.map(c =>
      `<option value="${c.id}" ${entry.batchConfigId===c.id?'selected':''}>${c.unitsPerBatch}× batches</option>`
    ).join('') : '';
    let breakdownHint = '';
    if(selectedBatch && entry.qty>0){
      const fullBatches = Math.floor(entry.qty / selectedBatch.unitsPerBatch);
      const remainder = entry.qty % selectedBatch.unitsPerBatch;
      breakdownHint = fullBatches>0
        ? `<div class="ps-hint mono">${fullBatches}× ${selectedBatch.unitsPerBatch}-batch${remainder>0?' + '+remainder+' single'+(remainder!==1?'s':''):''}</div>`
        : `<div class="ps-hint mono" style="color:var(--heat);">qty too low for a full batch — all singles</div>`;
    }
    return `
      <tr data-id="${id}">
        <td>
          <div class="ps-row" style="gap:6px;">
            <button class="ps-btn ghost small" data-action="up" ${idx===0?'disabled':''}>↑</button>
            <button class="ps-btn ghost small" data-action="down" ${idx===priorityOrder.length-1?'disabled':''}>↓</button>
          </div>
        </td>
        <td>
          ${renderTag(p.type)}
          &nbsp;${escapeHtml(p.name)}
          ${incomplete?'<span class="ps-hint" style="color:var(--danger)"> — no print time set</span>':''}
        </td>
        <td class="mono ps-hint">${incomplete? '—' : fmtDuration(printMin)}</td>
        <td>
          <input class="ps-input ps-narrow" type="number" min="0" data-field="qty" value="${Math.max(0, entry.qty)}" />
          ${logged>0 ? `<div class="ps-hint mono">${logged} logged today</div>` : ''}
        </td>
        <td>
          ${hasBatches ? `<select class="ps-select" data-field="batchConfigId">${runAsOptions}</select>${breakdownHint}` : `<span class="ps-hint">—</span>`}
        </td>
        <td><select class="ps-select" data-field="pin">${pinOptions}</select></td>
      </tr>`;
  }).join('');

  const activeCount = printers.filter(p=>p.status==='active').length;
  const downCount = printers.length - activeCount;

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Order to Fulfill</div>
      <div class="ps-hint" style="margin-bottom:12px;">${activeCount} printer${activeCount!==1?'s':''} active${downCount>0? ', '+downCount+' down':''} — manage this on the Printers tab.</div>
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th style="width:60px">Priority</th><th>Product</th><th style="width:80px">Print time</th><th style="width:70px">Qty</th><th style="width:130px">Run as</th><th style="width:150px">Printer</th></tr></thead>
        <tbody id="ps-order-body">${rows}</tbody>
      </table>
      </div>
      <div class="ps-hint">List order is a tiebreaker, not a strict sequence — whichever printer frees up first grabs whatever fits its remaining time <b>best</b>. Pin a product to a specific printer and only that printer will ever run it; leave it "Any" and it pools across every active printer.</div>
      <div class="ps-row" style="margin-top:16px;">
        <button class="ps-btn primary" id="ps-generate">Generate schedule</button>
        <button class="ps-btn" id="ps-clear-order">Clear order</button>
      </div>
    </div>
    <div id="ps-schedule-output"></div>
  `;

  root.querySelectorAll('#ps-order-body tr').forEach(tr => {
    const id = tr.getAttribute('data-id');
    tr.querySelector('[data-field="qty"]').addEventListener('change', e => {
      getOrderEntry(id).qty = Math.max(0, parseInt(e.target.value)||0);
      saveOrder(); regenerateIfActive();
    });
    tr.querySelector('[data-field="pin"]').addEventListener('change', e => {
      getOrderEntry(id).pin = e.target.value || null;
      saveOrder(); regenerateIfActive();
    });
    const batchSelect = tr.querySelector('[data-field="batchConfigId"]');
    if(batchSelect){
      batchSelect.addEventListener('change', e => {
        getOrderEntry(id).batchConfigId = e.target.value || null;
        saveOrder(); regenerateIfActive();
      });
    }
    const upBtn = tr.querySelector('[data-action="up"]');
    const downBtn = tr.querySelector('[data-action="down"]');
    if(upBtn) upBtn.addEventListener('click', () => { moveInPriority(id,-1); });
    if(downBtn) downBtn.addEventListener('click', () => { moveInPriority(id,1); });
  });

  document.getElementById('ps-generate').addEventListener('click', onGenerate);
  document.getElementById('ps-clear-order').addEventListener('click', () => {
    orderQty = {};
    saveOrder();
    liveSchedule = null;
    document.getElementById('ps-schedule-output').innerHTML = '';
    renderSchedule();
  });

  if(liveSchedule) renderScheduleView();
}

function moveInPriority(id, dir){
  const idx = priorityOrder.indexOf(id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=priorityOrder.length) return;
  [priorityOrder[idx], priorityOrder[newIdx]] = [priorityOrder[newIdx], priorityOrder[idx]];
  saveOrder(); renderSchedule(); regenerateIfActive();
}

function regenerateIfActive(){
  if(document.getElementById('ps-tab-schedule')) renderSchedule();
  if(document.getElementById('ps-tab-filament')) renderFilament();
  if(document.getElementById('ps-tab-estimate')) renderEstimate();
  if(document.getElementById('ps-tab-jobs')) renderJobs();
  if(document.getElementById('ps-tab-catalog')) renderCatalog();
  if(document.getElementById('ps-tab-shipping')) renderShipping();
  if(document.getElementById('ps-tab-analytics')) renderAnalytics();
  if(document.getElementById('ps-tab-printers')) renderPrinters();
  if(document.getElementById('ps-tab-log') && editingLogId===null) renderLog();
  if(liveSchedule){
    const out = document.getElementById('ps-schedule-output');
    if(out) onGenerate();
  }
  if(document.getElementById('ps-tab-status')) renderStatus();
}

function onGenerate(){
  const outputEl = document.getElementById('ps-schedule-output');
  if(!outputEl) return;

  const missing = [];
  const queue = [];
  priorityOrder.forEach(id => {
    const entry = getOrderEntry(id);
    if(entry.qty<=0) return;
    const p = catalog.find(x=>x.id===id);
    if(!p) return;
    const resolved = getProductTimeWeight(p, entry.pin || null);
    const printTimeMin = resolved.timeH*60 + resolved.timeM;
    if(printTimeMin<=0){ missing.push(p.name); return; }

    const batchCfg = entry.batchConfigId ? (p.batchConfigs||[]).find(c=>c.id===entry.batchConfigId) : null;
    if(batchCfg){
      const fullBatches = Math.floor(entry.qty / batchCfg.unitsPerBatch);
      const remainder = entry.qty % batchCfg.unitsPerBatch;
      const batchTimeMin = batchCfg.timeH*60 + batchCfg.timeM;
      for(let i=0;i<fullBatches;i++){
        queue.push({productId:id, name:`${batchCfg.unitsPerBatch}× ${p.name}`, type:p.type, weightG:batchCfg.weightG, printTimeMin:batchTimeMin, pin: entry.pin || null, unitsPerBatch: batchCfg.unitsPerBatch});
      }
      for(let i=0;i<remainder;i++){
        queue.push({productId:id, name:p.name, type:p.type, weightG:p.weightG, printTimeMin, pin: entry.pin || null});
      }
    } else {
      for(let i=0;i<entry.qty;i++){
        queue.push({productId:id, name:p.name, type:p.type, weightG:resolved.weightG, printTimeMin, pin: entry.pin || null});
      }
    }
  });

  if(missing.length>0){
    outputEl.innerHTML = `<div class="ps-warnbox">Set a print time for: ${missing.map(escapeHtml).join(', ')} before generating a schedule.</div>`;
    liveSchedule = null;
    return;
  }
  if(queue.length===0){
    outputEl.innerHTML = `<div class="ps-empty">Enter a quantity for at least one product to build a schedule.</div>`;
    liveSchedule = null;
    return;
  }

  if(settings.workDays.length===0){
    outputEl.innerHTML = `<div class="ps-warnbox">No work days are checked on the Settings tab, so there's never a valid window to print in. Turn at least one day on.</div>`;
    liveSchedule = null;
    return;
  }
  const [wsH,wsM] = settings.startTime.split(':').map(Number);
  const [weH,weM] = settings.endTime.split(':').map(Number);
  if(wsH*60+wsM >= weH*60+weM){
    outputEl.innerHTML = `<div class="ps-warnbox">On the Settings tab, the window closes (${settings.endTime}) at or before it opens (${settings.startTime}) — nothing can ever fit, so nothing gets scheduled. Fix the open/close times and generate again.</div>`;
    liveSchedule = null;
    return;
  }

  const activePrinters = printers.filter(p=>p.status==='active');
  if(activePrinters.length===0){
    outputEl.innerHTML = `<div class="ps-warnbox">No active printers. Mark at least one printer as Active on the Printers tab.</div>`;
    liveSchedule = null;
    return;
  }

  const makeSummary = (result) => ({
    machines: result.machines,
    unassigned: result.unassigned,
    queueLen: queue.length,
    totalMin: queue.reduce((s,j)=>s+j.printTimeMin,0),
    totalWeight: queue.reduce((s,j)=>s+(j.weightG||0),0)
  });
liveSchedule = makeSummary(buildMultiSchedule(queue, activePrinters, settings, 'live'));
  liveSchedule.mode = 'live';

  renderScheduleView();
  if(document.getElementById('ps-tab-status')) renderStatus();
}

function renderScheduleView(){
  const outputEl = document.getElementById('ps-schedule-output');
  if(!outputEl) return;
  if(!liveSchedule){ outputEl.innerHTML = ''; return; }

  outputEl.innerHTML = `<div id="ps-schedule-body"></div>`;
  const body = document.getElementById('ps-schedule-body');
  body.innerHTML = '<div class="ps-hint" style="margin-bottom:12px;">Anchored to what\'s actually logged on the Log tab — printers with no log entries yet start from the top of the work window.</div>';
  renderScheduleOutput(liveSchedule, body);
}

function renderScheduleOutput(sched, container){
  const outputEl = container;
  if(!outputEl) return;
  if(!sched || sched.machines.length===0){
    outputEl.innerHTML += `<div class="ps-empty">No schedule yet.</div>`;
    return;
  }

  let overallLastEnd = null;
  sched.machines.forEach(m => {
    m.days.forEach(d => {
      if(d.jobs.length===0) return;
      const lastJob = d.jobs[d.jobs.length-1];
      if(!overallLastEnd || lastJob.end > overallLastEnd) overallLastEnd = lastJob.end;
    });
  });

  // Spool depletion: walk each machine's jobs in chronological order against its assigned spool.
  sched.machines.forEach(m => {
    const printer = printers.find(p => p.id === m.id);
    const spool = printer && printer.spoolId ? spools.find(s => s.id === printer.spoolId) : null;
    m.spoolInfo = spool ? {label: spool.label, remainingG: spool.remainingG} : null;
    m.spoolShortAt = null;
    let used = 0;
    m.days.forEach(d => {
      d.jobs.forEach(j => {
        used += (j.weightG || 0);
        j.cumWeight = used;
        j.spoolShort = spool ? used > spool.remainingG : false;
        if(j.spoolShort && m.spoolShortAt === null) m.spoolShortAt = j;
      });
    });
    m.spoolTotalUsed = used;
  });

  const spoolsNeeded = sched.totalWeight>0 ? Math.ceil(sched.totalWeight / settings.estimateSpoolG) : 0;
  const summary = `
    ${sched.unassigned && sched.unassigned.length>0 ? `<div class="ps-warnbox">${sched.unassigned.length} of ${sched.queueLen} queued prints couldn't be placed — double-check your work window and downtime settings. Showing what did get scheduled below.</div>` : ''}
    <div class="ps-summary-grid">
      <div class="ps-summary-cell"><div class="ps-summary-num">${sched.queueLen}</div><div class="ps-summary-label">Prints queued</div></div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${fmtDuration(sched.totalMin)}</div><div class="ps-summary-label">Total print time</div></div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${sched.totalWeight>0 ? sched.totalWeight+'g' : '—'}</div><div class="ps-summary-label">Filament</div>${spoolsNeeded>0 ? `<div class="ps-hint mono" style="margin-top:4px;">≈${spoolsNeeded} spool${spoolsNeeded!==1?'s':''} at ${settings.estimateSpoolG}g</div>` : ''}</div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${overallLastEnd? fmtDateHead(overallLastEnd) : '—'}</div><div class="ps-summary-label">${overallLastEnd? 'All done by '+fmtClock(overallLastEnd) : 'Completion'}</div></div>
    </div>
  `;

  const machinesHtml = sched.machines.map(m => {
    let displayDays = m.days;
    if(sched.mode === 'live'){
      const extraDays = [];
      const loggedDateKeys = [...new Set(productionLog.filter(e => e.printerId === m.id).map(e => new Date(e.actualStart).toDateString()))];
      loggedDateKeys.forEach(dateKey => {
        if(!m.days.some(d => d.dateKey === dateKey)){
          const sample = productionLog.find(e => e.printerId === m.id && new Date(e.actualStart).toDateString() === dateKey);
          extraDays.push({dateKey, date: new Date(sample.actualStart), jobs: []});
        }
      });
      if(extraDays.length>0){
        displayDays = m.days.concat(extraDays).sort((a,b) => a.date - b.date);
      }
    }
    if(displayDays.length===0){
      return `<div class="ps-printer-block"><div class="ps-printer-block-head"><span class="dot"></span>${escapeHtml(m.name)}</div><div class="ps-hint">Nothing assigned.</div></div>`;
    }
    let anyActualShown = false;
    const todayKey = new Date().toDateString();
    const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
    let prevProductId = null;

    // Real spool swaps on this printer (from "Change Spool" on the Printers
    // tab), chronological, so we can show exactly where in the timeline each
    // one actually happened — not just where the projection warns one's due.
    const spoolEvents = sched.mode === 'live'
      ? spools.filter(s => s.loadedOnPrinterId === m.id && s.loadedAt)
          .map(s => ({at: new Date(s.loadedAt), label: s.label}))
          .sort((a,b) => a.at - b.at)
      : [];
    let spoolEventIdx = 0;

    function weekKeyOf(date){
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      d.setDate(d.getDate() - d.getDay()); // back up to the Sunday starting this week
      return d.toDateString();
    }

    // Pass 1: render every day's block in chronological order (so change-of-
    // model tracking and the "any actual shown" flag stay continuous), while
    // recording enough about each to group past ones by week afterward.
    const dayRenders = displayDays.map(day => {
      const {start,end} = windowBounds(day.date, settings);
      const winMs = end - start;

      let jobs = day.jobs;
      if(sched.mode === 'live'){
        const actualJobs = getActualJobsForDay(m.id, day.dateKey);
        if(actualJobs.length>0){ anyActualShown = true; }
        jobs = actualJobs.concat(day.jobs).sort((a,b) => a.start - b.start);
      }

      const changeFlags = jobs.map((j,i) => {
        const prev = i===0 ? prevProductId : jobs[i-1].productId;
        return prev !== null && j.productId !== prev;
      });
      if(jobs.length>0) prevProductId = jobs[jobs.length-1].productId;

      const blocks = jobs.map((j,i) => {
        const clampedStart = j.start < start ? start : j.start;
        const leftPct = Math.max(0,(clampedStart-start)/winMs*100);
        const clampedEnd = j.overnight ? end : (j.end < end ? j.end : end);
        const widthPct = Math.max(1.5, (clampedEnd-clampedStart)/winMs*100);
        const shortTitle = j.spoolShort ? ' — spool will be out by this print' : '';

        let color, statusLabel;
        if(sched.mode === 'live'){
          if(j.actual && j.failed){ color = 'var(--danger)'; statusLabel = 'failed'; }
          else if(j.actual && !j.inProgress){ color = 'var(--ok)'; statusLabel = 'completed'; }
          else if(j.actual && j.inProgress){ color = 'var(--heat)'; statusLabel = 'in progress'; }
          else { color = 'var(--cool)'; statusLabel = 'upcoming'; }
        } else {
          color = j.type ? typeById(j.type).color : '#9a9184';
          statusLabel = null;
        }
        const bg = j.overnight
          ? `repeating-linear-gradient(45deg, ${color}, ${color} 6px, #1a1815 6px, #1a1815 10px)`
          : color;
        const pulseClass = (j.actual && j.inProgress) ? 'actual-progress' : '';
        const changeClass = changeFlags[i] ? 'model-change' : '';
        const stateTitle = statusLabel ? ` (${statusLabel})` : '';
        const changeTitle = changeFlags[i] ? ' — model change' : '';
        const label = widthPct > 6 ? (j.failed ? '✕ ' : (j.actual && !j.inProgress ? '✓ ' : '')) + escapeHtml(j.name) : '';
        return `<div class="ps-block ${j.spoolShort?'spool-short':''} ${pulseClass} ${changeClass}" style="left:${leftPct}%;width:${widthPct}%;background:${bg};${j.overnight?'opacity:0.9;':''}" title="${escapeHtml(j.name)}: ${fmtClock(j.start)} – ${fmtClock(j.end)}${j.overnight?' (runs past close)':''}${stateTitle}${changeTitle}${shortTitle}">${label}</div>`;
      }).join('');

      let nowMarker = '';
      if(sched.mode === 'live' && day.dateKey === todayKey){
        const now = new Date();
        if(now >= start && now <= end){
          const leftPct = (now-start)/winMs*100;
          nowMarker = `<div class="ps-now-line" style="left:${leftPct}%;"></div><div class="ps-now-label" style="left:${leftPct}%;">now</div>`;
        }
      }

      const jobLines = jobs.map((j,i) => {
        const marker = j.failed ? '<span style="color:var(--danger)">✕ failed</span> — ' : (j.actual ? (j.inProgress ? '<span style="color:var(--heat)">▶ printing now</span> — ' : '✓ ') : '');
        const changeover = changeFlags[i] ? `<div class="ps-changeover">switch to ${escapeHtml(j.name)}</div>` : '';
        let spoolChangeMarkers = '';
        while(spoolEventIdx < spoolEvents.length && spoolEvents[spoolEventIdx].at <= j.start){
          spoolChangeMarkers += `<div class="ps-changeover" style="color:var(--ok);">⟳ spool changed to "${escapeHtml(spoolEvents[spoolEventIdx].label)}" — ${fmtDateHead(spoolEvents[spoolEventIdx].at)} ${fmtClock(spoolEvents[spoolEventIdx].at)}</div>`;
          spoolEventIdx++;
        }
        return `
        ${spoolChangeMarkers}
        ${changeover}
        <div>${marker}<b>${escapeHtml(j.name)}</b> — ${fmtClock(j.start)} → ${j.inProgress ? 'now' : fmtClock(j.end)}${j.overnight?' <span style="color:var(--heat)">(runs unattended past window close)</span>':''}${j.spoolShort?' <span class="ps-swap-tag">swap spool before this</span>':''}</div>
      `;
      }).join('');

      const dayMidnight = new Date(day.date.getFullYear(), day.date.getMonth(), day.date.getDate());
      const isPast = sched.mode === 'live' && dayMidnight < todayMidnight;
      const dayKey = m.id + '|' + day.dateKey;
      const isExpanded = expandedPastDays.has(dayKey);

      let html;
      if(isPast && !isExpanded){
        html = `
          <div class="ps-day ps-day-collapsed" data-daykey="${dayKey}">
            <div class="ps-day-head">
              <div class="ps-day-date">${fmtDateHead(day.date)}</div>
              <div class="ps-row" style="gap:10px;">
                <div class="ps-day-meta">${jobs.length} print${jobs.length!==1?'s':''}</div>
                <button class="ps-btn ghost small" data-action="expand-day" data-daykey="${dayKey}">Show</button>
              </div>
            </div>
          </div>
        `;
      } else {
        const collapseBtn = isPast ? `<button class="ps-btn ghost small" data-action="collapse-day" data-daykey="${dayKey}">Hide</button>` : '';
        html = `
          <div class="ps-day">
            <div class="ps-day-head">
              <div class="ps-day-date">${fmtDateHead(day.date)}</div>
              <div class="ps-row" style="gap:10px;">
                <div class="ps-day-meta">${jobs.length} print${jobs.length!==1?'s':''}</div>
                ${collapseBtn}
              </div>
            </div>
            <div class="ps-gantt" style="overflow:visible;">${blocks}${nowMarker}</div>
            <div class="ps-joblist">${jobLines}</div>
          </div>
        `;
      }

      return { day, isPast, weekKey: isPast ? weekKeyOf(day.date) : null, html, jobCount: jobs.length };
    });

    // Pass 2: collapse consecutive past days sharing a week into one row,
    // unless that week has been expanded — today/future days pass through
    // untouched, always fully visible.
    const dayPieces = [];
    let di = 0;
    while(di < dayRenders.length){
      const d = dayRenders[di];
      if(!d.isPast){
        dayPieces.push(d.html);
        di++;
        continue;
      }
      const wk = d.weekKey;
      const group = [];
      while(di < dayRenders.length && dayRenders[di].isPast && dayRenders[di].weekKey === wk){
        group.push(dayRenders[di]);
        di++;
      }
      const weekKeyFull = m.id + '|' + wk;
      const totalPrints = group.reduce((s,g) => s+g.jobCount, 0);

      if(group.length === 1){
        // Not worth a week wrapper for a single lonely past day — show it
        // directly, same one-click show/hide as before.
        dayPieces.push(group[0].html);
        continue;
      }

      const label = fmtDateHead(group[0].day.date) + ' – ' + fmtDateHead(group[group.length-1].day.date);

      if(expandedPastWeeks.has(weekKeyFull)){
        dayPieces.push(`
          <div class="ps-week-group-head">
            <span>${label} · ${totalPrints} print${totalPrints!==1?'s':''} over ${group.length} day${group.length!==1?'s':''}</span>
            <button class="ps-btn ghost small" data-action="collapse-week" data-weekkey="${weekKeyFull}">Hide week</button>
          </div>
        `);
        group.forEach(g => dayPieces.push(g.html));
      } else {
        dayPieces.push(`
          <div class="ps-day ps-week-collapsed" data-weekkey="${weekKeyFull}">
            <div class="ps-day-head">
              <div class="ps-day-date">${label}</div>
              <div class="ps-row" style="gap:10px;">
                <div class="ps-day-meta">${totalPrints} print${totalPrints!==1?'s':''} · ${group.length} day${group.length!==1?'s':''}</div>
                <button class="ps-btn ghost small" data-action="expand-week" data-weekkey="${weekKeyFull}">Show week</button>
              </div>
            </div>
          </div>
        `);
      }
    }
    let trailingSpoolEvents = '';
    while(spoolEventIdx < spoolEvents.length){
      trailingSpoolEvents += `<div class="ps-changeover" style="color:var(--ok);">⟳ spool changed to "${escapeHtml(spoolEvents[spoolEventIdx].label)}" — ${fmtDateHead(spoolEvents[spoolEventIdx].at)} ${fmtClock(spoolEvents[spoolEventIdx].at)} — nothing scheduled here since</div>`;
      spoolEventIdx++;
    }
    const daysHtml = dayPieces.join('') + trailingSpoolEvents;

    const legend = (sched.mode === 'live' && anyActualShown) ? `
      <div class="ps-legend">
        <span><i class="ps-swatch sw-done">✓</i>Completed</span>
        <span><i class="ps-swatch sw-progress"></i>In progress</span>
        <span><i class="ps-swatch sw-planned"></i>Upcoming</span>
        <span><i class="ps-swatch sw-failed">✕</i>Failed</span>
      </div>
    ` : '';

    let spoolNote;
    if(!m.spoolInfo){
      spoolNote = `<div class="ps-hint">No spool assigned — filament isn't being tracked for this machine. Assign one on the Printers tab.</div>`;
    } else if(m.spoolShortAt){
      spoolNote = `<div class="ps-hint" style="color:var(--danger)">⚠ "${escapeHtml(m.spoolInfo.label)}" (${m.spoolInfo.remainingG}g on it) runs out during <b>${escapeHtml(m.spoolShortAt.name)}</b>, around ${fmtDateHead(m.spoolShortAt.start)} ${fmtClock(m.spoolShortAt.start)} — have a fresh spool ready.</div>`;
    } else {
      const leftover = m.spoolInfo.remainingG - m.spoolTotalUsed;
      spoolNote = `<div class="ps-hint">"${escapeHtml(m.spoolInfo.label)}" covers this queue with ~${Math.round(leftover)}g to spare.</div>`;
    }

    return `
      <div class="ps-printer-block">
        <div class="ps-printer-block-head"><span class="dot"></span>${escapeHtml(m.name)}</div>
        ${daysHtml}
        ${legend}
        ${spoolNote}
      </div>
    `;
  }).join('');

  outputEl.innerHTML += `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Timeline</div>
      ${summary}
      ${machinesHtml}
    </div>
  `;

  outputEl.querySelectorAll('[data-action="expand-day"]').forEach(btn => {
    btn.addEventListener('click', () => {
      expandedPastDays.add(btn.getAttribute('data-daykey'));
      renderScheduleView();
    });
  });
  outputEl.querySelectorAll('[data-action="collapse-day"]').forEach(btn => {
    btn.addEventListener('click', () => {
      expandedPastDays.delete(btn.getAttribute('data-daykey'));
      renderScheduleView();
    });
  });
  outputEl.querySelectorAll('[data-action="expand-week"]').forEach(btn => {
    btn.addEventListener('click', () => {
      expandedPastWeeks.add(btn.getAttribute('data-weekkey'));
      renderScheduleView();
    });
  });
  outputEl.querySelectorAll('[data-action="collapse-week"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const wk = btn.getAttribute('data-weekkey');
      expandedPastWeeks.delete(wk);
      // Collapsing the week again should also re-collapse any individual
      // days inside it that got expanded while the week was open, so it
      // doesn't spring back open half-expanded next time.
      const sepIdx = wk.indexOf('|');
      const mid = wk.slice(0, sepIdx);
      const weekStart = new Date(wk.slice(sepIdx+1));
      const weekEnd = new Date(weekStart.getTime() + 7*24*3600000);
      [...expandedPastDays].forEach(dk => {
        const dSepIdx = dk.indexOf('|');
        if(dk.slice(0, dSepIdx) !== mid) return;
        const d = new Date(dk.slice(dSepIdx+1));
        if(d >= weekStart && d < weekEnd) expandedPastDays.delete(dk);
      });
      renderScheduleView();
    });
  });
}

// ---------- tabs ----------
function setupTabs(){
  document.querySelectorAll('.ps-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.ps-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.getAttribute('data-tab');
      ['status','schedule','log','estimate','jobs','printers','filament','catalog','shipping','analytics','settings'].forEach(name => {
        document.getElementById('ps-tab-'+name).style.display = (name===target) ? '' : 'none';
      });
    });
  });
}

// Number inputs always render with a literal value (often 0) already in
// them. Selection APIs (.select(), setSelectionRange) don't work on
// type="number" inputs in real browsers — they're spec-restricted to text/
// search/url/tel/password — so clicking in just places the cursor next to
// that digit and typing appends instead of replacing it (e.g. "0" + "45" ->
// "045"). Clearing a bare 0 on focus, and restoring it if left blank, avoids
// needing selection support at all.
document.getElementById('ps-root').addEventListener('focusin', (e) => {
  if(e.target.matches('input[type="number"]') && e.target.value === '0'){
    e.target.value = '';
  }
});
document.getElementById('ps-root').addEventListener('focusout', (e) => {
  if(e.target.matches('input[type="number"]') && e.target.value === ''){
    e.target.value = '0';
  }
});

// ---------- init ----------
async function startApp(){
  await loadState();
  syncConsumption();
  setupTabs();
  renderStatus();
  renderSchedule();
  renderLog();
  renderEstimate();
  renderJobs();
  renderPrinters();
  renderFilament();
  renderCatalog();
  renderShipping();
  renderAnalytics();
  renderSettings();
  checkFinishNotifications();
  checkMaintenanceNotifications();
  setInterval(() => { checkFinishNotifications(); checkMaintenanceNotifications(); renderStatus(); }, 20000);
}
// In the normal Claude-artifact context (and in a standalone build with no
// auth configured), start immediately. A standalone build with auth enabled
// sets window.__deferAppStart = true before this runs, and calls startApp()
// itself once the person signs in.
if(typeof window.__deferAppStart === 'undefined'){
  startApp();
}

})();
</script>

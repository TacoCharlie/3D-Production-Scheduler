<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  #ps-root {
    --bg: #1a1815;
    --panel: #221f1b;
    --panel-2: #29251f;
    --line: #3a342c;
    --text: #ece6da;
    --muted: #9a9184;
    --heat: #ef6a2c;
    --heat-dim: #7a4126;
    --cool: #3e9d95;
    --cool-dim: #2a4b48;
    --vase: #d99a3f;
    --cutter: #5aa8c9;
    --danger: #d9534f;
    --ok: #6fae63;
    --radius: 6px;

    background: var(--bg);

    padding: 0;

  #ps-root .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .ps-shell { max-width: 1040px; margin: 0 auto; padding: 28px 20px 60px; }

  .ps-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 22px; flex-wrap:wrap; gap:8px; }
  .ps-title { font-family:'Archivo Expanded', sans-serif; font-weight:800; font-size: 22px; letter-spacing: 0.3px; text-transform: uppercase; }
  .ps-title span { color: var(--heat); }
  .ps-subtitle { color: var(--muted); font-size: 12.5px; font-family:'JetBrains Mono',monospace; }

  .ps-tabs { display:flex; gap:2px; border-bottom: 1px solid var(--line); margin-bottom: 22px; flex-wrap:wrap; }
  .ps-tab { padding: 10px 16px; font-size:13px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase; color: var(--muted); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; font-family:'Inter',sans-serif; }
  .ps-tab.active { color: var(--text); border-bottom-color: var(--heat); }
  .ps-tab:hover:not(.active) { color: var(--text); }

  .ps-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .ps-panel-title { font-family:'Archivo Expanded',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color: var(--muted); margin: 0 0 14px 0; display:flex; align-items:center; gap:8px;}

  table.ps-table { width:100%; border-collapse: collapse; }

  .ps-view-toggle .ps-btn { border-radius:20px; }

  .ps-now-line { position:absolute; top:-14px; bottom:0; width:2px; background: var(--text); z-index:3; }
  .ps-now-label { position:absolute; top:-14px; transform:translateX(-50%); font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text); white-space:nowrap; letter-spacing:0.3px; }
  .ps-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:10.5px; color:var(--muted); margin-top:6px; }

  .ps-swatch { width:16px; height:16px; border-radius:3px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; color:#1a1815; }
  .ps-swatch.sw-done { background: var(--ok); }

  .ps-block.model-change { border-left: 3px solid var(--text); }

</style>

<script>
(function(){

// ---- Supabase config ----
// Fill these in after running SUPABASE_SETUP.sql and creating a project.
// Both values are meant to be public in client-side code — Supabase's anon
// key is safe to expose as long as Row Level Security is on and requires
// authentication, which the setup SQL enables. Leave the placeholders as-is
// to keep using browser-local storage instead (no login, no sync).
const SUPABASE_URL = 'https://uybigzsddjbfaqxgnyfv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fg83nAsSoJgqmxn7LZvS5w_NDRc8j5v';

const supabaseConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
let sb = null;
if(supabaseConfigured && typeof window.supabase !== 'undefined'){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

if(typeof window.storage === 'undefined'){
  if(sb){
    window.storage = {
      async get(key){
        const {data, error} = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
        if(error) throw error;
        if(!data) throw new Error('not found');
        return {key, value: data.value, shared:false};
      },
      async set(key, value){
        const {error} = await sb.from('kv_store').upsert({key, value, updated_at: new Date().toISOString()});
        if(error) throw error;
        return {key, value, shared:false};
      },
      async delete(key){
        const {error} = await sb.from('kv_store').delete().eq('key', key);
        if(error) throw error;
        return {key, deleted:true, shared:false};
      },
      async list(prefix){
        const {data, error} = await sb.from('kv_store').select('key');
        if(error) throw error;
        const keys = (data||[]).map(r=>r.key).filter(k => !prefix || k.startsWith(prefix));
        return {keys, prefix, shared:false};
      }
    };
  } else {
    const LS_PREFIX = 'print-scheduler:';
    window.storage = {
      async get(key){
        const raw = localStorage.getItem(LS_PREFIX+key);
        if(raw === null) throw new Error('not found');
        return {key, value: raw, shared:false};
      },
      async set(key, value){
        localStorage.setItem(LS_PREFIX+key, value);
        return {key, value, shared:false};
      },
      async delete(key){
        localStorage.removeItem(LS_PREFIX+key);
        return {key, deleted:true, shared:false};
      },
      async list(prefix){
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith(LS_PREFIX))
          .map(k => k.slice(LS_PREFIX.length))
          .filter(k => !prefix || k.startsWith(prefix));
        return {keys, prefix, shared:false};
      }
    };
  }
}

// ---- Auth gating ----
// No public sign-up here on purpose: this app has one intended user, created
// directly in the Supabase dashboard (Authentication -> Users -> Add user).
// The sign-in form only ever calls signInWithPassword, never signUp.
if(sb){
  window.__deferAppStart = true;
}

function showAuthScreen(){
  document.getElementById('ps-auth-screen').style.display = 'flex';
  document.querySelector('.ps-shell').style.display = 'none';
}
function showApp(){
  document.getElementById('ps-auth-screen').style.display = 'none';
  document.querySelector('.ps-shell').style.display = '';
  const signout = document.getElementById('ps-auth-signout');
  if(signout) signout.style.display = '';
}

async function bootWithAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    showApp();
    startApp();
  } else {
    showAuthScreen();
  }

  sb.auth.onAuthStateChange((event, newSession) => {
    if(event === 'SIGNED_IN' && newSession){
      showApp();
      startApp();
    }
    if(event === 'SIGNED_OUT'){
      location.reload();
    }
  });

  const submitBtn = document.getElementById('ps-auth-submit');
  const errEl = document.getElementById('ps-auth-error');
  async function attemptSignIn(){
    errEl.textContent = '';
    const email = document.getElementById('ps-auth-email').value.trim();
    const password = document.getElementById('ps-auth-password').value;
    if(!email || !password){ errEl.textContent = 'Enter both email and password.'; return; }
    submitBtn.disabled = true;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    submitBtn.disabled = false;
    if(error){ errEl.textContent = error.message; }
  }
  submitBtn.addEventListener('click', attemptSignIn);
  document.getElementById('ps-auth-password').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') attemptSignIn();
  });

  const signoutBtn = document.getElementById('ps-auth-signout');
  if(signoutBtn){
    signoutBtn.addEventListener('click', () => sb.auth.signOut());
  }
}

if(sb){
  bootWithAuth();
}

// If this file is running outside a Claude artifact (i.e. hosted as a normal
// webpage), window.storage won't exist. Fall back to the browser's own
// localStorage with the same async {get,set,delete,list} shape, so nothing
// else in this file has to know or care which one it's talking to.
if(typeof window.storage === 'undefined'){
  const LS_PREFIX = 'print-scheduler:';
  window.storage = {
    async get(key){
      const raw = localStorage.getItem(LS_PREFIX+key);
      if(raw === null) throw new Error('not found');
      return {key, value: raw, shared:false};
    },
    async set(key, value){
      localStorage.setItem(LS_PREFIX+key, value);
      return {key, value, shared:false};
    },
    async delete(key){
      localStorage.removeItem(LS_PREFIX+key);
      return {key, deleted:true, shared:false};
    },
    async list(prefix){
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith(LS_PREFIX))
        .map(k => k.slice(LS_PREFIX.length))
        .filter(k => !prefix || k.startsWith(prefix));
      return {keys, prefix, shared:false};
    }
  };
}

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DEFAULT_TYPES = [
  {id:'vase',   name:'Vase',        color:'#d99a3f'},
  {id:'cutter', name:'Back Cutter', color:'#5aa8c9'},
];
const DEFAULT_CATALOG = [
  {id:'vase1',   name:'Vase 1',        type:'vase', timeH:0, timeM:0, weightG:0},
  {id:'vase3',   name:'Vase 3',        type:'vase', timeH:0, timeM:0, weightG:0},
  {id:'vase5',   name:'Vase 5',        type:'vase', timeH:0, timeM:0, weightG:0},
  {id:'cutter1', name:'Back Cutter 1', type:'cutter', timeH:0, timeM:0, weightG:0},
  {id:'cutter2', name:'Back Cutter 2', type:'cutter', timeH:0, timeM:0, weightG:0},
  {id:'cutter3', name:'Back Cutter 3', type:'cutter', timeH:0, timeM:0, weightG:0},
];
const DEFAULT_SETTINGS = { workDays:[1,2,3,4,5], startTime:'08:00', endTime:'18:00', downtimeMin:15 };
const DEFAULT_PRINTERS = [
  {id:'printer1', name:'Centauri Carbon 1', status:'active', spoolId:null},
  {id:'printer2', name:'Centauri Carbon 2', status:'active', spoolId:null},
  {id:'printer3', name:'Kobra Max',         status:'active', spoolId:null},
];
const DEFAULT_SPOOLS = [];
const LOW_STOCK_G = 150;

let catalog = null;
let types = null;
let settings = null;
let printers = null;
let spools = null;
let orderQty = {};
let priorityOrder = [];
let productionLog = [];
let scheduleView = 'theoretical';
let theoreticalSchedule = null;
let liveSchedule = null;

function uid(prefix){ return (prefix||'p') + Math.random().toString(36).slice(2,9); }
function todayISO(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

async function loadState(){
  try { const c = await window.storage.get('catalog'); catalog = c ? JSON.parse(c.value) : JSON.parse(JSON.stringify(DEFAULT_CATALOG)); }
  catch(e){ catalog = JSON.parse(JSON.stringify(DEFAULT_CATALOG)); }

  try { const t = await window.storage.get('types'); types = t ? JSON.parse(t.value) : JSON.parse(JSON.stringify(DEFAULT_TYPES)); }
  catch(e){ types = JSON.parse(JSON.stringify(DEFAULT_TYPES)); }
  if(types.length===0) types.push({id: uid('type'), name:'Product', color:'#d99a3f'});
  catalog.forEach(p => { if(!types.some(t=>t.id===p.type)) p.type = types[0].id; });

  try { const s = await window.storage.get('settings'); settings = s ? JSON.parse(s.value) : JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
  catch(e){ settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }

  try { const pr = await window.storage.get('printers'); printers = pr ? JSON.parse(pr.value) : JSON.parse(JSON.stringify(DEFAULT_PRINTERS)); }
  catch(e){ printers = JSON.parse(JSON.stringify(DEFAULT_PRINTERS)); }
  printers.forEach(p => { if(!('spoolId' in p)) p.spoolId = null; });

  try { const sp = await window.storage.get('spools'); spools = sp ? JSON.parse(sp.value) : JSON.parse(JSON.stringify(DEFAULT_SPOOLS)); }
  catch(e){ spools = JSON.parse(JSON.stringify(DEFAULT_SPOOLS)); }

  try {
    const o = await window.storage.get('lastOrder');
    if (o) {
      const parsed = JSON.parse(o.value);
      orderQty = parsed.orderQty || {};
      priorityOrder = parsed.priorityOrder || catalog.map(p=>p.id);
    } else {
      priorityOrder = catalog.map(p=>p.id);
    }
  } catch(e){ priorityOrder = catalog.map(p=>p.id); }

  // Migrate legacy orderQty shape (plain number) to {qty, pin}.
  Object.keys(orderQty).forEach(id => {
    if(typeof orderQty[id] === 'number'){ orderQty[id] = {qty: orderQty[id], pin: null}; }
    if(!orderQty[id] || typeof orderQty[id] !== 'object'){ orderQty[id] = {qty:0, pin:null}; }
    if(typeof orderQty[id].pin === 'undefined') orderQty[id].pin = null;
  });

  priorityOrder = priorityOrder.filter(id => catalog.some(p=>p.id===id));
  catalog.forEach(p => { if(!priorityOrder.includes(p.id)) priorityOrder.push(p.id); });

  try { const lg = await window.storage.get('productionLog'); productionLog = lg ? JSON.parse(lg.value) : []; }
  catch(e){ productionLog = []; }
  scheduleView = productionLog.length > 0 ? 'live' : 'theoretical';
}

// Every log entry claims exactly one unit of its product's queued quantity,
// exactly once, tracked via entry.consumed. This runs after any log change
// AND once on load, so entries that predate this mechanism (or were created
// while storage was misbehaving) get caught and reconciled automatically
// instead of silently sitting there unaccounted for.
function syncConsumption(){
  let changed = false;
  productionLog.forEach(e => {
    if(!e.consumed){
      const entry = getOrderEntry(e.productId);
      entry.qty = Math.max(0, entry.qty - 1);
      e.consumed = true;
      changed = true;
    }
  });
  if(changed){ saveOrder(); saveLog(); }
  return changed;
}
function getOrderEntry(id){ if(!orderQty[id]) orderQty[id] = {qty:0, pin:null}; return orderQty[id]; }

let flashTimer = null;
function flashSave(){
  const el = document.getElementById('ps-save-note');
  if(!el) return;
  el.textContent = 'saved';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ el.textContent=''; }, 1200);
}

// ---------- time helpers ----------
function fmtClock(date){
  let h = date.getHours(), m = date.getMinutes();
  const ampm = h>=12 ? 'PM':'AM';
  h = h % 12; if(h===0) h=12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
function fmtDateHead(date){
  return DAY_NAMES[date.getDay()] + ', ' + date.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function fmtDuration(min){
  min = Math.round(min);
  const h = Math.floor(min/60), m = min%60;
  if(h<=0) return m+'m';
  if(m===0) return h+'h';
  return h+'h '+m+'m';
}
function windowBounds(date, settings){
  const [sh,sm] = settings.startTime.split(':').map(Number);
  const [eh,em] = settings.endTime.split(':').map(Number);
  const start = new Date(date.getFullYear(),date.getMonth(),date.getDate(),sh,sm,0,0);
  const end = new Date(date.getFullYear(),date.getMonth(),date.getDate(),eh,em,0,0);
  return {start,end};
}
function isWorkDay(date, workDays){ return workDays.includes(date.getDay()); }
function nextStart(afterDate, settings){
  let d = new Date(afterDate);
  for(let i=0;i<400;i++){
    if(isWorkDay(d, settings.workDays)){
      const {start,end} = windowBounds(d, settings);
      if(d < start) return new Date(start);
      if(d < end) return new Date(d);
    }
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1, 0,0,0,0);
  }
  return d;
}
function computeLiveCursor(printerId, settings){
  const entries = productionLog.filter(e => e.printerId === printerId);
  if(entries.length === 0) return nextStart(new Date(), settings);
  entries.sort((a,b) => new Date(b.actualStart) - new Date(a.actualStart));
  const last = entries[0];
  const endTime = last.actualEnd
    ? new Date(last.actualEnd)
    : new Date(new Date(last.actualStart).getTime() + last.plannedMin*60000);
  const withDowntime = new Date(endTime.getTime() + settings.downtimeMin*60000);
  return nextStart(withDowntime, settings);
}
function toLocalInputValue(date){
  const pad = n => String(n).padStart(2,'0');
  return date.getFullYear()+'-'+pad(date.getMonth()+1)+'-'+pad(date.getDate())+'T'+pad(date.getHours())+':'+pad(date.getMinutes());
}
function fmtLogTime(iso){
  const d = new Date(iso);
  return fmtDateHead(d) + ' ' + fmtClock(d);
}
function productAvgActual(productId){
  const entries = productionLog.filter(e => e.productId === productId && e.actualEnd);
  if(entries.length === 0) return null;
  const totalMin = entries.reduce((s,e) => s + (new Date(e.actualEnd) - new Date(e.actualStart))/60000, 0);
  return {avgMin: totalMin/entries.length, count: entries.length};
}
function loggedTodayCount(productId){
  const key = new Date().toDateString();
  return productionLog.filter(e => e.productId === productId && new Date(e.actualStart).toDateString() === key).length;
}
function getActualJobsForDay(printerId, dateKey){
  return productionLog
    .filter(e => e.printerId === printerId && new Date(e.actualStart).toDateString() === dateKey)
    .map(e => {
      const product = catalog.find(p=>p.id===e.productId);
      const end = e.actualEnd ? new Date(e.actualEnd) : new Date(new Date(e.actualStart).getTime() + (e.plannedMin||0)*60000);
      return {
        name: product ? product.name : '(deleted product)',
        type: product ? product.type : null,
        productId: e.productId,
        start: new Date(e.actualStart),
        end,
        weightG: product ? product.weightG : 0,
        actual: true,
        inProgress: !e.actualEnd,
        overnight: false
      };
    });
}

// ---------- multi-printer scheduling engine ----------
// Event-driven: always advance whichever active printer becomes free soonest.
// Each machine has its own pinned queue (jobs the person locked to that printer)
// plus access to the shared pool. At every turn it best-fits — takes the
// longest job (from its pinned queue or the pool) that still fits what's left
// of the window — which is what actually keeps printers busy instead of just
// working a list in order. Priority order only breaks ties between equal-length
// candidates. mode='live' seeds each machine's starting point from the real
// production log instead of assuming everyone starts at the top of the window.
function buildMultiSchedule(queue, activePrinters, settings, mode){
  const machines = activePrinters.map(p => ({
    id: p.id, name: p.name,
    cursor: mode === 'live' ? computeLiveCursor(p.id, settings) : nextStart(new Date(), settings),
    days: [],
    pinned: []
  }));
  if(machines.length === 0) return { machines: [], unassigned: queue.slice() };

  const machineById = {};
  machines.forEach(m => { machineById[m.id] = m; });

  const pool = [];
  const unassignedPinned = [];
  queue.forEach(job => {
    if(job.pin){
      if(machineById[job.pin]) machineById[job.pin].pinned.push(job);
      else unassignedPinned.push(job);
    } else {
      pool.push(job);
    }
  });

  function remainingCount(){ return pool.length + machines.reduce((s,m)=>s+m.pinned.length,0); }

  let guard = 0, stall = 0;
  while(remainingCount() > 0 && guard < 8000 && stall < 500){
    guard++;
    machines.sort((a,b) => a.cursor - b.cursor);
    const m = machines[0];
    m.cursor = nextStart(m.cursor, settings);
    const {start, end} = windowBounds(m.cursor, settings);
    const dayWindowLen = (end - start) / 60000;

    let bestList = null, bestIdx = -1, bestFit = -1;
    [['pinned', m.pinned], ['pool', pool]].forEach(([, list]) => {
      for(let i=0;i<list.length;i++){
        const job = list[i];
        const finish = new Date(m.cursor.getTime() + job.printTimeMin*60000);
        if(finish <= end && job.printTimeMin > bestFit){
          bestFit = job.printTimeMin; bestList = list; bestIdx = i;
        }
      }
    });
    if(bestList === null){
      for(const list of [m.pinned, pool]){
        for(let i=0;i<list.length;i++){
          if(list[i].printTimeMin > dayWindowLen && m.cursor < end){ bestList = list; bestIdx = i; break; }
        }
        if(bestList) break;
      }
    }

    if(bestList === null){
      stall++;
      m.cursor = new Date(m.cursor.getFullYear(), m.cursor.getMonth(), m.cursor.getDate()+1, 0,0,0,0);
      continue;
    }
    stall = 0;

    const job = bestList.splice(bestIdx,1)[0];
    const jobStart = new Date(m.cursor);
    const jobEnd = new Date(m.cursor.getTime() + job.printTimeMin*60000);
    const overnight = jobEnd > end;
    const dateKey = jobStart.toDateString();
    let dayEntry = m.days.find(d => d.dateKey === dateKey);
    if(!dayEntry){ dayEntry = {dateKey, date:new Date(jobStart), jobs:[]}; m.days.push(dayEntry); }
    dayEntry.jobs.push({...job, start:jobStart, end:jobEnd, overnight});

    m.cursor = overnight ? jobEnd : new Date(jobEnd.getTime() + settings.downtimeMin*60000);
  }

  machines.forEach(m => m.days.sort((a,b) => a.date - b.date));
  const unassigned = pool.concat(machines.flatMap(m => m.pinned)).concat(unassignedPinned);
  return { machines, unassigned };
}

    printers.push({id: uid('printer'), name: 'New printer', status:'active', spoolId:null});

}

// ---------- rendering: Log tab ----------
let editingLogId = null;

function renderLog(){
  const root = document.getElementById('ps-tab-log');
  const printerOptions = printers.map(p => `<option value="${p.id}">${escapeHtml(p.name)}${p.status==='down'?' (down)':''}</option>`).join('');
  const productOptions = catalog.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');

  const entries = productionLog.slice().sort((a,b) => new Date(b.actualStart) - new Date(a.actualStart));
  const rows = entries.map(e => {
    const printer = printers.find(p=>p.id===e.printerId);
    const product = catalog.find(p=>p.id===e.productId);

    if(e.id === editingLogId){
      const pOpts = printers.map(p => `<option value="${p.id}" ${p.id===e.printerId?'selected':''}>${escapeHtml(p.name)}${p.status==='down'?' (down)':''}</option>`).join('');
      const dOpts = catalog.map(p => `<option value="${p.id}" ${p.id===e.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
      return `
        <div class="ps-log-entry" data-id="${e.id}" data-editing="1">
          <div class="ps-row" style="flex-wrap:wrap; width:100%; align-items:flex-end;">
            <div class="ps-field" style="flex:1;min-width:150px;margin-bottom:0;">
              <span class="ps-field-label">Printer</span>
              <select class="ps-select" data-edit-field="printerId">${pOpts}</select>
            </div>
            <div class="ps-field" style="flex:1;min-width:150px;margin-bottom:0;">
              <span class="ps-field-label">Product</span>
              <select class="ps-select" data-edit-field="productId">${dOpts}</select>
            </div>
            <div class="ps-field" style="flex:1;min-width:170px;margin-bottom:0;">
              <span class="ps-field-label">Actual start</span>
              <input class="ps-input" type="datetime-local" data-edit-field="actualStart" value="${toLocalInputValue(new Date(e.actualStart))}" />
            </div>
            <div class="ps-field" style="flex:1;min-width:170px;margin-bottom:0;">
              <span class="ps-field-label">Actual finish</span>
              <input class="ps-input" type="datetime-local" data-edit-field="actualEnd" value="${e.actualEnd ? toLocalInputValue(new Date(e.actualEnd)) : ''}" />
            </div>
            <div class="ps-row" style="gap:6px;">
              <button class="ps-btn primary small" data-action="save">Save</button>
              <button class="ps-btn ghost small" data-action="cancel">Cancel</button>
            </div>
          </div>
        </div>
      `;
    }

    const durationText = e.actualEnd
      ? fmtDuration((new Date(e.actualEnd)-new Date(e.actualStart))/60000)
      : null;
    return `
      <div class="ps-log-entry" data-id="${e.id}">
        <div>
          <b>${escapeHtml(product?product.name:'(deleted product)')}</b> on ${escapeHtml(printer?printer.name:'(deleted printer)')}
          <div class="mono">${fmtLogTime(e.actualStart)}${e.actualEnd ? ' → '+fmtLogTime(e.actualEnd)+' ('+durationText+')' : ' — still printing'}</div>
        </div>
        <div class="ps-row" style="gap:6px;">
          ${!e.actualEnd ? '<button class="ps-btn small" data-action="finish">Mark finished now</button>' : ''}
          <button class="ps-btn ghost small" data-action="edit">Edit</button>
          <button class="ps-btn ghost small" data-action="delete">✕</button>
        </div>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Log a Print</div>
      <div class="ps-row" style="align-items:flex-end; flex-wrap:wrap;">
        <div class="ps-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Printer</span>
          <select class="ps-select" id="ps-log-printer">${printerOptions}</select>
        </div>
        <div class="ps-field" style="flex:1;min-width:160px;margin-bottom:0;">
          <span class="ps-field-label">Product</span>
          <select class="ps-select" id="ps-log-product">${productOptions}</select>
        </div>
        <div class="ps-field" style="flex:1;min-width:180px;margin-bottom:0;">
          <span class="ps-field-label">Actual start</span>
          <input class="ps-input" type="datetime-local" id="ps-log-start" value="${toLocalInputValue(new Date())}" />
        </div>
        <div class="ps-field" style="flex:1;min-width:180px;margin-bottom:0;">
          <span class="ps-field-label">Actual finish (optional)</span>
          <input class="ps-input" type="datetime-local" id="ps-log-end" />
        </div>
      </div>
      <div class="ps-row" style="margin-top:14px;">
        <button class="ps-btn primary" id="ps-log-submit">Log print</button>
      </div>
      <div class="ps-hint" style="margin-top:12px;">Logging a start time ripples the Live Schedule forward from that printer's real progress. Adding a finish time (now or later, via "Mark finished now") also feeds the average print-time hints you'll see on the Catalog tab.</div>
    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>History</div>
      ${entries.length===0 ? '<div class="ps-empty">Nothing logged yet.</div>' : rows}
    </div>
  `;

  document.getElementById('ps-log-submit').addEventListener('click', () => {
    const printerId = document.getElementById('ps-log-printer').value;
    const productId = document.getElementById('ps-log-product').value;
    const startVal = document.getElementById('ps-log-start').value;
    const endVal = document.getElementById('ps-log-end').value;
    if(!printerId || !productId || !startVal) return;
    const product = catalog.find(p=>p.id===productId);
    const plannedMin = product ? (product.timeH*60+product.timeM) : 0;
    productionLog.push({
      id: uid('log'),
      printerId, productId,
      actualStart: new Date(startVal).toISOString(),
      actualEnd: endVal ? new Date(endVal).toISOString() : null,
      plannedMin
    });
    // Logging a print permanently claims one unit from the queue — it doesn't
    // come back on its own the next day. Deleting or re-pointing this entry
    // (see below) reverses it.
    syncConsumption();
    scheduleView = 'live';
    renderLog(); regenerateIfActive();
  });

  root.querySelectorAll('.ps-log-entry').forEach(row => {
    const id = row.getAttribute('data-id');

    if(row.getAttribute('data-editing')){
      row.querySelector('[data-action="save"]').addEventListener('click', () => {
        const e = productionLog.find(x=>x.id===id);
        const printerId = row.querySelector('[data-edit-field="printerId"]').value;
        const productId = row.querySelector('[data-edit-field="productId"]').value;
        const startVal = row.querySelector('[data-edit-field="actualStart"]').value;
        const endVal = row.querySelector('[data-edit-field="actualEnd"]').value;
        if(!printerId || !productId || !startVal) return;
        e.printerId = printerId;
        if(e.productId !== productId){
          const product = catalog.find(p=>p.id===productId);
          e.plannedMin = product ? (product.timeH*60+product.timeM) : 0;
          // This entry no longer claims a unit of the old product — give it
          // back if it had actually been claimed — then let syncConsumption
          // claim one of the new product below.
          if(e.consumed){ getOrderEntry(e.productId).qty += 1; }
          e.consumed = false;
        }
        e.productId = productId;
        e.actualStart = new Date(startVal).toISOString();
        e.actualEnd = endVal ? new Date(endVal).toISOString() : null;
        editingLogId = null;
        syncConsumption();
        renderLog(); regenerateIfActive();
      });
      row.querySelector('[data-action="cancel"]').addEventListener('click', () => {
        editingLogId = null;
        renderLog();
      });
      return;
    }

    const finishBtn = row.querySelector('[data-action="finish"]');
    if(finishBtn){
      finishBtn.addEventListener('click', () => {
        const e = productionLog.find(x=>x.id===id);
        e.actualEnd = new Date().toISOString();
        saveLog(); renderLog(); regenerateIfActive();
      });
    }
    row.querySelector('[data-action="edit"]').addEventListener('click', () => {
      editingLogId = id;
      renderLog();
    });
    row.querySelector('[data-action="delete"]').addEventListener('click', () => {
      const removed = productionLog.find(x=>x.id===id);
      productionLog = productionLog.filter(x=>x.id!==id);
      if(removed && removed.consumed){
        const orderEntry = getOrderEntry(removed.productId);
        orderEntry.qty += 1;
        saveOrder();
      }
      saveLog(); renderLog(); regenerateIfActive();
    });
  });
}

            <span class="ps-field-label">Remaining (g)</span>

          </div>

      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Filament Inventory</div>
      ${spools.length===0 ? '<div class="ps-empty">No spools yet — add what you\'ve got on hand.</div>' : `<div id="ps-spools-list">${cards}</div>`}
      <div style="margin-top:14px;">
        <button class="ps-btn" id="ps-add-spool">+ Add spool</button>
      </div>
      <div class="ps-hint" style="margin-top:12px;">Assign a spool to a printer on the Printers tab so the schedule can flag when that machine will run out mid-queue. Update "Remaining" here whenever you weigh a spool or load a fresh one — spools flagged "Low" are under ${LOW_STOCK_G}g.</div>
    </div>
  `;

  root.querySelectorAll('.ps-spool-card').forEach(card => {
    const id = card.getAttribute('data-id');
    card.querySelectorAll('[data-field]').forEach(input => {

        if(field==='remainingG' || field==='totalG'){
          s[field] = Math.max(0, parseFloat(input.value)||0);

          s[field] = input.value;
        }
        saveSpools(); renderPrinters(); regenerateIfActive();
        renderFilament();

      spools = spools.filter(x=>x.id!==id);
      printers.forEach(p => { if(p.spoolId===id) p.spoolId = null; });
      saveSpools(); savePrinters();
      renderFilament(); renderPrinters(); regenerateIfActive();
    });
  });

  document.getElementById('ps-add-spool').addEventListener('click', () => {
    spools.push({id: uid('spool'), label:'New spool', material:'PCTG', colorHex:'#cccccc', totalG:1000, remainingG:1000});

}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- rendering: Settings tab ----------
function exportAllData(){
  const snapshot = {
    exportedAt: new Date().toISOString(),
    version: 1,
    catalog, types, settings, printers, spools, orderQty, priorityOrder, productionLog
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'print-scheduler-export-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importAllData(jsonText){
  const data = JSON.parse(jsonText);
  if(!data || typeof data !== 'object') throw new Error('not a valid export file');

  if(Array.isArray(data.catalog)) catalog = data.catalog;
  if(Array.isArray(data.types) && data.types.length>0) types = data.types;
  if(data.settings && typeof data.settings === 'object') settings = data.settings;
  if(Array.isArray(data.printers)) printers = data.printers;
  if(Array.isArray(data.spools)) spools = data.spools;
  if(data.orderQty && typeof data.orderQty === 'object') orderQty = data.orderQty;
  if(Array.isArray(data.priorityOrder)) priorityOrder = data.priorityOrder;
  if(Array.isArray(data.productionLog)) productionLog = data.productionLog;

  // Keep priorityOrder consistent with whatever catalog came in.
  priorityOrder = priorityOrder.filter(id => catalog.some(p=>p.id===id));
  catalog.forEach(p => { if(!priorityOrder.includes(p.id)) priorityOrder.push(p.id); });
  printers.forEach(p => { if(!('spoolId' in p)) p.spoolId = null; });
  Object.keys(orderQty).forEach(id => {
    if(typeof orderQty[id] === 'number'){ orderQty[id] = {qty: orderQty[id], pin: null}; }
  });

  await Promise.all([
    saveCatalog(), saveTypes(), saveSettings(), savePrinters(), saveSpools(), saveOrder(), saveLog()
  ]);
  syncConsumption();

  theoreticalSchedule = null; liveSchedule = null;
  renderSchedule(); renderLog(); renderPrinters(); renderFilament(); renderCatalog(); renderSettings();
}

    </div>
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Data</div>
      <div class="ps-row" style="flex-wrap:wrap;">

      <div class="ps-hint" style="margin-top:10px;">Export downloads everything — catalog, product types, printers, spools, work-window settings, the order queue, and the full production log — as one JSON file. Import overwrites everything currently in the app with what's in the file, so use it to move this data somewhere else (like a standalone deployment), not to merge two sets of data together.</div>

// ---------- rendering: Schedule tab ----------
function renderSchedule(){
  const root = document.getElementById('ps-tab-schedule');

  const rows = priorityOrder.map((id, idx) => {
    const p = catalog.find(x=>x.id===id);
    if(!p) return '';
    const entry = getOrderEntry(id);
    const printMin = p.timeH*60 + p.timeM;
    const incomplete = printMin<=0;
    const logged = loggedTodayCount(id);
    const pinOptions = `<option value="">Any (auto)</option>` + printers.map(pr =>
      `<option value="${pr.id}" ${entry.pin===pr.id?'selected':''}>${escapeHtml(pr.name)}${pr.status==='down'?' (down)':''}</option>`
    ).join('');
    return `
      <tr data-id="${id}">
        <td>
          <div class="ps-row" style="gap:6px;">
            <button class="ps-btn ghost small" data-action="up" ${idx===0?'disabled':''}>↑</button>
            <button class="ps-btn ghost small" data-action="down" ${idx===priorityOrder.length-1?'disabled':''}>↓</button>
          </div>
        </td>
        <td>
          ${renderTag(p.type)}
          &nbsp;${escapeHtml(p.name)}
          ${incomplete?'<span class="ps-hint" style="color:var(--danger)"> — no print time set</span>':''}
        </td>
        <td class="mono ps-hint">${incomplete? '—' : fmtDuration(printMin)}</td>
        <td>
          <input class="ps-input ps-narrow" type="number" min="0" data-field="qty" value="${entry.qty}" />
          ${logged>0 ? `<div class="ps-hint mono">${logged} logged today</div>` : ''}
        </td>
        <td><select class="ps-select" data-field="pin">${pinOptions}</select></td>
      </tr>`;
  }).join('');

  const activeCount = printers.filter(p=>p.status==='active').length;
  const downCount = printers.length - activeCount;

  root.innerHTML = `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Order to Fulfill</div>
      <div class="ps-hint" style="margin-bottom:12px;">${activeCount} printer${activeCount!==1?'s':''} active${downCount>0? ', '+downCount+' down':''} — manage this on the Printers tab.</div>
      <div style="overflow-x:auto;">
      <table class="ps-table">
        <thead><tr><th style="width:60px">Priority</th><th>Product</th><th style="width:80px">Print time</th><th style="width:70px">Qty</th><th style="width:150px">Printer</th></tr></thead>
        <tbody id="ps-order-body">${rows}</tbody>
      </table>
      </div>
      <div class="ps-hint">List order is a tiebreaker, not a strict sequence — whichever printer frees up first grabs whatever fits its remaining time <b>best</b>. Pin a product to a specific printer and only that printer will ever run it; leave it "Any" and it pools across every active printer.</div>
      <div class="ps-row" style="margin-top:16px;">
        <button class="ps-btn primary" id="ps-generate">Generate schedule</button>
        <button class="ps-btn" id="ps-clear-order">Clear order</button>
      </div>
    </div>
    <div id="ps-schedule-output"></div>
  `;

  root.querySelectorAll('#ps-order-body tr').forEach(tr => {
    const id = tr.getAttribute('data-id');
    tr.querySelector('[data-field="qty"]').addEventListener('change', e => {
      getOrderEntry(id).qty = Math.max(0, parseInt(e.target.value)||0);
      saveOrder(); regenerateIfActive();
    });
    tr.querySelector('[data-field="pin"]').addEventListener('change', e => {
      getOrderEntry(id).pin = e.target.value || null;
      saveOrder(); regenerateIfActive();
    });
    const upBtn = tr.querySelector('[data-action="up"]');
    const downBtn = tr.querySelector('[data-action="down"]');
    if(upBtn) upBtn.addEventListener('click', () => { moveInPriority(id,-1); });
    if(downBtn) downBtn.addEventListener('click', () => { moveInPriority(id,1); });
  });

  document.getElementById('ps-generate').addEventListener('click', onGenerate);
  document.getElementById('ps-clear-order').addEventListener('click', () => {
    orderQty = {};
    saveOrder();
    theoreticalSchedule = null; liveSchedule = null;
    document.getElementById('ps-schedule-output').innerHTML = '';
    renderSchedule();
  });

  if(theoreticalSchedule || liveSchedule) renderScheduleView();
}

function moveInPriority(id, dir){
  const idx = priorityOrder.indexOf(id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=priorityOrder.length) return;
  [priorityOrder[idx], priorityOrder[newIdx]] = [priorityOrder[newIdx], priorityOrder[idx]];
  saveOrder(); renderSchedule(); regenerateIfActive();
}

function regenerateIfActive(){
  if(document.getElementById('ps-tab-schedule')) renderSchedule();
  if(theoreticalSchedule || liveSchedule){
    const out = document.getElementById('ps-schedule-output');
    if(out) onGenerate();
  }
}

function onGenerate(){
  const outputEl = document.getElementById('ps-schedule-output');
  if(!outputEl) return;

  const missing = [];
  const queue = [];
  priorityOrder.forEach(id => {
    const entry = getOrderEntry(id);
    if(entry.qty<=0) return;
    const p = catalog.find(x=>x.id===id);
    if(!p) return;
    const printTimeMin = p.timeH*60 + p.timeM;
    if(printTimeMin<=0){ missing.push(p.name); return; }
    for(let i=0;i<entry.qty;i++){
      queue.push({productId:id, name:p.name, type:p.type, weightG:p.weightG, printTimeMin, pin: entry.pin || null});
    }
  });

  if(missing.length>0){
    outputEl.innerHTML = `<div class="ps-warnbox">Set a print time for: ${missing.map(escapeHtml).join(', ')} before generating a schedule.</div>`;
    theoreticalSchedule = null; liveSchedule = null;
    return;
  }
  if(queue.length===0){
    outputEl.innerHTML = `<div class="ps-empty">Enter a quantity for at least one product to build a schedule.</div>`;
    theoreticalSchedule = null; liveSchedule = null;
    return;
  }

  if(settings.workDays.length===0){
    outputEl.innerHTML = `<div class="ps-warnbox">No work days are checked on the Settings tab, so there's never a valid window to print in. Turn at least one day on.</div>`;
    theoreticalSchedule = null; liveSchedule = null;
    return;
  }
  const [wsH,wsM] = settings.startTime.split(':').map(Number);
  const [weH,weM] = settings.endTime.split(':').map(Number);
  if(wsH*60+wsM >= weH*60+weM){
    outputEl.innerHTML = `<div class="ps-warnbox">On the Settings tab, the window closes (${settings.endTime}) at or before it opens (${settings.startTime}) — nothing can ever fit, so nothing gets scheduled. Fix the open/close times and generate again.</div>`;
    theoreticalSchedule = null; liveSchedule = null;
    return;
  }

  const activePrinters = printers.filter(p=>p.status==='active');
  if(activePrinters.length===0){
    outputEl.innerHTML = `<div class="ps-warnbox">No active printers. Mark at least one printer as Active on the Printers tab.</div>`;
    theoreticalSchedule = null; liveSchedule = null;
    return;
  }

  const makeSummary = (result) => ({
    machines: result.machines,
    unassigned: result.unassigned,
    queueLen: queue.length,
    totalMin: queue.reduce((s,j)=>s+j.printTimeMin,0),
    totalWeight: queue.reduce((s,j)=>s+(j.weightG||0),0)
  });
  theoreticalSchedule = makeSummary(buildMultiSchedule(queue, activePrinters, settings, 'theoretical'));
  theoreticalSchedule.mode = 'theoretical';
  liveSchedule = makeSummary(buildMultiSchedule(queue, activePrinters, settings, 'live'));
  liveSchedule.mode = 'live';

  renderScheduleView();
}

function renderScheduleView(){
  const outputEl = document.getElementById('ps-schedule-output');
  if(!outputEl) return;
  if(!theoreticalSchedule && !liveSchedule){ outputEl.innerHTML = ''; return; }

  outputEl.innerHTML = `
    <div class="ps-row ps-view-toggle" style="margin-bottom:14px;">
      <button class="ps-btn ${scheduleView==='theoretical'?'primary':''}" data-view="theoretical">Theoretical Plan</button>
      <button class="ps-btn ${scheduleView==='live'?'primary':''}" data-view="live">Live Schedule</button>
    </div>
    <div id="ps-schedule-body"></div>
  `;
  outputEl.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => { scheduleView = btn.getAttribute('data-view'); renderScheduleView(); });
  });
  const sched = scheduleView === 'live' ? liveSchedule : theoreticalSchedule;
  const body = document.getElementById('ps-schedule-body');
  const note = scheduleView === 'live'
    ? '<div class="ps-hint" style="margin-bottom:12px;">Anchored to what\'s actually logged on the Log tab — printers with no log entries yet start from the top of the work window, same as the theoretical plan.</div>'
    : '<div class="ps-hint" style="margin-bottom:12px;">Ideal plan assuming every printer starts fresh at the top of the work window — ignores anything logged on the Log tab.</div>';
  body.innerHTML = note;
  renderScheduleOutput(sched, body);
}

function renderScheduleOutput(sched, container){
  const outputEl = container;
  if(!outputEl) return;
  if(!sched || sched.machines.length===0){
    outputEl.innerHTML += `<div class="ps-empty">No schedule yet.</div>`;
    return;
  }

  let overallLastEnd = null;
  sched.machines.forEach(m => {
    m.days.forEach(d => {
      const lastJob = d.jobs[d.jobs.length-1];
      if(!overallLastEnd || lastJob.end > overallLastEnd) overallLastEnd = lastJob.end;
    });
  });

  // Spool depletion: walk each machine's jobs in chronological order against its assigned spool.
  sched.machines.forEach(m => {
    const printer = printers.find(p => p.id === m.id);
    const spool = printer && printer.spoolId ? spools.find(s => s.id === printer.spoolId) : null;
    m.spoolInfo = spool ? {label: spool.label, remainingG: spool.remainingG} : null;
    m.spoolShortAt = null;
    let used = 0;
    m.days.forEach(d => {
      d.jobs.forEach(j => {
        used += (j.weightG || 0);
        j.cumWeight = used;
        j.spoolShort = spool ? used > spool.remainingG : false;
        if(j.spoolShort && m.spoolShortAt === null) m.spoolShortAt = j;
      });
    });
    m.spoolTotalUsed = used;
  });

  const summary = `
    ${sched.unassigned && sched.unassigned.length>0 ? `<div class="ps-warnbox">${sched.unassigned.length} of ${sched.queueLen} queued prints couldn't be placed — double-check your work window and downtime settings. Showing what did get scheduled below.</div>` : ''}
    <div class="ps-summary-grid">
      <div class="ps-summary-cell"><div class="ps-summary-num">${sched.queueLen}</div><div class="ps-summary-label">Prints queued</div></div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${fmtDuration(sched.totalMin)}</div><div class="ps-summary-label">Total print time</div></div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${sched.totalWeight>0 ? sched.totalWeight+'g' : '—'}</div><div class="ps-summary-label">Filament</div></div>
      <div class="ps-summary-cell"><div class="ps-summary-num">${overallLastEnd? fmtDateHead(overallLastEnd) : '—'}</div><div class="ps-summary-label">${overallLastEnd? 'All done by '+fmtClock(overallLastEnd) : 'Completion'}</div></div>
    </div>
  `;

  const machinesHtml = sched.machines.map(m => {
    if(sched.mode === 'live'){
      const loggedDateKeys = [...new Set(productionLog.filter(e => e.printerId === m.id).map(e => new Date(e.actualStart).toDateString()))];
      loggedDateKeys.forEach(dateKey => {
        if(!m.days.some(d => d.dateKey === dateKey)){
          const sample = productionLog.find(e => e.printerId === m.id && new Date(e.actualStart).toDateString() === dateKey);
          m.days.push({dateKey, date: new Date(sample.actualStart), jobs: []});
        }
      });
      m.days.sort((a,b) => a.date - b.date);
    }
    if(m.days.length===0){
      return `<div class="ps-printer-block"><div class="ps-printer-block-head"><span class="dot"></span>${escapeHtml(m.name)}</div><div class="ps-hint">Nothing assigned.</div></div>`;
    }
    let anyActualShown = false;
    const todayKey = new Date().toDateString();
    let prevProductId = null;
    const daysHtml = m.days.map(day => {
      const {start,end} = windowBounds(day.date, settings);
      const winMs = end - start;

      let jobs = day.jobs;
      if(sched.mode === 'live'){
        const actualJobs = getActualJobsForDay(m.id, day.dateKey);
        if(actualJobs.length>0){ anyActualShown = true; }
        jobs = actualJobs.concat(day.jobs).sort((a,b) => a.start - b.start);
      }

      const changeFlags = jobs.map((j,i) => {
        const prev = i===0 ? prevProductId : jobs[i-1].productId;
        return prev !== null && j.productId !== prev;
      });
      if(jobs.length>0) prevProductId = jobs[jobs.length-1].productId;

      const blocks = jobs.map((j,i) => {
        const clampedStart = j.start < start ? start : j.start;
        const leftPct = Math.max(0,(clampedStart-start)/winMs*100);
        const clampedEnd = j.overnight ? end : (j.end < end ? j.end : end);
        const widthPct = Math.max(1.5, (clampedEnd-clampedStart)/winMs*100);
        const shortTitle = j.spoolShort ? ' — spool will be out by this print' : '';

        let color, statusLabel;
        if(sched.mode === 'live'){
          if(j.actual && !j.inProgress){ color = 'var(--ok)'; statusLabel = 'completed'; }
          else if(j.actual && j.inProgress){ color = 'var(--heat)'; statusLabel = 'in progress'; }
          else { color = 'var(--cool)'; statusLabel = 'upcoming'; }
        } else {
          color = j.type ? typeById(j.type).color : '#9a9184';
          statusLabel = null;
        }
        const bg = j.overnight
          ? `repeating-linear-gradient(45deg, ${color}, ${color} 6px, #1a1815 6px, #1a1815 10px)`
          : color;
        const pulseClass = (j.actual && j.inProgress) ? 'actual-progress' : '';
        const changeClass = changeFlags[i] ? 'model-change' : '';
        const stateTitle = statusLabel ? ` (${statusLabel})` : '';
        const changeTitle = changeFlags[i] ? ' — model change' : '';
        const label = widthPct > 6 ? (j.actual && !j.inProgress ? '✓ ' : '') + escapeHtml(j.name) : '';
        return `<div class="ps-block ${j.spoolShort?'spool-short':''} ${pulseClass} ${changeClass}" style="left:${leftPct}%;width:${widthPct}%;background:${bg};${j.overnight?'opacity:0.9;':''}" title="${escapeHtml(j.name)}: ${fmtClock(j.start)} – ${fmtClock(j.end)}${j.overnight?' (runs past close)':''}${stateTitle}${changeTitle}${shortTitle}">${label}</div>`;
      }).join('');

      let nowMarker = '';
      if(sched.mode === 'live' && day.dateKey === todayKey){
        const now = new Date();
        if(now >= start && now <= end){
          const leftPct = (now-start)/winMs*100;
          nowMarker = `<div class="ps-now-line" style="left:${leftPct}%;"></div><div class="ps-now-label" style="left:${leftPct}%;">now</div>`;
        }
      }

      const jobLines = jobs.map((j,i) => {
        const marker = j.actual ? (j.inProgress ? '<span style="color:var(--heat)">▶ printing now</span> — ' : '✓ ') : '';
        const changeover = changeFlags[i] ? `<div class="ps-changeover">switch to ${escapeHtml(j.name)}</div>` : '';
        return `
        ${changeover}
        <div>${marker}<b>${escapeHtml(j.name)}</b> — ${fmtClock(j.start)} → ${j.inProgress ? 'now' : fmtClock(j.end)}${j.overnight?' <span style="color:var(--heat)">(runs unattended past window close)</span>':''}${j.spoolShort?' <span class="ps-swap-tag">swap spool before this</span>':''}</div>
      `;
      }).join('');

      return `
        <div class="ps-day">
          <div class="ps-day-head">
            <div class="ps-day-date">${fmtDateHead(day.date)}</div>
            <div class="ps-day-meta">${jobs.length} print${jobs.length!==1?'s':''}</div>
          </div>
          <div class="ps-gantt" style="overflow:visible;">${blocks}${nowMarker}</div>
          <div class="ps-joblist">${jobLines}</div>
        </div>
      `;
    }).join('');

    const legend = (sched.mode === 'live' && anyActualShown) ? `
      <div class="ps-legend">
        <span><i class="ps-swatch sw-done">✓</i>Completed</span>
        <span><i class="ps-swatch sw-progress"></i>In progress</span>
        <span><i class="ps-swatch sw-planned"></i>Upcoming</span>
      </div>
    ` : '';

    let spoolNote;
    if(!m.spoolInfo){
      spoolNote = `<div class="ps-hint">No spool assigned — filament isn't being tracked for this machine. Assign one on the Printers tab.</div>`;
    } else if(m.spoolShortAt){
      spoolNote = `<div class="ps-hint" style="color:var(--danger)">⚠ "${escapeHtml(m.spoolInfo.label)}" (${m.spoolInfo.remainingG}g on it) runs out during <b>${escapeHtml(m.spoolShortAt.name)}</b>, around ${fmtDateHead(m.spoolShortAt.start)} ${fmtClock(m.spoolShortAt.start)} — have a fresh spool ready.</div>`;
    } else {
      const leftover = m.spoolInfo.remainingG - m.spoolTotalUsed;
      spoolNote = `<div class="ps-hint">"${escapeHtml(m.spoolInfo.label)}" covers this queue with ~${Math.round(leftover)}g to spare.</div>`;
    }

    return `
      <div class="ps-printer-block">
        <div class="ps-printer-block-head"><span class="dot"></span>${escapeHtml(m.name)}</div>
        ${daysHtml}
        ${legend}
        ${spoolNote}
      </div>
    `;
  }).join('');

  outputEl.innerHTML += `
    <div class="ps-panel">
      <div class="ps-panel-title"><span class="dot"></span>Timeline</div>
      ${summary}
      ${machinesHtml}
    </div>
  `;
}

// ---------- tabs ----------
function setupTabs(){
  document.querySelectorAll('.ps-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.ps-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.getAttribute('data-tab');
      ['schedule','log','printers','filament','catalog','settings'].forEach(name => {
        document.getElementById('ps-tab-'+name).style.display = (name===target) ? '' : 'none';
      });
    });
  });
}

// ---------- init ----------
async function startApp(){
  await loadState();
  syncConsumption();
  setupTabs();
  renderSchedule();
  renderLog();
  renderPrinters();
  renderFilament();
  renderCatalog();
  renderSettings();
}
// In the normal Claude-artifact context (and in a standalone build with no
// auth configured), start immediately. A standalone build with auth enabled
// sets window.__deferAppStart = true before this runs, and calls startApp()
// itself once the person signs in.
if(typeof window.__deferAppStart === 'undefined'){
  startApp();
}

})();
</script>
